                ${warn?'<br><span style="color:var(--warning)">Aucun export manuel '+(daysSince!==null?'depuis '+daysSince+' j':'effectué')+'</span>':'<br><span style="color:var(--success)">Export : il y a '+daysSince+' jour'+(daysSince>1?'s':'')+'</span>'}</span>
                ${warn?'<button class="btn btn-sm btn-accent" onclick="document.getElementById(\'btn-export\').click()">'+icon('save',14)+' Sauvegarder</button>':''}
            </div>
            <div class="kpi-grid">
                <div class="kpi-card" data-color="rose"><div class="kpi-icon">${icon('users',20)}</div><span class="kpi-label">Clientes</span><span class="kpi-value">${totalClients}</span><span class="kpi-sub">au total</span></div>
                <div class="kpi-card" data-color="accent"><div class="kpi-icon">${icon('scissors',20)}</div><span class="kpi-label">Prestations ce mois</span><span class="kpi-value">${fichesMois}</span><span class="kpi-sub">${now.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</span><div class="sparkline-wrap"><canvas id="spark-pr" style="height:28px"></canvas></div></div>
                <div class="kpi-card" data-color="success"><div class="kpi-icon">${icon('trending-up',20)}</div><span class="kpi-label">Chiffre d'affaires</span><span class="kpi-value">${formatEuros(caTotal)}</span><span class="kpi-sub">total cumulé</span><div class="sparkline-wrap"><canvas id="spark-ca" style="height:28px"></canvas></div></div>
                <div class="kpi-card" data-color="muted"><div class="kpi-icon">${icon('bar-chart',20)}</div><span class="kpi-label">Panier moyen</span><span class="kpi-value">${formatEuros(panierMoyen)}</span><span class="kpi-sub">par prestation</span></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:22px;">
                <div>
                    <div class="section-title">${icon('users',18)} Dernières clientes</div>
                    ${dernClients.length===0?'<div class="empty-state"><div class="empty-icon">'+icon('users',48)+'</div><p>Aucune cliente</p><button class="btn btn-primary" onclick="app.openClientForm()">'+icon('plus',16)+' Ajouter</button></div>':
                    '<div class="recent-list">'+dernClients.map(c=>'<div class="recent-item" onclick="app.navigate(\'client-detail\',{clientId:\''+c.id+'\'})"><div class="recent-avatar" style="background:var(--primary-soft);color:var(--primary)">'+esc(initials(c.nom,c.prenom))+'</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:.86rem">'+esc(c.prenom)+' '+esc(c.nom)+'</div><div style="font-size:.72rem;color:var(--text-muted)">'+esc((c.adresse&&c.adresse.ville)||'')+' · '+formatDateShort(c.creeLe)+'</div></div></div>').join('')+'</div>'}
                </div>
                <div>
                    <div class="section-title">${icon('map-pin',18)} Par ville</div>
                    ${topVilles.length===0?'<p style="font-size:.85rem;color:var(--text-muted)">Aucune donnée</p>':
                    '<div class="recent-list">'+topVilles.map(([v,n])=>'<div class="recent-item" style="cursor:default"><div class="recent-avatar" style="background:var(--accent-soft);color:var(--accent)">'+icon('map-pin',16)+'</div><div style="flex:1;font-weight:600;font-size:.86rem">'+esc(v)+'</div><span class="stat-chip">'+n+'</span></div>').join('')+'</div>'}
                    ${dernFiches.length>0?'<div class="section-title" style="margin-top:22px">'+icon('scissors',18)+' Dernières prestations</div><div class="recent-list">'+await Promise.all(dernFiches.map(async f=>{const cl=await this.db.get(CONFIG.STORES.CLIENTS,f.clientId);const nom=cl?cl.prenom+' '+cl.nom:'Inconnue';return '<div class="recent-item" onclick="app.navigate(\'client-detail\',{clientId:\''+f.clientId+'\'})"><div class="recent-avatar" style="background:var(--success-soft);color:var(--success)">'+icon('scissors',16)+'</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:.84rem">'+esc(nom)+'</div><div style="font-size:.72rem;color:var(--text-muted)">'+formatDateShort(f.date)+' — '+(f.prestations||[]).slice(0,2).map(p=>esc(p)).join(', ')+'</div></div><div style="font-weight:700;color:var(--accent);font-size:.84rem">'+formatEuros(f.tarif)+'</div></div>'})).then(a=>a.join(''))+'</div>':''}
                </div>
            </div>`;
        requestAnimationFrame(()=>{drawSparkline(document.getElementById('spark-ca'),sparkCA,'#3AA675');drawSparkline(document.getElementById('spark-pr'),sparkPr,'#C9975D');if(caObj>0)drawGauge(document.getElementById('ca-gauge'),caPct,caPct>=1?'#3AA675':'#B4687D')});
    }

    setCaObjectif(){

    // Galerie photos plein écran avec navigation précédent/suivant
    openGallery(photos,startIdx,title){
        if(!photos||photos.length===0)return;
        startIdx=Math.max(0,Math.min(startIdx||0,photos.length-1));
        const overlay=document.getElementById('photo-gallery');
        const img=document.getElementById('gallery-img');
        const counter=document.getElementById('gallery-counter');
        const thumbsEl=document.getElementById('gallery-thumbs');
        const labelBadge=document.getElementById('gallery-label-badge');
        const titleEl=document.getElementById('gallery-title');
        if(titleEl)titleEl.textContent=title||'Photos';
        let cur=startIdx;
        const show=(idx)=>{
            cur=Math.max(0,Math.min(idx,photos.length-1));
            const p=photos[cur];
            img.src=p.data||p;img.alt='Photo '+(cur+1);
            counter.textContent=(cur+1)+' / '+photos.length;
            if(p.label){labelBadge.textContent=p.label;labelBadge.style.display=''}
            else{labelBadge.style.display='none'}
            document.querySelectorAll('.photo-gallery-thumb').forEach((t,i)=>t.classList.toggle('active',i===cur));
        };
        // Vignettes
        thumbsEl.innerHTML=photos.map((p,i)=>'<img class="photo-gallery-thumb'+(i===startIdx?' active':'')+'" src="'+(p.data||p)+'" data-gi="'+i+'" alt="Photo '+(i+1)+'" loading="lazy">').join('');
        // onclick sur thumbsEl (écrase l'ancien, pas d'accumulation entre ouvertures)
        thumbsEl.onclick=e=>{const t=e.target.closest('[data-gi]');if(t)show(parseInt(t.dataset.gi))};
        document.getElementById('gallery-prev').onclick=()=>show(cur-1);
        document.getElementById('gallery-next').onclick=()=>show(cur+1);
        overlay.classList.add('open');
        document.body.style.overflow='hidden';
        show(startIdx);
        // Swipe tactile — stockés sur this pour nettoyage dans closeGallery
        let tx=null;
        this._galleryOnStart=e=>{tx=e.touches?.[0]?.clientX??e.clientX};
        this._galleryOnEnd=e=>{if(tx===null)return;const dx=(e.changedTouches?.[0]?.clientX??e.clientX)-tx;tx=null;if(Math.abs(dx)>40)dx<0?show(cur+1):show(cur-1)};
        overlay.addEventListener('touchstart',this._galleryOnStart,{passive:true});
        overlay.addEventListener('touchend',this._galleryOnEnd);
        overlay.addEventListener('mousedown',this._galleryOnStart);
        overlay.addEventListener('mouseup',this._galleryOnEnd);
        // Flèches clavier
        this._galleryKeyHandler=(e)=>{if(e.key==='ArrowLeft')show(cur-1);else if(e.key==='ArrowRight')show(cur+1);else if(e.key==='Escape')this.closeGallery()};
        document.addEventListener('keydown',this._galleryKeyHandler);
    }
    // Raccourci pour une photo unique (rétrocompatibilité)
    viewPhoto(src,photos,idx){
        if(photos&&photos.length>0){this.openGallery(photos,idx||0)}
        else{this.openGallery([{data:src}],0)}
    }
    // Appelé depuis les attributs onclick inline avec photos encodées en base64
    // Evite les guillemets JSON dans les attributs HTML
    openGalleryB64(b64,idx){
        try{const photos=JSON.parse(decodeURIComponent(escape(atob(b64))));this.openGallery(photos,idx)}
        catch(e){console.error('openGalleryB64 erreur:',e)}
    }
    closeGallery(){
        const overlay=document.getElementById('photo-gallery');
        overlay.classList.remove('open');
        document.body.style.overflow='';
        // Nettoyage des listeners swipe/mouse stockés lors de l'ouverture
        if(this._galleryOnStart){
            overlay.removeEventListener('touchstart',this._galleryOnStart);
            overlay.removeEventListener('touchend',this._galleryOnEnd);
            overlay.removeEventListener('mousedown',this._galleryOnStart);
            overlay.removeEventListener('mouseup',this._galleryOnEnd);
            this._galleryOnStart=null;this._galleryOnEnd=null;
        }
        if(this._galleryKeyHandler){document.removeEventListener('keydown',this._galleryKeyHandler);this._galleryKeyHandler=null}
    }

    async openFocusMode(rdvId){
        const rdv=await this.db.get(CONFIG.STORES.RDV,rdvId);

        const cl=await this.db.get(CONFIG.STORES.CLIENTS,rdv.clientId);

        const ini=cl?initials(cl.nom,cl.prenom):'?';
        // Dernière fiche avec formule
        let lastFiche=null;
        if(cl){const fiches=await this.db.getAllByIndex(CONFIG.STORES.FICHES,'clientId',cl.id);fiches.sort((a,b)=>(b.date||'').localeCompare(a.date||''));lastFiche=fiches[0]||null}
        // Remplir le focus overlay
        document.getElementById('focus-avatar').textContent=ini;
        document.getElementById('focus-client-name').textContent=nom;
        document.getElementById('focus-rdv-meta').textContent=(rdv.heureDebut||'')+(rdv.heureFin?' → '+rdv.heureFin:'')+' · '+(rdv.prestationsPrevues||[]).join(', ');
        let bodyHTML='';
        // Prestations prévues
        if((rdv.prestationsPrevues||[]).length>0){
            bodyHTML+='<div class="focus-section"><div class="focus-section-title">'+icon('scissors',16)+' Prestations</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+(rdv.prestationsPrevues||[]).map(p=>'<span class="tag tag-rose" style="font-size:.82rem;padding:4px 12px">'+esc(p)+'</span>').join('')+'</div></div>';
        }
        // Dernière formule
        if(lastFiche&&(lastFiche.formules||[]).length>0){
            const fms=lastFiche.formules;
            bodyHTML+='<div class="focus-section"><div class="focus-section-title">'+icon('palette',16)+' Dernière formule ('+formatDate(lastFiche.date)+')</div>'
                +fms.map(fm=>'<div class="focus-formule"><span class="focus-formule-zone">'+esc(fm.zone||'—')+'</span> '+esc(fm.marque||'')+' '+esc(fm.teinte||'')+(fm.quantite?' · '+fm.quantite+'g':'')+(fm.oxydant?' + Ox '+esc(fm.oxydant)+(fm.qteOxydant?' '+fm.qteOxydant+'g':''):'')+(fm.tempsPose?' · Pose '+fm.tempsPose+' min':'')+(fm.notes?'<div style="color:var(--text-muted);font-size:.74rem;margin-top:3px">'+esc(fm.notes)+'</div>':'')+'</div>').join('')
                +'</div>';
        }
        // Notes RDV
        if(rdv.notes)bodyHTML+='<div class="focus-section"><div class="focus-section-title">'+icon('file-text',16)+' Notes</div><p style="font-size:.84rem;color:var(--text-secondary)">'+esc(rdv.notes)+'</p></div>';
        // Chronomètre de pose
        bodyHTML+='<div class="focus-section"><div class="focus-section-title">'+icon('timer',16)+' Chronomètre de pose</div><div class="focus-timer"><div class="focus-timer-display" id="focus-timer-display">00:00</div><div class="focus-timer-label" id="focus-timer-label">Arrêté</div><div class="focus-timer-btns"><button class="btn btn-primary" id="focus-timer-start" aria-label="Démarrer">'+icon('play',15)+' Démarrer</button><button class="btn btn-secondary" id="focus-timer-pause" aria-label="Pause" disabled>'+icon('pause',15)+'</button><button class="btn btn-ghost" id="focus-timer-reset" aria-label="Remettre à zéro">'+icon('stop',15)+'</button></div><div class="focus-presets"><button class="focus-preset-btn" data-sec="600">10 min</button><button class="focus-preset-btn" data-sec="1200">20 min</button><button class="focus-preset-btn" data-sec="1800">30 min</button><button class="focus-preset-btn" data-sec="2700">45 min</button></div></div></div>';
        document.getElementById('focus-body').innerHTML=bodyHTML;
        // Afficher l'overlay
        const ov=document.getElementById('focus-overlay');ov.classList.add('open');
        document.body.style.overflow='hidden';
        // Persistance du timer : clé sessionStorage par rdvId
        // Permet de fermer le focus et retrouver l'état à la réouverture (RDV en cours)
        const TIMER_KEY='monsalon_focus_timer_'+rdvId;
        const readTimerState=()=>{try{const raw=sessionStorage.getItem(TIMER_KEY);return raw?JSON.parse(raw):null}catch(e){return null}};
        const saveTimerState=(state)=>{try{sessionStorage.setItem(TIMER_KEY,JSON.stringify(state))}catch(e){}};
        const clearTimerState=()=>{try{sessionStorage.removeItem(TIMER_KEY)}catch(e){}};
        // Bindings timer
        let timerSec=0;let timerRunning=false;let timerInterval=null;let targetSec=0;let startTs=null;
        // Restauration depuis sessionStorage
        const saved=readTimerState();
        if(saved){
            targetSec=saved.targetSec||0;
            // Si running : timerSec = temps total écoulé depuis startTs
            // (startTs est repositionné à chaque start : Date.now()-timerSec*1000, donc (now-startTs) = temps réel du chrono)
            if(saved.running&&saved.startTs){
                timerSec=Math.max(0,Math.floor((Date.now()-saved.startTs)/1000));
                const pauseDuree=Math.max(0,timerSec-(saved.timerSec||0));
                // Ajouter une bannière indiquant la reprise
                const bd=document.getElementById('focus-body');
                if(bd)bd.insertAdjacentHTML('afterbegin','<div class="focus-timer-resumed">'+icon('timer',12)+' Minuterie en cours — reprise ('+Math.floor(pauseDuree/60)+' min '+(pauseDuree%60)+' s hors écran)</div>');
            }else{
                timerSec=saved.timerSec||0;
            }
        }
        const display=document.getElementById('focus-timer-display');
        const label=document.getElementById('focus-timer-label');
        const fmt=s=>{const m=Math.floor(Math.abs(s)/60);const sec=Math.abs(s)%60;return (s<0?'-':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')};
        const playBip=()=>{try{const ac=new(window.AudioContext||window.webkitAudioContext)();const osc=ac.createOscillator();const gain=ac.createGain();osc.connect(gain);gain.connect(ac.destination);osc.type='sine';osc.frequency.value=880;gain.gain.setValueAtTime(0.4,ac.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.8);osc.start(ac.currentTime);osc.stop(ac.currentTime+0.8)}catch(e){}};
        const tick=()=>{if(targetSec>0){const remaining=targetSec-timerSec;display.textContent=fmt(remaining<0?remaining:remaining);label.textContent=remaining>0?'Temps restant':'Dépassement';if(remaining<=0){display.style.color='var(--danger)';if(remaining===-1)playBip()}}else{display.textContent=fmt(timerSec);label.textContent=timerRunning?'En cours…':'Pause'}};
        // Restaurer l'affichage si un timer était en cours
        if(saved)tick();
        // Signal immédiat si dépassement déjà en cours à la réouverture
        if(saved&&targetSec>0&&timerSec>targetSec){
            display.style.color='var(--danger)';
            playBip();
        }
        // Reprise auto si running
        if(saved&&saved.running){
            timerRunning=true;
            startTs=Date.now()-timerSec*1000;
            timerInterval=setInterval(()=>{timerSec++;tick();saveTimerState({timerSec,targetSec,running:true,startTs})},1000);
            document.getElementById('focus-timer-start').disabled=true;
            document.getElementById('focus-timer-pause').disabled=false;
        }
        document.getElementById('focus-timer-start').addEventListener('click',()=>{if(!timerRunning){timerRunning=true;startTs=Date.now()-timerSec*1000;timerInterval=setInterval(()=>{timerSec++;tick();saveTimerState({timerSec,targetSec,running:true,startTs})},1000);document.getElementById('focus-timer-start').disabled=true;document.getElementById('focus-timer-pause').disabled=false;display.style.color='var(--primary)';saveTimerState({timerSec,targetSec,running:true,startTs})}});
        document.getElementById('focus-timer-pause').addEventListener('click',()=>{timerRunning=false;clearInterval(timerInterval);document.getElementById('focus-timer-start').disabled=false;document.getElementById('focus-timer-pause').disabled=true;saveTimerState({timerSec,targetSec,running:false})});
        document.getElementById('focus-timer-reset').addEventListener('click',()=>{timerRunning=false;clearInterval(timerInterval);timerSec=0;targetSec=0;startTs=null;display.style.color='var(--primary)';document.getElementById('focus-timer-start').disabled=false;document.getElementById('focus-timer-pause').disabled=true;tick();clearTimerState()});
        document.querySelectorAll('.focus-preset-btn').forEach(btn=>btn.addEventListener('click',()=>{targetSec=parseInt(btn.dataset.sec);timerSec=0;startTs=timerRunning?Date.now():null;display.style.color='var(--primary)';tick();toast('Minuterie : '+btn.textContent);saveTimerState({timerSec,targetSec,running:timerRunning,startTs})}));
        // Boutons fermer / terminer
        // close() : PAS de clearTimerState — l'état persiste, ne s'efface que via reset ou complétion du RDV
        const close=()=>{timerRunning=false;clearInterval(timerInterval);ov.classList.remove('open');document.body.style.overflow=''};
        // onclick (écrase le listener précédent) : les boutons sont statiques dans le HTML,
        // addEventListener accumulerait un listener par ouverture → quickCompleteRdv sur d'anciens rdvId
        document.getElementById('focus-close-btn').onclick=close;
        document.getElementById('focus-close-btn2').onclick=close;
        document.getElementById('focus-complete-btn').onclick=()=>{clearTimerState();this.quickCompleteRdv(rdvId);close()};
        this._focusCleanup=close;
    }

    async _cleanFocusTimerKeys(){

        const prefix='monsalon_focus_timer_';
        const toDelete=[];
        for(let i=0;i<sessionStorage.length;i++){const k=sessionStorage.key(i);if(k&&k.startsWith(prefix))toDelete.push(k)}

        let workList=[...current];

        const refresh=()=>{
            const pl=document.getElementById('presta-list');if(!pl)return;

                '<div class="presta-settings-item" draggable="true" data-idx="'+i+'">'

                +'<button type="button" data-rm="'+i+'" aria-label="Supprimer">'+icon('x',14)+'</button>'
                +'</div>'
            ).join('');
        };
        refresh();
        const pl=document.getElementById('presta-list');

        pl?.addEventListener('click',e=>{
            const rm=e.target.closest('[data-rm]');

    /* ================================================================
       SYNCHRONISATION QR CODE (sans serveur)
       ================================================================ */
    async openSyncQR(){
        // Exporter les données sans photos et les encoder en QR
        try{
            const d=await this.db.exportAll();
            // Retirer les photos pour rester dans la taille QR raisonnable
            if(d[CONFIG.STORES.FICHES])d[CONFIG.STORES.FICHES]=d[CONFIG.STORES.FICHES].map(f=>{const c={...f};c.photos=[];return c});
            const json=JSON.stringify(d);
            // Comprimer via gzip/deflate base64 (DecompressionStream si disponible, sinon brut)
            let dataStr=json;
            try{
                const cs=new CompressionStream('gzip');const w=cs.writable.getWriter();const r=cs.readable.getReader();
                w.write(new TextEncoder().encode(json));w.close();
                const chunks=[];let done=false;while(!done){const{value,done:d2}=await r.read();if(d2)done=true;else chunks.push(value)}
                const bytes=new Uint8Array(chunks.reduce((a,c)=>a+c.length,0));let off=0;chunks.forEach(c=>{bytes.set(c,off);off+=c.length});
                // btoa par chunks de 32k pour éviter le stack overflow du spread sur les grosses bases
                let bin='';const CHUNK=32768;
                for(let i=0;i<bytes.length;i+=CHUNK){bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+CHUNK))}
                dataStr='gz:'+btoa(bin);
            }catch(e){
                // CompressionStream non disponible : afficher un message d'erreur clair
                toast('Compression non supportée sur ce navigateur. Essayez Chrome ou Safari 16+.','danger');
                return;
            }
            // Générer un QR via l'API QR Server (si en ligne)
            if(!navigator.onLine){toast('Connexion requise pour générer le QR','danger');return}
            // Limite QR alphanumérique ~2953 octets : refuser plutôt que tronquer (QR corrompu)
            if(dataStr.length>2953){
                this.openModal(icon('qr',20)+' Sync via QR Code',
                    '<p style="font-size:.85rem;color:var(--text-secondary);line-height:1.6">Vos données compressées ('+Math.round(dataStr.length/1024)+' Ko) dépassent la capacité d\'un QR code (~3 Ko).<br><br>Utilisez plutôt <strong>Sauvegarder → Export léger</strong> puis transférez le fichier par AirDrop, e-mail ou messagerie vers l\'autre appareil, et importez-le via <strong>Restaurer</strong>.</p>',
                    '<button class="btn btn-secondary" onclick="app.closeModal()">Fermer</button><button class="btn btn-primary" onclick="app.closeModal();app.openExportModal()">'+icon('save',14)+' Export léger</button>');
                return;
            }
            const qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(dataStr);
            const body='<div class="sync-qr-wrap">'
                +'<img src="'+qrUrl+'" alt="QR Code de synchronisation" style="width:200px;height:200px;border-radius:var(--radius);margin:0 auto;display:block">'
                +'<p style="font-size:.72rem;color:var(--text-muted);margin-top:8px;text-align:center">Données compressées : '+dataStr.length+' / 2953 caractères</p>'
                +'</div>'
                +'<div class="sync-instructions">'
                +'<div class="sync-step"><div class="sync-step-num">1</div><div>Scannez ce QR code depuis l\'appareil cible</div></div>'
                +'<div class="sync-step"><div class="sync-step-num">2</div><div>Copiez le contenu scanné dans un fichier texte (.json apres décompression) ou utilisez un lecteur QR qui exporte le texte brut</div></div>'
                +'<div class="sync-step"><div class="sync-step-num">3</div><div>Pour les transferts volumineux, préférez Sauvegarder → Export léger + AirDrop / e-mail</div></div>'
                +'</div>';
            this.openModal(icon('qr',20)+' Sync via QR Code',body,'<button class="btn btn-secondary" onclick="app.closeModal()">Fermer</button>');
        }catch(e){toast('Erreur QR: '+e.message,'danger')}
    }
    initPWA(){
        let deferredPrompt=null;
        const banner=document.getElementById('pwa-banner');
        const dismissed=localStorage.getItem('pwa_dismissed');
        window.addEventListener('beforeinstallprompt',e=>{
            e.preventDefault();deferredPrompt=e;
            if(!dismissed&&banner)banner.classList.add('show');
        });
        document.getElementById('pwa-install-btn')?.addEventListener('click',async()=>{
            if(!deferredPrompt)return;
            deferredPrompt.prompt();
            const r=await deferredPrompt.userChoice;
            if(r.outcome==='accepted')toast('App installée !');
            deferredPrompt=null;banner.classList.remove('show');
        });
        document.getElementById('pwa-dismiss-btn')?.addEventListener('click',()=>{
            banner.classList.remove('show');localStorage.setItem('pwa_dismissed','1');
        });
        // Enregistrer le Service Worker
        // Stratégie : Blob URL (meilleure compatibilité que data: URL sur Firefox/Safari)
        // Le scope sera limité mais suffisant pour mettre en cache le fichier HTML
        if('serviceWorker' in navigator){
            try{
                // APP_VERSION : dérivée de la longueur du code JS (statique, ne varie pas avec l'état du DOM)
                // Toute modification du fichier change cette valeur → cache invalidé au prochain chargement
                let srcLen=0;for(const sc of document.scripts){srcLen+=(sc.textContent||'').length}
                const APP_VERSION=srcLen.toString(36);
                const swCode=[
                    "const CACHE='monsalon-"+APP_VERSION+"';",
                    "const HTML_URL=self.location.href.replace(/[^/]*$/,'');",
                    "self.addEventListener('install',e=>{",
                    "  e.waitUntil(caches.open(CACHE).then(c=>c.addAll([HTML_URL]).catch(()=>{})));",
                    "  self.skipWaiting();",
                    "});",
                    "self.addEventListener('activate',e=>{",
                    // Purge de tous les anciens caches (préfixe monsalon-)
                    "  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE&&k.startsWith('monsalon-')).map(k=>caches.delete(k)))));",
                    "  self.clients.claim();",
                    "});",
                    "self.addEventListener('fetch',e=>{",
                    "  if(e.request.method!=='GET')return;",
                    "  const url=e.request.url;",
                    "  if(url.includes('nominatim')||url.includes('osrm')||url.includes('unpkg')||url.includes('qrserver'))return;",
                    // Network-first pour la page HTML (pour capter les updates rapidement)
                    "  const isHTML=e.request.mode==='navigate'||(e.request.destination==='document');",
                    "  if(isHTML){",
                    "    e.respondWith(fetch(e.request).then(res=>{",
                    "      if(res&&res.status===200&&res.type!=='opaque'){const cl=res.clone();caches.open(CACHE).then(c=>c.put(e.request,cl))}",
                    "      return res;",
                    "    }).catch(()=>caches.match(e.request)));",
                    "    return;",
                    "  }",
                    // Cache-first pour tout le reste
                    "  e.respondWith(caches.match(e.request).then(cached=>{",
                    "    const fetchFresh=fetch(e.request).then(res=>{",
                    "      if(res&&res.status===200&&res.type!=='opaque'){const cl=res.clone();caches.open(CACHE).then(c=>c.put(e.request,cl))}",
                    "      return res;",
                    "    }).catch(()=>cached);",
                    "    return cached||fetchFresh;",
                    "  }));",
                    "});"
                ].join('\n');
                const blob=new Blob([swCode],{type:'text/javascript'});
                const url=URL.createObjectURL(blob);
                navigator.serviceWorker.register(url).then(reg=>{
                    console.log('[PWA] SW enregistré (version:',APP_VERSION,'| scope:',reg.scope,')');
                    URL.revokeObjectURL(url);
                }).catch(e=>{
                    URL.revokeObjectURL(url);
                    console.log('[PWA] SW non supporté:',e.message);
                });
            }catch(e){console.log('[PWA] SW erreur:',e.message)}
        }
        // Ajouter meta pour iOS standalone
        if(!document.querySelector('link[rel="apple-touch-icon"]')){
            const m=document.createElement('meta');m.name='apple-mobile-web-app-capable';m.content='yes';document.head.appendChild(m);
            const ms=document.createElement('meta');ms.name='apple-mobile-web-app-status-bar-style';ms.content='black-translucent';document.head.appendChild(ms);
        }
    }

    async importFromContacts(){
        if(!('contacts' in navigator&&'ContactsManager' in window)){
            toast('Import contacts non supporté sur ce navigateur','danger');
            this.openModal(icon('users',20)+' Import depuis les contacts',
                '<p style="font-size:.85rem;color:var(--text-secondary);margin-bottom:14px">L\'API Contacts n\'est pas disponible sur ce navigateur.</p>'
                +'<p style="font-size:.82rem;color:var(--text-muted)">Astuce : sur iPhone, utilisez Safari. Sur Android, Chrome.</p>',
                '<button class="btn btn-secondary" onclick="app.closeModal()">Fermer</button>');
            return;
        }
        try{
            const props=['name','tel','address'];
            const opts={multiple:true};
            const contacts=await navigator.contacts.select(props,opts);
            if(!contacts.length){toast('Aucun contact sélectionné');return}
            let imported=0;
            for(const ct of contacts){
                const prenom=(ct.name&&ct.name[0])?ct.name[0].split(' ')[0]||'':'';
                const nom=(ct.name&&ct.name[0])?ct.name[0].split(' ').slice(1).join(' ').trim()||'':'';
                if(!prenom&&!nom)continue;
                const tel=(ct.tel&&ct.tel[0])||'';
                const addr=ct.address&&ct.address[0]?ct.address[0]:{};
                const data={id:uuid(),prenom,nom,telephone:tel,adresse:{rue:addr.addressLine?addr.addressLine.join(', '):'',codePostal:addr.postalCode||'',ville:addr.city||'',quartier:''},notes:'',creeLe:new Date().toISOString(),modifieLe:new Date().toISOString()};
                await this.db.put(CONFIG.STORES.CLIENTS,data);imported++;
            }
            toast(imported+' cliente'+(imported>1?'s':'')+' importée'+(imported>1?'s':''));
            this.navigate('clients');
        }catch(e){
            if(e.name!=='AbortError')toast('Erreur import: '+e.message,'danger');
        }
    }

    /* ================================================================
       PROFIL SALON (pour factures)
       ================================================================ */
    openSalonInfo(){
        const s=this.getSalonInfo();
        const dep=(() => {try{const raw=localStorage.getItem(CONFIG.LS_KEY_ADRESSE_DEPART);return raw?JSON.parse(raw):null}catch(e){return null}})();
        const body='<div class="form-row"><div class="form-group"><label class="form-label">Prénom</label><input class="form-input" id="si-prenom" value="'+esc(s.prenom||'')+'"></div><div class="form-group"><label class="form-label">Nom / Raison sociale</label><input class="form-input" id="si-nom" value="'+esc(s.nom||'')+'"></div></div>'
            +'<div class="form-group"><label class="form-label">Adresse professionnelle</label><input class="form-input" id="si-adresse" value="'+esc(s.adresse||'')+'"></div>'
            +'<div class="form-row"><div class="form-group"><label class="form-label">Téléphone</label><input class="form-input" id="si-tel" value="'+esc(s.telephone||'')+'"></div><div class="form-group"><label class="form-label">Email</label><input class="form-input" id="si-email" value="'+esc(s.email||'')+'"></div></div>'
            +'<div class="form-group"><label class="form-label">SIRET (optionnel)</label><input class="form-input" id="si-siret" value="'+esc(s.siret||'')+'"></div>'
            +'<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">'
            +'<div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:800;margin-bottom:8px">'+icon('map-pin',13)+' Adresse de départ (pour la carte)</div>'
            +'<p style="font-size:.76rem;color:var(--text-secondary);margin-bottom:8px">Point de départ affiché au début de chaque itinéraire journalier. Sauvegardé définitivement.</p>'
            +'<div class="form-group"><label class="form-label">Libellé</label><input class="form-input" id="si-dep-label" value="'+esc(dep?.label||'Domicile')+'" placeholder="Domicile, Bureau…"></div>'
            +'<div class="form-group"><label class="form-label">Adresse de départ</label><input class="form-input" id="si-dep-adresse" value="'+esc(dep?.adresse||s.adresse||'')+'" placeholder="3 rue de la Paix, 34000 Montpellier"></div>'
            +(dep?.lat?'<p style="font-size:.72rem;color:var(--success);margin-top:4px">'+icon('check',12)+' Adresse géocodée — affichée sur la carte</p>':'<p style="font-size:.72rem;color:var(--text-muted);margin-top:4px">Sera géocodée automatiquement à l\'enregistrement.</p>')
            +'</div>';
        this.openModal(icon('edit',20)+' Mon profil professionnel',body,'<button class="btn btn-secondary" onclick="app.closeModal()">Annuler</button><button class="btn btn-primary" id="btn-save-salon">Enregistrer</button>');
        document.getElementById('btn-save-salon').addEventListener('click',async()=>{
            const info={nom:document.getElementById('si-nom').value.trim(),prenom:document.getElementById('si-prenom').value.trim(),adresse:document.getElementById('si-adresse').value.trim(),telephone:document.getElementById('si-tel').value.trim(),email:document.getElementById('si-email').value.trim(),siret:document.getElementById('si-siret').value.trim()};
            localStorage.setItem(CONFIG.LS_KEY_SALON_INFO,JSON.stringify(info));
            // Sauvegarder et géocoder l'adresse de départ
            const depLabel=document.getElementById('si-dep-label').value.trim()||'Domicile';
            const depAdresse=document.getElementById('si-dep-adresse').value.trim();
            if(depAdresse){
                // Garder les coords existantes si l'adresse n'a pas changé
                if(dep?.adresse===depAdresse&&dep?.lat){
                    localStorage.setItem(CONFIG.LS_KEY_ADRESSE_DEPART,JSON.stringify({label:depLabel,adresse:depAdresse,lat:dep.lat,lng:dep.lng}));
                }else{
                    // Géocoder en arrière-plan (ne bloque pas le save)
                    localStorage.setItem(CONFIG.LS_KEY_ADRESSE_DEPART,JSON.stringify({label:depLabel,adresse:depAdresse}));
                    this.geocodeAddress(depAdresse).then(coords=>{
                        if(coords){
                            localStorage.setItem(CONFIG.LS_KEY_ADRESSE_DEPART,JSON.stringify({label:depLabel,adresse:depAdresse,lat:coords.lat,lng:coords.lng}));
                            toast('Adresse de départ géocodée');
                        }else{
                            toast('Adresse de départ introuvable — vérifiez-la','danger');
                        }
                    }).catch(()=>{});
                }
            }else{
                localStorage.removeItem(CONFIG.LS_KEY_ADRESSE_DEPART);
            }
            this.closeModal();toast('Profil enregistré');
        });
    }

    /* ================================================================
       CLIENTES — Liste
       ================================================================ */
    async renderClientsList(){
        document.getElementById('page-title').textContent='Mes Clientes';
        document.getElementById('topbar-actions').innerHTML='<button class="btn btn-secondary btn-sm" onclick="app.importFromContacts()">'+icon('import',16)+' Contacts</button><button class="btn btn-primary" onclick="app.openClientForm()">'+icon('plus',16)+' Nouvelle cliente</button>';
        const clients=await this.db.getAll(CONFIG.STORES.CLIENTS);
        const fiches=await this.db.getAll(CONFIG.STORES.FICHES);
        const statsMap={};const fichesMap={};
        fiches.forEach(f=>{if(!statsMap[f.clientId])statsMap[f.clientId]={count:0,ca:0,lastDate:''};statsMap[f.clientId].count++;statsMap[f.clientId].ca+=f.tarif||0;if(f.date>statsMap[f.clientId].lastDate)statsMap[f.clientId].lastDate=f.date;if(f.formules&&f.formules.length>0)fichesMap[f.clientId]=true});
        const villes=[...new Set(clients.map(c=>(c.adresse&&c.adresse.ville)||'').filter(Boolean))].sort();
        const PAGE_SIZE=50;let currentPage=0;
        const view=document.getElementById('view');
        view.innerHTML='<div class="search-bar"><div class="search-input-wrap">'+icon('search',16)+'<input type="text" class="search-input" id="search-clients" placeholder="Rechercher par nom, prénom ou tél…"></div><select class="filter-select" id="filter-ville"><option value="">Toutes les villes</option>'+villes.map(v=>'<option value="'+esc(v)+'">'+esc(v)+'</option>').join('')+'</select></div><div class="client-count-label" id="client-count-label"></div><div class="clients-grid" id="clients-grid"></div><div class="pagination" id="pagination"></div>';
        const renderGrid=()=>{
            const search=document.getElementById('search-clients').value.toLowerCase().trim();
            const vf=document.getElementById('filter-ville').value;
            let filtered=clients;
            if(search)filtered=filtered.filter(c=>(c.prenom+' '+c.nom+' '+(c.telephone||'')).toLowerCase().includes(search));
            if(vf)filtered=filtered.filter(c=>c.adresse&&c.adresse.ville===vf);
            filtered.sort((a,b)=>(a.nom+' '+a.prenom).localeCompare(b.nom+' '+b.prenom,'fr',{sensitivity:'base'}));
            const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
            currentPage=Math.min(currentPage,totalPages-1);
            const page=filtered.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE);
            const lbl=document.getElementById('client-count-label');
            if(lbl)lbl.textContent=filtered.length>0?(filtered.length+' cliente'+(filtered.length>1?'s':'')+(filtered.length>PAGE_SIZE?' — page '+(currentPage+1)+'/'+totalPages:'')):'';
            const grid=document.getElementById('clients-grid');
            if(filtered.length===0){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">'+icon('users',48)+'</div><p>'+(search||vf?'Aucun résultat':'Aucune cliente')+'</p>'+((!search&&!vf)?'<button class="btn btn-primary" onclick="app.openClientForm()">'+icon('plus',16)+' Ajouter</button>':'')+'</div>';document.getElementById('pagination').innerHTML='';return}
            grid.innerHTML=page.map(c=>{const s=statsMap[c.id]||{count:0,ca:0,lastDate:''};const hf=fichesMap[c.id];return '<div class="card card-hover client-card" onclick="app.navigate(\'client-detail\',{clientId:\''+c.id+'\'})"><div class="client-avatar">'+esc(initials(c.nom,c.prenom))+'</div><div class="client-info"><div class="client-name">'+esc(c.prenom)+' '+esc(c.nom)+'</div><div class="client-meta">'+(c.adresse&&c.adresse.ville?'<span>'+icon('map-pin',13)+' '+esc(c.adresse.ville)+'</span>':'')+(c.telephone?'<span>'+icon('phone',13)+' '+esc(c.telephone)+'</span>':'')+'</div><div class="client-stats-mini"><span class="stat-chip">'+s.count+' visite'+(s.count>1?'s':'')+'</span>'+(s.ca>0?'<span class="stat-chip">'+formatEuros(s.ca)+'</span>':'')+(s.lastDate?'<span class="stat-chip">'+formatDateShort(s.lastDate)+'</span>':'')+'</div></div>'+(hf?'<button class="btn btn-ghost btn-sm" style="flex-shrink:0" onclick="event.stopPropagation();app.showQuickFormula(\''+c.id+'\')" title="Dernière formule">'+icon('palette',18)+'</button>':'')+'</div>'}).join('');
            // Pagination
            const pg=document.getElementById('pagination');
            if(totalPages<=1){pg.innerHTML='';return}
            let pgHTML='<button class="pagination-btn" onclick="app._clPage('+(currentPage-1)+')" '+(currentPage===0?'disabled':'')+'>'+icon('chevron-left',14)+'</button>';
            for(let i=0;i<totalPages;i++){if(i===0||i===totalPages-1||Math.abs(i-currentPage)<=1){pgHTML+='<button class="pagination-btn'+(i===currentPage?' active':'')+'" onclick="app._clPage('+i+')">'+( i+1)+'</button>'}else if(Math.abs(i-currentPage)===2){pgHTML+='<span class="pagination-info">…</span>'}}
            pgHTML+='<button class="pagination-btn" onclick="app._clPage('+(currentPage+1)+')" '+(currentPage===totalPages-1?'disabled':'')+'>'+icon('chevron-right',14)+'</button>';
            pg.innerHTML=pgHTML;
        };
        // Exposer la navigation de page
        this._clPage=(p)=>{currentPage=Math.max(0,p);renderGrid();document.getElementById('view').scrollTop=0};
        renderGrid();
        document.getElementById('search-clients').addEventListener('input',()=>{currentPage=0;renderGrid()});
        document.getElementById('filter-ville').addEventListener('change',()=>{currentPage=0;renderGrid()});
    }

    /* ================================================================
       CLIENTE — Fiche détaillée
       ================================================================ */
    async renderClientDetail(clientId){
        const client=await this.db.get(CONFIG.STORES.CLIENTS,clientId);
        if(!client){toast('Cliente introuvable','danger');return this.navigate('clients')}
        const fiches=await this.db.getAllByIndex(CONFIG.STORES.FICHES,'clientId',clientId);
        fiches.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
        const rdvs=await this.db.getAllByIndex(CONFIG.STORES.RDV,'clientId',clientId);
        rdvs.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
        const factures=await this.db.getAllByIndex(CONFIG.STORES.FACTURES,'clientId',clientId);
        factures.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
        const allPhotos=fiches.flatMap(f=>(f.photos||[]).map(p=>({...p,ficheDate:f.date})));
        const tv=fiches.length;const ca=fiches.reduce((s,f)=>s+(f.tarif||0),0);const pm=tv>0?ca/tv:0;const dv=fiches.length>0?fiches[0].date:null;
        // Stats agrégées : intervalle moyen entre visites (en jours)
        let intervalleMoyenJ=null;let nextVisitEstimee=null;let joursDepuisDern=null;let enRetard=false;
        // Filtrer les dates invalides (NaN) avant tout calcul
        const validDates=fiches.map(f=>new Date(f.date).getTime()).filter(t=>!isNaN(t)).sort((a,b)=>a-b);
        if(validDates.length>=2){
            let totalDelta=0;
            for(let i=1;i<validDates.length;i++)totalDelta+=(validDates[i]-validDates[i-1]);
            intervalleMoyenJ=Math.round(totalDelta/(validDates.length-1)/86400000);
            const lastDateMs=validDates[validDates.length-1];
            joursDepuisDern=Math.floor((Date.now()-lastDateMs)/86400000);
            // Intervalle < 1 jour (visites le même jour) : pas de projection fiable
            if(intervalleMoyenJ>=1){
                nextVisitEstimee=new Date(lastDateMs+intervalleMoyenJ*86400000);
                enRetard=joursDepuisDern>intervalleMoyenJ*1.5;
            }else{
                intervalleMoyenJ=null;
            }
        }
        // Durée relation cliente
        const dureeRelationMois=validDates.length>0?Math.round((Date.now()-validDates[0])/(30*86400000)):0;
        // Prestation préférée (la plus fréquente)
        const prestCount={};fiches.forEach(f=>(f.prestations||[]).forEach(p=>{prestCount[p]=(prestCount[p]||0)+1}));
        const prestFavori=Object.entries(prestCount).sort((a,b)=>b[1]-a[1])[0];
        document.getElementById('page-title').textContent=client.prenom+' '+client.nom;
        document.getElementById('topbar-actions').innerHTML='<button class="btn btn-secondary btn-sm" onclick="app.navigate(\'clients\')">'+icon('arrow-left',16)+' Retour</button>';
        const a=client.adresse||{};const aStr=[a.rue,a.codePostal,a.ville,a.quartier?'('+a.quartier+')':''].filter(Boolean).join(', ');
        // Onglet actif persisté
        const tabKey='client_tab_'+clientId;
        const safeSSGet=(k,d)=>{try{return sessionStorage.getItem(k)||d}catch(e){return d}};
        const safeSSSet=(k,v)=>{try{sessionStorage.setItem(k,v)}catch(e){}};
        const activeTab=safeSSGet(tabKey,'fiches');
        const setTab=(t)=>{safeSSSet(tabKey,t);document.querySelectorAll('.client-tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));document.querySelectorAll('.client-tab-panel').forEach(el=>el.classList.toggle('active',el.dataset.panel===t))};
        const view=document.getElementById('view');
        view.innerHTML=`
            <div class="detail-header">
                <div class="detail-avatar">${esc(initials(client.nom,client.prenom))}</div>
                <div class="detail-info">
                    <h3>${esc(client.prenom)} ${esc(client.nom)}</h3>
                    <div class="detail-contact">
                        ${client.telephone?'<span>'+icon('phone',14)+' '+esc(client.telephone)+'</span>':''}
                        ${aStr?'<span>'+icon('map-pin',14)+' '+esc(aStr)+'</span>':''}
                    </div>
                    ${client.notes?'<p style="font-size:.82rem;color:var(--text-secondary);margin-top:6px">'+esc(client.notes)+'</p>':''}
                </div>
                <div class="detail-actions">
                    <button class="btn btn-accent btn-sm" onclick="app.openFactureForm(null,'${clientId}')">${icon('receipt',14)} Facture</button>
                    <button class="btn btn-secondary btn-sm" onclick="app.openClientForm('${clientId}')">${icon('edit',14)} Modifier</button>
                    <button class="btn btn-danger btn-sm" onclick="app.deleteClient('${clientId}')">${icon('trash',14)}</button>
                </div>
            </div>
            <div class="client-kpi-row">
                <div class="client-kpi"><div class="client-kpi-label">${icon('scissors',12)} Visites</div><div class="client-kpi-value">${tv}</div><div class="client-kpi-sub">${dureeRelationMois>0?'depuis '+dureeRelationMois+' mois':'—'}</div></div>
                <div class="client-kpi"><div class="client-kpi-label">${icon('trending-up',12)} CA total</div><div class="client-kpi-value" style="color:var(--accent)">${formatEuros(ca)}</div><div class="client-kpi-sub">Panier ${formatEuros(pm)}</div></div>
                <div class="client-kpi"><div class="client-kpi-label">${icon('clock',12)} Fréquence</div><div class="client-kpi-value">${intervalleMoyenJ?intervalleMoyenJ+' j':'—'}</div><div class="client-kpi-sub">${intervalleMoyenJ?'entre visites':'2+ visites requises'}</div></div>
                <div class="client-kpi"><div class="client-kpi-label">${icon('calendar',12)} Prochaine visite</div><div class="client-kpi-value" style="font-size:.95rem">${nextVisitEstimee?formatDateShort(ymd(nextVisitEstimee)):'—'}</div><div class="client-kpi-sub ${enRetard?'late':(joursDepuisDern!==null?'':'')}">${joursDepuisDern!==null?(enRetard?icon('zap',10)+' Retard '+(joursDepuisDern-intervalleMoyenJ)+' j':(joursDepuisDern+' j depuis dern.')):'estimation à partir de 2 visites'}</div></div>
                ${prestFavori?'<div class="client-kpi"><div class="client-kpi-label">'+icon('scissors',12)+' Favori</div><div class="client-kpi-value" style="font-size:.9rem">'+esc(prestFavori[0])+'</div><div class="client-kpi-sub">'+prestFavori[1]+' fois</div></div>':''}
            </div>
            <div class="client-tabs">
                <button class="client-tab" data-tab="fiches">${icon('file-text',15)} Fiches<span class="nav-badge" style="margin-left:4px;background:var(--primary-soft);color:var(--primary)">${tv}</span></button>
                <button class="client-tab" data-tab="agenda">${icon('calendar',15)} RDV<span class="nav-badge" style="margin-left:4px;background:var(--primary-soft);color:var(--primary)">${rdvs.length}</span></button>
                <button class="client-tab" data-tab="factures">${icon('receipt',15)} Factures<span class="nav-badge" style="margin-left:4px;background:var(--primary-soft);color:var(--primary)">${factures.length}</span></button>
                <button class="client-tab" data-tab="photos">${icon('eye',15)} Photos<span class="nav-badge" style="margin-left:4px;background:var(--primary-soft);color:var(--primary)">${allPhotos.length}</span></button>
            </div>
            <!-- Fiches -->
            <div class="client-tab-panel" data-panel="fiches">
                <div class="flex-between mb-4">
                    <span style="font-size:.82rem;color:var(--text-muted)">${tv} fiche${tv>1?'s':''}</span>
                    <button class="btn btn-primary btn-sm" onclick="app.openFicheForm('${clientId}')">${icon('plus',14)} Nouvelle fiche</button>
                </div>
                <div id="fiches-list">${fiches.length===0?'<div class="empty-state"><div class="empty-icon">'+icon('file-text',48)+'</div><p>Aucune fiche technique</p><button class="btn btn-primary" onclick="app.openFicheForm(\''+clientId+'\')">'+icon('plus',14)+' Créer la première</button></div>':fiches.slice(0,CONFIG.FICHES_PER_PAGE).map(f=>this.renderFicheCard(f)).join('')+(fiches.length>CONFIG.FICHES_PER_PAGE?'<div class="fiches-load-more" id="fiches-load-more" data-page="1">'+icon('chevron-down',16)+' Voir '+Math.min(CONFIG.FICHES_PER_PAGE,fiches.length-CONFIG.FICHES_PER_PAGE)+' fiches de plus ('+fiches.length+' au total)</div>':'')}</div>
            </div>
            <!-- Agenda -->
            <div class="client-tab-panel" data-panel="agenda">
                <div class="flex-between mb-4">
                    <span style="font-size:.82rem;color:var(--text-muted)">${rdvs.length} rendez-vous</span>
                    <button class="btn btn-primary btn-sm" onclick="app.openRdvForm(null,'${clientId}')">${icon('plus',14)} Nouveau RDV</button>
                </div>
                ${rdvs.length===0?'<div class="empty-state"><div class="empty-icon">'+icon('calendar',48)+'</div><p>Aucun RDV</p></div>':
                '<div style="display:flex;flex-direction:column;gap:8px">'+rdvs.map(r=>{
                    const bA=r.bufferAvant||0;const bAp=r.bufferApres||0;

            <div class="client-tab-panel" data-panel="photos">

    renderFicheCard(f){
        const n=f.natureCheveu||{};const fms=f.formules||[];const ps=f.prestations||[];
        const photos=f.photos||[];
        // Tri fiable : filtrer par label si présent, sinon fallback ordre
        const photosAvant=photos.filter(p=>p.label==='avant');
        const photosApres=photos.filter(p=>p.label==='apres');
        // Fallback : si aucune photo n'est étiquetée, utiliser première/dernière
        const photoAvant=photosAvant[0]||(photos.some(p=>p.label)?null:photos[0]);
        const photoApres=photosApres[photosApres.length-1]||(photos.some(p=>p.label)?null:(photos.length>1?photos[photos.length-1]:null));
        // Cas limite : photos présentes mais ni avant ni après identifiables (ex: uniquement "pendant")
        // → grille classique pour ne jamais masquer de photos
        const useCompare=photoAvant||photoApres;
        // Encoder les photos en base64 pour injection safe dans les attributs onclick HTML
        // JSON.stringify produit des " qui casseraient l'attribut onclick s'ils n'étaient pas encodés
        const photosB64=photos.length>0?btoa(unescape(encodeURIComponent(JSON.stringify(photos.map(p=>({data:p.data,label:p.label||''})))))):'';
        const galleryCall=(idx)=>photosB64?`app.openGalleryB64('${photosB64}',${idx})`:'';
        const compareHTML=useCompare?'<div class="photos-compare">'
            +'<div class="photos-compare-slot">'+(photoAvant?'<img src="'+photoAvant.data+'" onclick="'+galleryCall(photos.indexOf(photoAvant))+'" alt="Photo avant"><div class="photos-compare-label">Avant</div>':'<div class="photos-compare-empty">'+icon('eye',18)+'<span>Avant</span></div>')+'</div>'
            +'<div class="photos-compare-slot">'+(photoApres?'<img src="'+photoApres.data+'" onclick="'+galleryCall(photos.indexOf(photoApres))+'" alt="Photo après"><div class="photos-compare-label">Après</div>':'<div class="photos-compare-empty">'+icon('eye',18)+'<span>Après</span></div>')+'</div>'
            +(photos.length>2?'<div style="grid-column:1/-1;font-size:.7rem;color:var(--text-muted);text-align:right">'+photos.length+' photos · <a href="#" onclick="event.preventDefault();'+galleryCall(0)+'" style="color:var(--primary)">Voir toutes</a></div>':'')
            +'</div>'
            :(photos.length>0?'<div class="photos-grid">'+photos.map((p,i)=>'<span class="photo-thumb-wrap"><img class="photo-thumb" src="'+p.data+'" onclick="'+galleryCall(i)+'" alt="Photo">'+(p.label?'<span class="photo-label-badge">'+esc(p.label)+'</span>':'')+'</span>').join('')+'</div>':'');
        return '<div class="fiche-card"><div class="fiche-header"><div><div class="fiche-date">'+formatDate(f.date)+'</div><div class="fiche-tags">'+ps.map(p=>'<span class="tag tag-rose">'+esc(p)+'</span>').join('')+'</div></div><div style="display:flex;align-items:center;gap:8px"><div class="fiche-tarif">'+formatEuros(f.tarif)+'</div><button class="btn btn-ghost btn-sm" onclick="app.openFicheForm(\''+f.clientId+'\',\''+f.id+'\')" aria-label="Modifier la fiche">'+icon('edit',15)+'</button><button class="btn btn-ghost btn-sm" onclick="app.deleteFiche(\''+f.id+'\',\''+f.clientId+'\')" style="color:var(--danger)" aria-label="Supprimer la fiche">'+icon('trash',15)+'</button></div></div>'
            +'<div class="fiche-details-grid">'+(n.type?'<div class="fiche-detail-item"><span class="fiche-detail-label">Type</span>'+esc(n.type)+'</div>':'')+(n.texture?'<div class="fiche-detail-item"><span class="fiche-detail-label">Texture</span>'+esc(n.texture)+'</div>':'')+(n.porosite?'<div class="fiche-detail-item"><span class="fiche-detail-label">Porosité</span>'+esc(n.porosite)+'</div>':'')+(n.etat?'<div class="fiche-detail-item"><span class="fiche-detail-label">État</span>'+esc(n.etat)+'</div>':'')+(n.cuirChevelu?'<div class="fiche-detail-item"><span class="fiche-detail-label">Cuir chevelu</span>'+esc(n.cuirChevelu)+'</div>':'')+(n.pourcentageBlancs!=null?'<div class="fiche-detail-item"><span class="fiche-detail-label">% Blancs</span>'+n.pourcentageBlancs+' %</div>':'')+'</div>'
            +(f.diagnostic?'<p style="font-size:.8rem;color:var(--text-secondary);margin-top:8px"><strong>Diagnostic :</strong> '+esc(f.diagnostic)+'</p>':'')
            +(fms.length>0?'<div style="margin-top:10px"><div style="font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);font-weight:600;margin-bottom:5px">Formules de coloration</div>'+fms.map(fm=>'<div class="formule-row"><span class="formule-zone-badge">'+esc(fm.zone||'—')+'</span><span>'+esc(fm.marque||'')+' '+esc(fm.teinte||'')+'</span><span>'+(fm.quantite?fm.quantite+'g ':'')+''+(fm.oxydant?'+ Ox '+esc(fm.oxydant):'')+(fm.qteOxydant?' ('+fm.qteOxydant+'g)':'')+'</span><span>'+(fm.tempsPose?fm.tempsPose+' min':'')+'</span><span style="font-size:.72rem;color:var(--text-muted)">'+esc(fm.notes||'')+'</span></div>').join('')+'</div>':'')
            +(f.produits?'<p style="font-size:.8rem;color:var(--text-secondary);margin-top:6px"><strong>Produits :</strong> '+esc(f.produits)+'</p>':'')
            +(f.resultat?'<p style="font-size:.8rem;color:var(--text-secondary);margin-top:3px"><strong>Résultat :</strong> '+esc(f.resultat)+'</p>':'')
            +(f.notes?'<p style="font-size:.8rem;color:var(--text-muted);margin-top:3px;font-style:italic">'+icon('file-text',12)+' '+esc(f.notes)+'</p>':'')
            +compareHTML
            +'</div>';
    }

    async openClientForm(clientId){
        let c=null;if(clientId)c=await this.db.get(CONFIG.STORES.CLIENTS,clientId);
        const isE=!!c;const a=(c&&c.adresse)||{};
        const allClients=await this.db.getAll(CONFIG.STORES.CLIENTS);
        const body='<div id="duplicate-warn"></div><div class="form-row"><div class="form-group"><label class="form-label">Prénom *</label><input type="text" class="form-input" id="f-prenom" value="'+esc(c?.prenom||'')+'" placeholder="Marie"></div><div class="form-group"><label class="form-label">Nom *</label><input type="text" class="form-input" id="f-nom" value="'+esc(c?.nom||'')+'" placeholder="Dupont"></div></div><div class="form-group"><label class="form-label">Téléphone</label><input type="tel" class="form-input" id="f-tel" value="'+esc(c?.telephone||'')+'" placeholder="06 12 34 56 78"></div><div class="form-section-title">'+icon('map-pin',16)+' Adresse</div><div class="form-group"><label class="form-label">Rue</label><input type="text" class="form-input" id="f-rue" value="'+esc(a.rue||'')+'"></div><div class="form-row"><div class="form-group"><label class="form-label">Code postal</label><input type="text" class="form-input" id="f-cp" value="'+esc(a.codePostal||'')+'"></div><div class="form-group"><label class="form-label">Ville</label><input type="text" class="form-input" id="f-ville" value="'+esc(a.ville||'')+'"></div></div><div class="form-group"><label class="form-label">Quartier / Zone</label><input type="text" class="form-input" id="f-quartier" value="'+esc(a.quartier||'')+'"></div><div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="f-notes">'+esc(c?.notes||'')+'</textarea></div>';
        const footer='<button class="btn btn-secondary" onclick="app.closeModal()">Annuler</button><button class="btn btn-primary" id="btn-save-client">'+(isE?icon('edit',14)+' Enregistrer':icon('plus',14)+' Ajouter')+'</button>';
        this.openModal((isE?icon('edit',20):icon('plus',20))+' '+(isE?'Modifier la cliente':'Nouvelle cliente'),body,footer);
        // Duplicate detection
        const checkDup=()=>{
            const prenom=document.getElementById('f-prenom').value.trim().toLowerCase();
            const nom=document.getElementById('f-nom').value.trim().toLowerCase();
            const tel=document.getElementById('f-tel').value.replace(/\s/g,'');
            const dw=document.getElementById('duplicate-warn');if(!dw)return;
            const dups=allClients.filter(cl=>{
                if(c&&cl.id===c.id)return false;
                const sameName=(cl.prenom||'').toLowerCase()===prenom&&(cl.nom||'').toLowerCase()===nom&&prenom&&nom;
                const sameTel=tel.length>=6&&cl.telephone&&cl.telephone.replace(/\s/g,'')===tel;
                return sameName||sameTel;
            });
            if(dups.length>0){dw.innerHTML='<div class="duplicate-warning">'+icon('zap',16)+' <strong>Doublon possible</strong>'+dups.map(d=>esc(d.prenom)+' '+esc(d.nom)+(d.telephone?' ('+esc(d.telephone)+')':'')).join(', ')+' existe déjà.</div>'}else{dw.innerHTML=''}
        };
        ['f-prenom','f-nom','f-tel'].forEach(id=>document.getElementById(id)?.addEventListener('input',checkDup));
        checkDup();
        document.getElementById('btn-save-client').addEventListener('click',async()=>{
            const prenom=document.getElementById('f-prenom').value.trim();const nom=document.getElementById('f-nom').value.trim();
            if(!prenom||!nom){toast('Prénom et nom obligatoires','danger');return}
            const data={id:c?c.id:uuid(),prenom,nom,telephone:document.getElementById('f-tel').value.trim(),adresse:{rue:document.getElementById('f-rue').value.trim(),codePostal:document.getElementById('f-cp').value.trim(),ville:document.getElementById('f-ville').value.trim(),quartier:document.getElementById('f-quartier').value.trim()},notes:document.getElementById('f-notes').value.trim(),creeLe:c?c.creeLe:new Date().toISOString(),modifieLe:new Date().toISOString()};
            await this.db.put(CONFIG.STORES.CLIENTS,data);this.closeModal();toast(isE?'Cliente modifiée':'Cliente ajoutée');
            // Géocodage automatique en arrière-plan si adresse renseignée et non encore géocodée
            const addrStr=[data.adresse.rue,data.adresse.codePostal,data.adresse.ville].filter(Boolean).join(', ');
            const prevAdresse=c&&c.adresse?c.adresse:{};
            const adresseChanged=!c||!c._lat||prevAdresse.rue!==data.adresse.rue||prevAdresse.ville!==data.adresse.ville;
            if(addrStr&&adresseChanged){
                const dataSnapshot={...data};
                this.geocodeAddress(addrStr).then(coords=>{if(coords){dataSnapshot._lat=coords.lat;dataSnapshot._lng=coords.lng;this.db.put(CONFIG.STORES.CLIENTS,dataSnapshot).catch(()=>{})}}).catch(()=>{});
            }
            this.currentView==='client-detail'?this.navigate('client-detail',{clientId:data.id}):this.navigate('clients');
        });
    }

    async deleteClient(clientId){
        const c=await this.db.get(CONFIG.STORES.CLIENTS,clientId);if(!c)return;
        this.confirm('Supprimer '+c.prenom+' '+c.nom+' et toutes ses fiches ?',async()=>{
            const fiches=await this.db.getAllByIndex(CONFIG.STORES.FICHES,'clientId',clientId);
            for(const f of fiches)await this.db.delete(CONFIG.STORES.FICHES,f.id);
            await this.db.delete(CONFIG.STORES.CLIENTS,clientId);toast('Cliente supprimée');this.navigate('clients');
        });
    }

    /* ================================================================
       FORMULAIRE FICHE TECHNIQUE — Stepper 4 étapes

    async openFicheForm(clientId,ficheId){
        let f=null;if(ficheId)f=await this.db.get(CONFIG.STORES.FICHES,ficheId);
        const isE=!!f;const n=(f&&f.natureCheveu)||{};const fms=(f&&f.formules)||[];
        const selPs=(f&&f.prestations)||[];
        const selOpts=(list,sel)=>'<option value="">—</option>'+list.map(v=>'<option value="'+v+'"'+(v===sel?' selected':'')+'>'+v+'</option>').join('');
        const psHTML=getPrestations().map(p=>'<label class="checkbox-item"><input type="checkbox" value="'+esc(p)+'"'+(selPs.includes(p)?' checked':'')+'>'+esc(p)+'</label>').join('');
        let currentStep=0;const steps=['Diagnostic','Prestations','Formules','Résultat'];
        const stepIcons=['scissors','scissors','palette','file-text'];
        const stepperHTML='<div class="fiche-stepper" id="ff-stepper">'+steps.map((s,i)=>'<button class="fiche-step'+(i===0?' active':'')+'\" data-step="'+i+'" type="button"><span class="step-num">'+(i+1)+'</span>'+s+'</button>').join('')+'</div>';
        const body=stepperHTML
            // Étape 0 — Diagnostic
            +'<div class="fiche-step-panel active" data-step="0">'
            +'<div class="form-row"><div class="form-group"><label class="form-label">Date *</label><input type="date" class="form-input" id="ff-date" value="'+(f?f.date.slice(0,10):ymd(new Date()))+'"></div><div class="form-group"><label class="form-label">Tarif (€)</label><input type="number" step="0.01" min="0" class="form-input" id="ff-tarif" value="'+(f?f.tarif||'':'')+'"></div></div>'
            +'<div class="form-row-3"><div class="form-group"><label class="form-label">Type</label><select class="form-select" id="ff-type">'+selOpts(CONFIG.NATURE_CHEVEU.type,n.type)+'</select></div><div class="form-group"><label class="form-label">Texture</label><select class="form-select" id="ff-texture">'+selOpts(CONFIG.NATURE_CHEVEU.texture,n.texture)+'</select></div><div class="form-group"><label class="form-label">Porosité</label><select class="form-select" id="ff-porosite">'+selOpts(CONFIG.NATURE_CHEVEU.porosite,n.porosite)+'</select></div></div>'
            +'<div class="form-row-3"><div class="form-group"><label class="form-label">État</label><select class="form-select" id="ff-etat">'+selOpts(CONFIG.NATURE_CHEVEU.etat,n.etat)+'</select></div><div class="form-group"><label class="form-label">Cuir chevelu</label><select class="form-select" id="ff-cuir">'+selOpts(CONFIG.NATURE_CHEVEU.cuirChevelu,n.cuirChevelu)+'</select></div><div class="form-group"><label class="form-label">% Blancs</label><input type="number" min="0" max="100" class="form-input" id="ff-blancs" value="'+(n.pourcentageBlancs??'')+'"></div></div>'
            +'<div class="form-group"><label class="form-label">Diagnostic libre</label><textarea class="form-textarea" id="ff-diagnostic">'+esc(f?.diagnostic||'')+'</textarea></div>'
            +'<div class="fiche-step-nav"><div style="flex:1"></div><button class="btn btn-primary" id="ff-next-0" type="button">Suivant '+icon('chevron-right',14)+'</button></div></div>'
            // Étape 1 — Prestations
            +'<div class="fiche-step-panel" data-step="1">'
            +'<div class="checkbox-grid" id="ff-prestations">'+psHTML+'</div>'
            +'<div class="form-group" style="margin-top:10px"><input type="text" class="form-input" id="ff-presta-custom" placeholder="Autre (Entrée pour ajouter)"></div>'
            +'<div class="fiche-step-nav"><button class="btn btn-secondary" id="ff-prev-1" type="button">'+icon('chevron-left',14)+' Précédent</button><div style="flex:1"></div><button class="btn btn-primary" id="ff-next-1" type="button">Suivant '+icon('chevron-right',14)+'</button></div></div>'
            // Étape 2 — Formules
            +'<div class="fiche-step-panel" data-step="2">'
            +'<div class="form-section-title">'+icon('palette',16)+' Formules de coloration <button class="btn btn-sm btn-secondary" id="btn-add-formule" type="button" style="margin-left:auto">'+icon('plus',14)+' Ajouter</button></div>'
            +'<div class="formules-container" id="ff-formules">'+fms.map((fm,i)=>this.renderFormuleEntry(fm,i)).join('')+'</div>'
            +'<div class="fiche-step-nav"><button class="btn btn-secondary" id="ff-prev-2" type="button">'+icon('chevron-left',14)+' Précédent</button><div style="flex:1"></div><button class="btn btn-primary" id="ff-next-2" type="button">Suivant '+icon('chevron-right',14)+'</button></div></div>'
            // Étape 3 — Résultat & Photos
            +'<div class="fiche-step-panel" data-step="3">'
            +'<div class="form-group"><label class="form-label">Produits utilisés</label><textarea class="form-textarea" id="ff-produits">'+esc(f?.produits||'')+'</textarea></div>'
            +'<div class="form-group"><label class="form-label">Résultat obtenu</label><textarea class="form-textarea" id="ff-resultat">'+esc(f?.resultat||'')+'</textarea></div>'
            +'<div class="form-section-title">'+icon('eye',16)+' Photos avant / après</div>'
            +'<div class="form-group"><div class="photo-upload-area"><button class="btn btn-sm btn-secondary" type="button" id="btn-add-photo">'+icon('plus',14)+' Ajouter photo</button><input type="file" accept="image/*" id="ff-photo-input" style="display:none" multiple></div><div class="photo-preview" id="ff-photo-preview"></div></div>'
            +'<div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="ff-notes">'+esc(f?.notes||'')+'</textarea></div>'
            +'<div class="fiche-step-nav"><button class="btn btn-secondary" id="ff-prev-3" type="button">'+icon('chevron-left',14)+' Précédent</button><div style="flex:1"></div><button class="btn btn-primary" id="btn-save-fiche" type="button">'+icon('check',14)+' '+(isE?'Enregistrer':'Créer')+'</button></div></div>';
        this.openModal(icon(isE?'edit':'plus',20)+' '+(isE?'Modifier la fiche':'Nouvelle fiche'),body,'');
        // Logique stepper
        const goTo=(step)=>{
            currentStep=step;
            document.querySelectorAll('.fiche-step').forEach((el,i)=>{el.classList.toggle('active',i===step);el.classList.toggle('done',i<step)});
            document.querySelectorAll('.fiche-step-panel').forEach(el=>el.classList.toggle('active',parseInt(el.dataset.step)===step));
            // Scroll en haut de la modale à chaque changement d'étape
            const mb=document.querySelector('#modal-body');if(mb)mb.scrollTop=0;
        };
        document.querySelectorAll('.fiche-step').forEach(btn=>btn.addEventListener('click',()=>goTo(parseInt(btn.dataset.step))));
        document.getElementById('ff-next-0')?.addEventListener('click',()=>goTo(1));
        document.getElementById('ff-prev-1')?.addEventListener('click',()=>goTo(0));
        document.getElementById('ff-next-1')?.addEventListener('click',()=>goTo(2));
        document.getElementById('ff-prev-2')?.addEventListener('click',()=>goTo(1));
        document.getElementById('ff-next-2')?.addEventListener('click',()=>goTo(3));
        document.getElementById('ff-prev-3')?.addEventListener('click',()=>goTo(2));

    /* ================================================================
       UTILITAIRES DATES (Agenda)
       ================================================================ */
    getMonday(d){const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);return new Date(dt.getFullYear(),dt.getMonth(),diff)}
    getWeekDates(off){const m=this.getMonday(new Date());m.setDate(m.getDate()+off*7);const days=[];for(let i=0;i<7;i++){const d=new Date(m);d.setDate(m.getDate()+i);days.push(d)}return days}
    dayName(d){return d.toLocaleDateString('fr-FR',{weekday:'long'})}
    formatTime(h){return h||'—'}
    addMinutes(h,m){if(!h)return '';const[hh,mm]=h.split(':').map(Number);let t=hh*60+mm+m;if(t<0)t=0;if(t>1439)t=1439;return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0')}
    subMinutes(h,m){return this.addMinutes(h,-m)}

        const days=this.getWeekDates(weekOffset);

    async _renderMoisAgenda(view,monthOffset,allRdv,cMap,todayStr,selectedDay){
        this._lastSelectedDay=selectedDay||null;
        // monthOffset réutilise le paramètre weekOffset comme décalage de mois
        const now=new Date();
        const base=new Date(now.getFullYear(),now.getMonth()+monthOffset,1);
        const year=base.getFullYear();const month=base.getMonth();
        const monthLabel=base.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
        // Premier jour de la grille : lundi de la semaine contenant le 1er
        const firstDay=new Date(year,month,1);
        let startOffset=firstDay.getDay()-1;if(startOffset<0)startOffset=6;// lundi=0
        const gridStart=new Date(year,month,1-startOffset);
        // Compter les RDV par jour
        const rdvByDay={};
        allRdv.forEach(r=>{if(!rdvByDay[r.date])rdvByDay[r.date]=[];rdvByDay[r.date].push(r)});
        // Construire 6 semaines (42 jours)
        let gridHTML='';
        for(let i=0;i<42;i++){
            const d=new Date(gridStart);d.setDate(gridStart.getDate()+i);
            const ds=ymd(d);const inMonth=d.getMonth()===month;const isToday=ds===todayStr;const isSel=ds===selectedDay;
            const dayRdvs=(rdvByDay[ds]||[]).sort((a,b)=>(a.heureDebut||'').localeCompare(b.heureDebut||''));
            // Pastilles : max 4 affichées, sinon +N

            if(dayRdvs.length>maxDots)dotsHTML+='<span class="month-cal-more">+'+(dayRdvs.length-maxDots)+'</span>';
            gridHTML+='<div class="month-cal-day'+(inMonth?'':' other-month')+(isToday?' today':'')+(isSel?' selected':'')+'" onclick="app.renderAgenda('+monthOffset+',\'mois\',\''+ds+'\')">'
                +'<span class="month-cal-daynum">'+d.getDate()+'</span>'
                +(dotsHTML?'<span class="month-cal-dots">'+dotsHTML+'</span>':'')

        const weekdays=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
        const navHTML='<div class="agenda-nav"><button class="btn btn-secondary btn-sm" onclick="app.renderAgenda('+(monthOffset-1)+',\'mois\')">'+icon('chevron-left',16)+'</button><div class="agenda-nav-center"><span class="agenda-week-label" style="text-transform:capitalize">'+monthLabel+'</span>'+(monthOffset!==0?'<button class="btn btn-ghost btn-sm" onclick="app.renderAgenda(0,\'mois\')">Aujourd\'hui</button>':'')+'</div>'+this._agendaViewToggle(monthOffset,'mois')+'<button class="btn btn-secondary btn-sm" onclick="app.renderAgenda('+(monthOffset+1)+',\'mois\')">'+icon('chevron-right',16)+'</button></div>';
        const calHTML='<div class="month-cal"><div class="month-cal-weekdays">'+weekdays.map(w=>'<div class="month-cal-weekday">'+w+'</div>').join('')+'</div><div class="month-cal-grid">'+gridHTML+'</div></div>';
        // Détail du jour sélectionné
        let detailHTML='';
        if(selectedDay){
            const selDate=new Date(selectedDay+'T12:00:00');
            const dayRdvs=(rdvByDay[selectedDay]||[]).sort((a,b)=>(a.heureDebut||'').localeCompare(b.heureDebut||''));

            }else{

                    const cl=cMap[rdv.clientId];const nom=cl?cl.prenom+' '+cl.nom:'Inconnue';const ville=cl&&cl.adresse?cl.adresse.ville:'';
                    const bA=rdv.bufferAvant||0;const bAp=rdv.bufferApres||0;const dep=bA>0?this.subMinutes(rdv.heureDebut,bA):'';const ret=bAp>0?this.addMinutes(rdv.heureFin||rdv.heureDebut,bAp):'';
                    detailHTML+='<div class="rdv-card statut-'+(rdv.statut||'planifie')+'"><div class="rdv-time-block"><div class="rdv-time">'+this.formatTime(rdv.heureDebut)+'</div><div class="rdv-time-end">'+this.formatTime(rdv.heureFin)+'</div>'+(bA>0?'<div class="rdv-buffer-tag">'+icon('car',11)+' '+bA+'m</div>':'')+(bAp>0?'<div class="rdv-buffer-tag">'+icon('car',11)+' '+bAp+'m</div>':'')+'</div><div class="rdv-body"><div class="rdv-name">'+esc(nom)+' <span class="status-badge status-'+(rdv.statut||'planifie')+'">'+CONFIG.STATUTS_RDV[rdv.statut||'planifie']+'</span></div>'+((rdv.prestationsPrevues||[]).length>0?'<div class="rdv-prestations">'+(rdv.prestationsPrevues||[]).map(p=>esc(p)).join(', ')+'</div>':'')+((rdv.adresse||ville)?'<div class="rdv-address">'+icon('map-pin',12)+' '+esc(rdv.adresse||ville)+'</div>':'')+(dep||ret?'<div class="rdv-depart-retour">'+(dep?'<span>Départ: '+dep+'</span>':'')+(ret?'<span>Retour: '+ret+'</span>':'')+'</div>':'')+'</div><div class="rdv-actions">'+((rdv.statut||'planifie')==='planifie'?'<button class="btn btn-ghost btn-sm" onclick="app.quickCompleteRdv(\''+rdv.id+'\')" style="color:var(--success)" title="Marquer terminé">'+icon('check',15)+'</button>':'')+'<button class="btn btn-ghost btn-sm" onclick="app.openRdvForm(\''+rdv.id+'\')">'+icon('edit',15)+'</button><button class="btn btn-ghost btn-sm" onclick="app.deleteRdv(\''+rdv.id+'\')" style="color:var(--danger)">'+icon('trash',15)+'</button></div></div>';

    async _renderTimeline(view,navHTML,days,allRdv,cMap,todayStr){
        const START_H=7;const END_H=22;const PX_PER_MIN=1;
        const hToY=(h,m)=>(h-START_H)*60*PX_PER_MIN+(m||0)*PX_PER_MIN;
        const parseHM=(s)=>{if(!s)return null;const[h,m]=s.split(':').map(Number);return{h,m}};
        const now=new Date();const nowY=hToY(now.getHours(),now.getMinutes());const isThisWeek=days.some(d=>ymd(d)===todayStr);
        // Calcul des colonnes par CLUSTER de chevauchement (pas par événement isolé)
        const assignColumns=(rdvList)=>{
            const evs=rdvList.map(r=>{const st=parseHM(r.heureDebut);const en=parseHM(r.heureFin||r.heureDebut);let top=st?hToY(st.h,st.m):null;let bot=en?hToY(Math.max(en.h,st?st.h:0),en.h<(st?st.h:0)?30:en.m):null;
                // Durée minimale 30 min pour la détection de chevauchement (RDV sans heure de fin)
                if(top!==null&&bot!==null&&bot<=top)bot=top+30;
                return{rdv:r,top,bot,col:0,ncols:1}}).filter(e=>e.top!==null&&e.top>=0&&e.top<(END_H-START_H)*60);
            evs.sort((a,b)=>a.top-b.top);
            // Attribution de la colonne pour chaque événement (première colonne libre)
            for(let i=0;i<evs.length;i++){
                const usedCols=new Set();
                for(let j=0;j<i;j++){if(evs[j].bot>evs[i].top)usedCols.add(evs[j].col)}
                let col=0;while(usedCols.has(col))col++;
                evs[i].col=col;
            }
            // Groupement en clusters de chevauchement
            // Un cluster = ensemble d'événements où chaque paire est connectée directement ou transitivement
            const clusters=[];
            const eventCluster=new Map();
            for(let i=0;i<evs.length;i++){
                let cluster=null;
                for(let j=0;j<i;j++){
                    if(evs[j].bot>evs[i].top){
                        const jc=eventCluster.get(j);
                        if(jc!==undefined){cluster=cluster===null?jc:Math.min(cluster,jc)}
                    }
                }
                if(cluster===null){cluster=clusters.length;clusters.push([])}
                // Si on a fusionné des clusters, faire la mise à jour
                for(let j=0;j<i;j++){
                    if(evs[j].bot>evs[i].top){
                        const jc=eventCluster.get(j);
                        if(jc!==undefined&&jc!==cluster){
                            // Fusion : réassigner tous les événements du cluster jc vers cluster
                            clusters[jc].forEach(idx=>{eventCluster.set(idx,cluster);clusters[cluster].push(idx)});
                            clusters[jc]=[];
                        }
                    }
                }
                eventCluster.set(i,cluster);
                clusters[cluster].push(i);
            }
            // ncols = largeur du cluster (nombre de colonnes utilisées dans ce cluster)
            clusters.forEach(cluster=>{
                if(cluster.length===0)return;
                const maxCol=Math.max(...cluster.map(idx=>evs[idx].col));
                const ncols=maxCol+1;
                cluster.forEach(idx=>{evs[idx].ncols=ncols});
            });
            return evs;
        };
        let colsHTML='';
        days.forEach((day,di)=>{
            const ds=ymd(day);const isT=ds===todayStr;
            const rdvs=allRdv.filter(r=>r.date===ds).sort((a,b)=>(a.heureDebut||'').localeCompare(b.heureDebut||''));
            const evs=assignColumns(rdvs);
            let eventsHTML='';
            evs.forEach(({rdv,top,bot,col,ncols})=>{
                const cl=cMap[rdv.clientId];const nom=cl?cl.prenom+' '+cl.nom:'?';
                const durationPx=Math.max((bot||top+60)-top,24);
                const statut=rdv.statut||'planifie';
                // Positionnement avec décalage de colonne
                const pct=100/ncols;const left=col*pct;const width=pct;
                eventsHTML+='<div class="timeline-event '+statut+'" style="top:'+top+'px;height:'+durationPx+'px;left:'+left+'%;width:calc('+width+'% - 2px)" onclick="app.openRdvForm(\''+rdv.id+'\')" title="'+esc(nom)+'"><div class="ev-name">'+esc(cl?cl.prenom:nom)+'</div>'+(rdv.heureDebut?'<div class="ev-time">'+rdv.heureDebut+(rdv.heureFin?'→'+rdv.heureFin:'')+'</div>':'')+(durationPx>40&&(rdv.prestationsPrevues||[]).length>0?'<div class="ev-presta">'+(rdv.prestationsPrevues||[]).slice(0,2).map(p=>esc(p)).join(', ')+'</div>':'')+'</div>';
                const bA=rdv.bufferAvant||0;const bAp=rdv.bufferApres||0;
                if(bA>0)eventsHTML+='<div class="timeline-buffer" style="top:'+(top-bA*PX_PER_MIN)+'px;height:'+(bA*PX_PER_MIN)+'px;left:'+left+'%;width:'+width+'%"></div>';
                if(bAp>0)eventsHTML+='<div class="timeline-buffer" style="top:'+(top+durationPx)+'px;height:'+(bAp*PX_PER_MIN)+'px;left:'+left+'%;width:'+width+'%"></div>';
            });
            for(let hh=START_H;hh<END_H;hh++){
                eventsHTML+='<div class="timeline-slot" style="top:'+hToY(hh,0)+'px" onclick="app.openRdvFormAt(\''+ds+'\',' +hh+')"></div>';
                eventsHTML+='<div class="timeline-slot half" style="top:'+hToY(hh,30)+'px"></div>';
            }
            if(isT&&isThisWeek&&nowY>=0&&nowY<(END_H-START_H)*60)eventsHTML+='<div class="timeline-now-line" style="top:'+nowY+'px"></div>';
            colsHTML+='<div class="timeline-day-col"><div class="timeline-day-header'+(isT?' today':'')+'"><div class="th-name">'+this.dayName(day).slice(0,3).toUpperCase()+'</div><div class="th-num">'+day.getDate()+'</div></div><div class="timeline-grid" style="height:'+((END_H-START_H)*60)+'px;position:relative">'+eventsHTML+'</div></div>';
        });
        let hoursHTML='<div style="padding-top:52px">'+Array.from({length:END_H-START_H},(_,i)=>'<div class="timeline-hour-label">'+(START_H+i)+'h</div>').join('')+'</div>';
        view.innerHTML=navHTML+'<div class="timeline-wrap"><div class="timeline-hours">'+hoursHTML+'</div><div class="timeline-days">'+colsHTML+'</div></div>';
        setTimeout(()=>{const tl=view.querySelector('.timeline-days');if(tl)tl.scrollTop=hToY(8,0)},100);
    }

        const h=String(hour).padStart(2,'0')+':00';
        const hFin=String(Math.min(hour+1,23)).padStart(2,'0')+':30';
        this._rdvFormPreset={date,heureDebut:h,heureFin:hFin};
