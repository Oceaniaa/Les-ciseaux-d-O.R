<style>
/* ================================================================
   DESIGN SYSTEM v3 — Variables thème clair
   ================================================================ */
:root {
    /* Brand */
    --primary: #B4687D;
    --primary-soft: rgba(180,104,125,0.09);
    --primary-muted: rgba(180,104,125,0.16);
    --primary-light: #CFA0AE;
    --primary-lighter: #F5E8EC;
    --primary-dark: #8F4A5E;
    --accent: #C9975D;
    --accent-soft: rgba(201,151,93,0.10);
    --accent-light: #F2DFC8;
    --success: #2EA86E;
    --success-soft: rgba(46,168,110,0.10);
    --success-light: #D6F5E9;
    --warning: #D4922A;
    --warning-soft: rgba(212,146,42,0.10);
    --danger: #C94646;
    --danger-soft: rgba(201,70,70,0.10);
    /* Surfaces light */
    --bg: #F3F2F0;
    --bg-secondary: #ECEAE6;
    --surface: #FFFFFF;
    --surface-2: #F8F7F5;
    --surface-hover: #F5F4F2;
    /* Text light */
    --text: #18171F;
    --text-secondary: #52506A;
    --text-muted: #8E8AA0;
    /* Borders light */
    --border: #E2DED8;
    --border-light: #EDEBE8;
    --border-focus: var(--primary);
    /* Sidebar */
    --sidebar-bg: #16151F;
    --sidebar-surface: #1D1C28;
    --sidebar-text: #9896A8;
    --sidebar-text-active: #FFFFFF;
    --sidebar-hover: rgba(255,255,255,0.05);
    --sidebar-active: rgba(180,104,125,0.18);
    /* Radii */
    --radius-xs: 4px;
    --radius-sm: 7px;
    --radius: 11px;
    --radius-lg: 15px;
    --radius-xl: 22px;
    --radius-full: 9999px;
    /* Shadows light */
    --shadow-1: 0 1px 2px rgba(24,23,31,0.04), 0 1px 4px rgba(24,23,31,0.04);
    --shadow-2: 0 2px 8px rgba(24,23,31,0.06), 0 6px 20px rgba(24,23,31,0.04);
    --shadow-3: 0 8px 32px rgba(24,23,31,0.10), 0 2px 8px rgba(24,23,31,0.06);
    --shadow-glow: 0 0 0 3px var(--primary-soft);
    /* Typography */
    --font: 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    /* Transitions */
    --transition-fast: 0.14s ease;
    --transition: 0.24s cubic-bezier(0.4,0,0.2,1);
    --transition-spring: 0.3s cubic-bezier(0.34,1.56,0.64,1);
    /* Layout */
    --sidebar-w: 236px;
    --sidebar-w-collapsed: 64px;
    --topbar-h: 60px;
    --mobile-nav-h: 66px;
}

/* ================================================================
   DARK MODE v2 — Palette soigneusement choisie
   ================================================================ */
[data-theme="dark"] {
    /* Brand — légèrement désaturé pour le dark */
    --primary: #C07A8E;
    --primary-soft: rgba(192,122,142,0.13);
    --primary-muted: rgba(192,122,142,0.22);
    --primary-light: #A86278;
    --primary-lighter: rgba(192,122,142,0.08);
    --primary-dark: #D4A0B0;
    --accent: #D4A46A;
    --accent-soft: rgba(212,164,106,0.13);
    --accent-light: rgba(212,164,106,0.08);
    --success: #3DBF7E;
    --success-soft: rgba(61,191,126,0.13);
    --success-light: rgba(61,191,126,0.08);
    --warning: #E0A83E;
    --warning-soft: rgba(224,168,62,0.13);
    --danger: #E05555;
    --danger-soft: rgba(224,85,85,0.13);
    /* Surfaces dark — 3 niveaux clairs et distincts */
    --bg: #0F0E17;
    --bg-secondary: #151421;
    --surface: #1F1E2D;
    --surface-2: #262535;
    --surface-hover: #2B2A3C;
    /* Text dark — chaud, pas bleuté */
    --text: #EDE9F4;
    --text-secondary: #9894AA;
    --text-muted: #7E7A92;
    /* Borders dark — subtiles mais visibles */
    --border: #2E2C3E;
    --border-light: #262535;
    /* Sidebar dark */
    --sidebar-bg: #0D0C16;
    --sidebar-surface: #13121E;
    --sidebar-text: #908CA0;
    --sidebar-text-active: #FFFFFF;
    --sidebar-hover: rgba(255,255,255,0.04);
    --sidebar-active: rgba(192,122,142,0.15);
    /* Shadows dark */
    --shadow-1: 0 1px 3px rgba(0,0,0,0.35);
    --shadow-2: 0 4px 16px rgba(0,0,0,0.40);
    --shadow-3: 0 8px 36px rgba(0,0,0,0.55);
    --shadow-glow: 0 0 0 3px rgba(192,122,142,0.18);
}

/* ================================================================
   RESET & BASE
   ================================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button{cursor:pointer;font-family:inherit;border:none;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:inherit;font-size:inherit}
a{text-decoration:none;color:inherit}
::selection{background:var(--primary-soft);color:var(--primary-dark)}

/* ================================================================
   FACTURES
   ================================================================ */
.facture-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:8px;display:flex;gap:14px;align-items:center;transition:all var(--transition-fast)}
.facture-card:hover{box-shadow:var(--shadow-2);border-color:var(--primary-light)}
.facture-num{font-size:0.76rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;min-width:70px}
.facture-client{flex:1;min-width:0}
.facture-client strong{font-size:0.88rem;font-weight:700;display:block}
.facture-client span{font-size:0.73rem;color:var(--text-muted)}
.facture-montant{font-size:1.05rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent)}
.facture-statut{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--radius-full);font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap}
.fs-payee{background:var(--success-soft);color:var(--success)}
.fs-attente{background:var(--warning-soft);color:var(--warning)}
.fs-annulee{background:var(--danger-soft);color:var(--danger)}
/* Impression facture */
@media print{
    #sidebar,#topbar,#mobile-nav,#search-overlay,.modal-overlay,.confirm-overlay,.btn-no-print{display:none!important}
    #main{padding:0!important}
    #view{padding:0!important;overflow:visible!important}
    .print-only{display:block!important}
    body{overflow:visible!important;height:auto!important}
    #app{height:auto!important;overflow:visible!important}
}
.print-only{display:none}
.facture-print{font-family:var(--font);max-width:700px;margin:0 auto;padding:40px}
.facture-print-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid var(--primary)}
.facture-print-from h2{font-size:1.3rem;font-weight:800;color:var(--primary);margin-bottom:4px}
.facture-print-from p{font-size:0.82rem;color:var(--text-secondary);line-height:1.6}
.facture-print-meta{text-align:right}
.facture-print-meta h3{font-size:1.5rem;font-weight:900;color:var(--text);letter-spacing:-0.03em}
.facture-print-meta p{font-size:0.82rem;color:var(--text-secondary)}
.facture-print-to{background:var(--bg-secondary);border-radius:var(--radius);padding:14px 18px;margin-bottom:24px}
.facture-print-to h4{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);font-weight:700;margin-bottom:5px}
.facture-print-to p{font-size:0.88rem;color:var(--text);font-weight:600}
.facture-print-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.facture-print-table th{background:var(--primary);color:#FFF;padding:9px 14px;text-align:left;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.04em}
.facture-print-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:0.85rem}
.facture-print-table tr:last-child td{border-bottom:none}
.facture-print-totals{text-align:right;margin-bottom:24px}
.facture-print-totals .total-line{display:flex;justify-content:flex-end;gap:24px;font-size:0.85rem;margin-bottom:4px}
.facture-print-totals .total-grand{font-size:1.1rem;font-weight:800;color:var(--primary);border-top:2px solid var(--primary);padding-top:8px;margin-top:4px}
.facture-print-footer{font-size:0.72rem;color:var(--text-muted);text-align:center;border-top:1px solid var(--border);padding-top:16px;line-height:1.8}

/* Paiement badge dans fiche */
.paiement-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--radius-full);font-size:0.68rem;font-weight:700;cursor:pointer;border:none;transition:all var(--transition-fast)}
.paiement-paye{background:var(--success-soft);color:var(--success)}
.paiement-attente{background:var(--warning-soft);color:var(--warning)}

/* ================================================================
   STATISTIQUES AVANCÉES
   ================================================================ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.stat-insight{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden;transition:all var(--transition-fast)}
.stat-insight:hover{box-shadow:var(--shadow-2);transform:translateY(-1px)}
.stat-insight-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);font-weight:700;margin-bottom:5px}
.stat-insight-val{font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;color:var(--text)}
.stat-insight-sub{font-size:0.72rem;color:var(--text-secondary);margin-top:3px}
.stat-insight-icon{position:absolute;right:14px;top:14px;opacity:0.1;color:var(--primary)}
.projection-bar{height:8px;background:var(--bg-secondary);border-radius:4px;overflow:hidden;margin-top:8px}
.projection-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width 0.6s ease}

/* ================================================================
   PWA INSTALL BANNER
   ================================================================ */
.pwa-banner{display:none;position:fixed;bottom:calc(var(--mobile-nav-h) + 10px);left:10px;right:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow-3);z-index:300;gap:12px;align-items:center;animation:toastIn .3s cubic-bezier(.34,1.56,.64,1)}
.pwa-banner.show{display:flex}
.pwa-banner-text{flex:1;min-width:0}
.pwa-banner-text strong{display:block;font-size:.86rem;font-weight:700}
.pwa-banner-text span{font-size:.74rem;color:var(--text-muted)}
@media(min-width:769px){.pwa-banner{left:auto;right:20px;max-width:340px;bottom:20px}}
   ================================================================ */
[data-theme="dark"] .rdv-card{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .rdv-card:hover{background:var(--surface-hover);border-color:var(--primary)}
[data-theme="dark"] .rdv-card.statut-termine{background:var(--surface-2);border-color:var(--border)}
[data-theme="dark"] .rdv-time{color:var(--text)}
[data-theme="dark"] .rdv-time-end{color:var(--text-secondary)}
[data-theme="dark"] .rdv-client-name{color:var(--text)}
[data-theme="dark"] .rdv-prestations{color:var(--text-secondary)}
[data-theme="dark"] .rdv-buffer-tag{color:var(--warning);background:var(--warning-soft)}
[data-theme="dark"] .fiche-card{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .fiche-date{color:var(--primary)}
[data-theme="dark"] .today-stop{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .today-name{color:var(--text)}
[data-theme="dark"] .today-presta{color:var(--text-secondary)}
[data-theme="dark"] .today-time{color:var(--primary)}
[data-theme="dark"] .recent-item{background:var(--surface)}
[data-theme="dark"] .stat-box{background:var(--surface)}
[data-theme="dark"] .booked-slot{background:var(--surface-2);border-color:var(--border)}
[data-theme="dark"] .ik-settings-panel{background:var(--surface-2)}
[data-theme="dark"] .kpi-card{background:var(--surface)}
[data-theme="dark"] .formule-row{background:var(--surface-2)}
[data-theme="dark"] .formule-entry{background:var(--surface-2);border-color:var(--border)}
[data-theme="dark"] .search-result:hover,[data-theme="dark"] .search-result:focus{background:var(--surface-2)}
[data-theme="dark"] .route-stop-num{box-shadow:none}
[data-theme="dark"] .frais-table{background:var(--surface)}
[data-theme="dark"] .frais-table tbody tr:hover{background:var(--surface-hover)}
[data-theme="dark"] .chart-container{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .ca-gauge-wrap{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .route-summary{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .form-section-title{background:linear-gradient(90deg,var(--primary-soft) 0%,transparent 100%);color:var(--primary)}
[data-theme="dark"] .bilan-tab.active{background:var(--surface-2)}

/* ================================================================
   AGENDA — Timeline view
   ================================================================ */
.agenda-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:10px}
.agenda-nav-center{display:flex;align-items:center;gap:12px}
.agenda-week-label{font-size:.9rem;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
.agenda-view-toggle{display:flex;background:var(--bg-secondary);border-radius:var(--radius-sm);padding:2px;gap:2px;border:1.5px solid var(--border)}
.agenda-view-btn{padding:5px 12px;border-radius:calc(var(--radius-sm) - 2px);font-size:.74rem;font-weight:700;background:none;border:none;cursor:pointer;color:var(--text-muted);transition:all var(--transition-fast)}
.agenda-view-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-1)}

/* ================================================================
   AGENDA — VUE MOIS (type SimpleCal)
   ================================================================ */
.month-cal{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-1)}
.month-cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg-secondary);border-bottom:1px solid var(--border)}
.month-cal-weekday{text-align:center;padding:8px 2px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted)}
.month-cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.month-cal-day{aspect-ratio:1;border-right:1px solid var(--border-light);border-bottom:1px solid var(--border-light);padding:5px 4px 4px;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;transition:background var(--transition-fast);min-height:44px}
.month-cal-day:nth-child(7n){border-right:none}
.month-cal-day:hover{background:var(--bg-secondary)}
.month-cal-day.other-month{opacity:.32}
.month-cal-day.selected{background:var(--primary-soft)}
.month-cal-day.today .month-cal-daynum{background:var(--primary);color:#fff;border-radius:50%}
.month-cal-daynum{font-size:.82rem;font-weight:700;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums}
.month-cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:100%;line-height:0}
.month-cal-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.month-cal-dot.planifie{background:var(--primary)}
.month-cal-dot.termine{background:var(--success)}
.month-cal-dot.annule{background:var(--text-muted);opacity:.5}
.month-cal-more{font-size:.58rem;font-weight:800;color:var(--text-muted);line-height:1}
.month-day-detail{margin-top:16px}
.month-day-detail-header{display:flex;align-items:center;gap:8px;font-size:.92rem;font-weight:800;margin-bottom:12px;text-transform:capitalize}
.month-day-detail-header .badge-count{margin-left:auto;font-size:.72rem;font-weight:600;color:var(--text-muted);text-transform:none}
@media(max-width:768px){
    .month-cal-day{padding:3px 2px;min-height:40px}
    .month-cal-daynum{font-size:.76rem;width:22px;height:22px}
    .month-cal-dot{width:5px;height:5px}
    .month-cal-weekday{font-size:.6rem;padding:6px 1px}
}

/* ================================================================
   RECHERCHE CLIENTE (autocomplétion dans form RDV)
   ================================================================ */
.client-search-wrap{position:relative}
.client-search-selected{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--primary-soft);border:1.5px solid var(--primary-muted);border-radius:var(--radius);cursor:default}
.client-search-selected .csx-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem;flex-shrink:0}
.client-search-selected .csx-info{flex:1;min-width:0}
.client-search-selected .csx-name{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-search-selected .csx-sub{font-size:.74rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-search-clear{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:6px;flex-shrink:0;border-radius:50%;display:flex}
.client-search-clear:hover{background:var(--surface);color:var(--danger)}
.client-search-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-3);max-height:280px;overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:50;display:none}
.client-search-dropdown.open{display:block}
.client-search-group-label{padding:6px 12px 3px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);background:var(--bg-secondary);position:sticky;top:0}
.client-search-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background var(--transition-fast)}
.client-search-item:hover,.client-search-item.highlighted{background:var(--primary-soft)}
.client-search-item .csi-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg-secondary);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;flex-shrink:0}
.client-search-item .csi-info{flex:1;min-width:0}
.client-search-item .csi-name{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-search-item .csi-sub{font-size:.72rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-search-empty{padding:12px;text-align:center;color:var(--text-muted);font-size:.8rem}
.client-search-create{padding:10px 12px;border-top:1px solid var(--border-light);color:var(--primary);font-weight:700;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:6px}
.client-search-create:hover{background:var(--primary-soft)}
/* Timeline */
.timeline-wrap{display:flex;overflow-x:hidden;position:relative;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.timeline-hours{width:52px;flex-shrink:0;border-right:1px solid var(--border)}
.timeline-hour-label{height:60px;display:flex;align-items:flex-start;justify-content:center;padding-top:4px;font-size:.62rem;color:var(--text-muted);font-variant-numeric:tabular-nums;font-weight:600}
.timeline-days{display:flex;flex:1;overflow-x:auto;position:relative}
.timeline-day-col{flex:1;min-width:90px;border-right:1px solid var(--border-light);position:relative}
.timeline-day-col:last-child{border-right:none}
.timeline-day-header{text-align:center;padding:8px 4px;border-bottom:1px solid var(--border);background:var(--surface-2);position:sticky;top:0;z-index:10}
.timeline-day-header .th-name{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted)}
.timeline-day-header .th-num{font-size:1.1rem;font-weight:900;line-height:1;margin-top:2px}
.timeline-day-header.today .th-num{background:var(--primary);color:#FFF;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto 0}
.timeline-day-header.today .th-name{color:var(--primary)}
.timeline-grid{position:relative;height:900px}/* 15h × 60px */
.timeline-slot{position:absolute;left:0;right:0;height:60px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background var(--transition-fast)}
.timeline-slot:hover{background:var(--primary-soft)}
.timeline-slot.half{border-bottom:1px dashed var(--border-light);opacity:.5}
.timeline-event{position:absolute;left:3px;right:3px;border-radius:var(--radius-sm);padding:3px 7px;font-size:.7rem;overflow:hidden;cursor:pointer;border-left:3px solid transparent;box-shadow:var(--shadow-1);transition:all var(--transition-fast);z-index:5}
.timeline-event:hover{filter:brightness(1.08);box-shadow:var(--shadow-2);z-index:10}
.timeline-event.planifie{background:var(--primary-soft);border-left-color:var(--primary);color:var(--primary-dark)}
.timeline-event.termine{background:var(--success-soft);border-left-color:var(--success);color:var(--success)}
.timeline-event.annule{background:var(--bg-secondary);border-left-color:var(--border);color:var(--text-muted);opacity:.6}
.timeline-event .ev-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timeline-event .ev-time{font-size:.62rem;opacity:.8;font-variant-numeric:tabular-nums}
.timeline-event .ev-presta{font-size:.62rem;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timeline-buffer{position:absolute;left:0;right:0;background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(225,168,62,.12) 3px,rgba(225,168,62,.12) 6px);pointer-events:none}
.timeline-now-line{position:absolute;left:0;right:0;height:2px;background:var(--danger);z-index:20;pointer-events:none}
.timeline-now-line::before{content:'';position:absolute;left:0;top:-4px;width:8px;height:8px;border-radius:50%;background:var(--danger)}
[data-theme="dark"] .timeline-event.planifie{background:rgba(192,122,142,.18)}
[data-theme="dark"] .timeline-event.termine{background:rgba(61,191,126,.15)}

/* ================================================================
   FICHE CLIENTE — Onglets
   ================================================================ */
.client-tabs{display:flex;gap:3px;margin-bottom:20px;background:var(--bg-secondary);padding:3px;border-radius:var(--radius-sm);border:1.5px solid var(--border)}
.client-tab{flex:1;padding:8px 10px;border-radius:var(--radius-sm);text-align:center;font-size:.76rem;font-weight:700;cursor:pointer;background:none;color:var(--text-muted);transition:all var(--transition-fast);border:none;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
.client-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-1)}
.client-tab:hover:not(.active){color:var(--text-secondary)}
.client-tab-panel{display:none}
.client-tab-panel.active{display:block}

/* ================================================================
   FICHE TECHNIQUE — Stepper
   ================================================================ */
.fiche-stepper{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--border)}
.fiche-step{flex:1;padding:10px 6px;text-align:center;font-size:.7rem;font-weight:700;cursor:pointer;color:var(--text-muted);transition:all var(--transition-fast);border-bottom:2px solid transparent;margin-bottom:-2px;display:flex;flex-direction:column;align-items:center;gap:3px}
.fiche-step .step-num{width:22px;height:22px;border-radius:50%;background:var(--bg-secondary);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;transition:all var(--transition-fast)}
.fiche-step.active{color:var(--primary);border-bottom-color:var(--primary)}
.fiche-step.active .step-num{background:var(--primary);color:#FFF}
.fiche-step.done .step-num{background:var(--success);color:#FFF}
.fiche-step.done{color:var(--success)}
.fiche-step-panel{display:none;padding:4px 0}
.fiche-step-panel.active{display:block}
.fiche-step-nav{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border-light)}

/* ================================================================
   LISTE CLIENTES — Pagination
   ================================================================ */
.pagination{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:18px;flex-wrap:wrap}
.pagination-btn{padding:6px 12px;border-radius:var(--radius-sm);font-size:.78rem;font-weight:700;background:var(--surface);border:1.5px solid var(--border);color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast)}
.pagination-btn:hover{border-color:var(--primary-light);color:var(--primary)}
.pagination-btn.active{background:var(--primary);border-color:var(--primary);color:#FFF}
.pagination-btn:disabled{opacity:.4;cursor:not-allowed}
.pagination-info{font-size:.75rem;color:var(--text-muted);padding:0 4px}
.client-count-label{font-size:.78rem;color:var(--text-muted);margin-bottom:10px}

/* ================================================================
   GRAPHIQUES CANVAS — Tooltips & améliorations
   ================================================================ */
.chart-tooltip{position:fixed;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;font-size:.75rem;font-weight:600;pointer-events:none;box-shadow:var(--shadow-2);z-index:1000;transform:translate(-50%,-120%);white-space:nowrap;transition:opacity .1s ease}
.chart-tooltip.hidden{display:none}
.chart-wrap{position:relative;display:inline-block;width:100%}

/* ================================================================
   CARTE — Géocodage auto indicator
   ================================================================ */
.geocode-auto-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:var(--radius-full);font-size:.64rem;font-weight:700;background:var(--success-soft);color:var(--success);margin-left:6px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ================================================================
   DARK MODE — overrides nouvelles sections
   ================================================================ */
[data-theme="dark"] .timeline-wrap{background:var(--surface)}
[data-theme="dark"] .timeline-day-header{background:var(--surface-2)}
[data-theme="dark"] .timeline-slot:hover{background:var(--primary-soft)}
[data-theme="dark"] .client-tab.active{background:var(--surface-2)}
[data-theme="dark"] .fiche-step .step-num{background:var(--surface-2)}
[data-theme="dark"] .pagination-btn{background:var(--surface);border-color:var(--border)}

/* ================================================================
   MODE FOCUS RDV
   ================================================================ */
.focus-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:2000;flex-direction:column;overflow:hidden}
.focus-overlay.open{display:flex}
.focus-header{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.focus-header h2{flex:1;font-size:1.1rem;font-weight:800;letter-spacing:-.02em}
.focus-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(145deg,var(--primary),var(--primary-dark));color:#FFF;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;flex-shrink:0;box-shadow:0 2px 8px rgba(180,104,125,.3)}
.focus-body{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:16px}
.focus-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
.focus-section-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.focus-formule{background:var(--surface-2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;font-size:.82rem}
.focus-formule-zone{display:inline-block;padding:1px 8px;border-radius:var(--radius-full);background:var(--primary-soft);color:var(--primary);font-size:.68rem;font-weight:800;margin-bottom:4px}
/* Timer */
.focus-timer{text-align:center;padding:18px 0}
.focus-timer-display{font-size:3.5rem;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.04em;color:var(--primary);line-height:1}
.focus-timer-label{font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:6px}
.focus-timer-btns{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.focus-presets{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.focus-preset-btn{padding:4px 12px;border-radius:var(--radius-full);font-size:.72rem;font-weight:700;background:var(--bg-secondary);border:1.5px solid var(--border);cursor:pointer;transition:all var(--transition-fast);color:var(--text-secondary)}
.focus-preset-btn:hover{border-color:var(--primary);color:var(--primary)}
.focus-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
@media(max-width:768px){.focus-body{padding:14px}.focus-timer-display{font-size:3rem}.focus-footer{padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom))}}

/* ================================================================
   EXPORT OPTIONS MODAL
   ================================================================ */
.export-options{display:flex;flex-direction:column;gap:10px}
.export-option{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;background:var(--surface-2);transition:all var(--transition-fast)}
.export-option:hover{border-color:var(--primary-light);background:var(--surface)}
.export-option-icon{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.export-option-body strong{display:block;font-weight:700;font-size:.88rem;margin-bottom:2px}
.export-option-body span{font-size:.75rem;color:var(--text-secondary)}
.import-options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.import-option{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--surface-2);transition:all var(--transition-fast);font-size:.84rem;font-weight:600}
.import-option:hover{border-color:var(--accent);background:var(--surface)}
.import-option input{accent-color:var(--primary)}

/* ================================================================
   BILAN — Projection + Export CSV
   ================================================================ */
.projection-card{background:linear-gradient(135deg,var(--primary-soft),var(--accent-soft));border:1.5px solid var(--primary-muted);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:20px;display:flex;gap:16px;align-items:center}
.projection-card .proj-val{font-size:1.6rem;font-weight:900;font-variant-numeric:tabular-nums;color:var(--primary);letter-spacing:-.03em}
.projection-card .proj-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:700;margin-bottom:4px}
.projection-card .proj-sub{font-size:.76rem;color:var(--text-secondary);margin-top:3px}

/* ================================================================
   FICHES — Photos comparaison avant/après
   ================================================================ */
.photos-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.photos-compare-slot{position:relative;border-radius:var(--radius-sm);overflow:hidden;aspect-ratio:1;background:var(--bg-secondary);border:1.5px dashed var(--border)}
.photos-compare-slot img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.photos-compare-label{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.55);color:#FFF;font-size:.62rem;font-weight:800;padding:2px 8px;border-radius:var(--radius-full);text-transform:uppercase;letter-spacing:.04em}
.photos-compare-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:.72rem;flex-direction:column;gap:4px;cursor:pointer}

/* ================================================================
   FORMULAIRE RDV — dernière prestation inline
   ================================================================ */
.rdv-last-presta{padding:10px 14px;background:var(--primary-soft);border-radius:var(--radius-sm);margin-bottom:10px;font-size:.8rem;border-left:3px solid var(--primary)}
.rdv-last-presta strong{display:block;font-weight:700;margin-bottom:3px;color:var(--primary-dark)}

/* ================================================================
   RECHERCHE — Factures + pertinence
   ================================================================ */
.search-recency{font-size:.62rem;color:var(--text-muted);margin-left:auto;flex-shrink:0;font-variant-numeric:tabular-nums}

/* ================================================================
   ACCESSIBILITÉ — Focus visible
   ================================================================ */
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:2px}
.btn:focus-visible,.nav-item:focus-visible,.mob-tab:focus-visible{outline:2px solid var(--primary);outline-offset:2px}

/* ================================================================
   STATS AGRÉGÉES SUR FICHE CLIENT
   ================================================================ */
.client-kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.client-kpi{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;position:relative}
.client-kpi-label{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:800;margin-bottom:4px}
.client-kpi-value{font-size:1.25rem;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.02em;color:var(--text)}
.client-kpi-sub{font-size:.7rem;color:var(--text-secondary);margin-top:2px}
.client-kpi-sub.warn{color:var(--warning);font-weight:600}
.client-kpi-sub.late{color:var(--danger);font-weight:600}

/* ================================================================
   PRESTATIONS PERSONNALISÉES — Drag reorder + durée
   ================================================================ */
.presta-settings-item{cursor:grab;touch-action:none;user-select:none}
.presta-settings-item.dragging{opacity:.4;background:var(--primary-soft)}
.presta-settings-item.drag-over{border-top:2px solid var(--primary)}
.presta-settings-item .presta-move{color:var(--text-muted);font-size:.75rem;padding:0 4px;cursor:grab}
.presta-settings-item input[type="number"]{width:60px;font-size:.72rem;padding:3px 6px;text-align:right;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--surface);color:var(--text)}
.presta-settings-item input[type="number"]:focus{outline:1px solid var(--primary);outline-offset:1px}
.presta-duree-label{font-size:.66rem;color:var(--text-muted)}

/* ================================================================
   FICHES — Photos avec labels avant/pendant/après
   ================================================================ */
.photo-thumb-wrap{position:relative;display:inline-block}
.photo-thumb-wrap .photo-label-badge{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.7);color:#FFF;font-size:.6rem;font-weight:800;padding:1px 6px;border-radius:var(--radius-full);text-transform:uppercase;letter-spacing:.03em;pointer-events:none}
.photo-label-select{position:absolute;bottom:4px;left:4px;right:4px;font-size:.62rem;padding:2px 4px;border:none;background:rgba(255,255,255,.9);border-radius:var(--radius-xs);color:var(--text);font-weight:600}
.photo-label-select:focus{outline:1px solid var(--primary)}

/* ================================================================
   CARTE — Popup avec itinéraire
   ================================================================ */
.map-popup-actions{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-light)}
.map-popup-actions a{flex:1;padding:6px 10px;background:var(--primary);color:#FFF !important;text-decoration:none;text-align:center;border-radius:var(--radius-xs);font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px}
.map-popup-actions a:hover{filter:brightness(1.1)}

/* ================================================================
   MODE FOCUS — Timer persistant
   ================================================================ */
.focus-timer-resumed{background:var(--primary-soft);color:var(--primary-dark);padding:4px 10px;border-radius:var(--radius-full);font-size:.68rem;font-weight:700;display:inline-block;margin-bottom:8px}

/* ================================================================
   ONBOARDING (préparation, pas encore utilisé)
   ================================================================ */

/* ================================================================
   ONBOARDING PREMIER LANCEMENT
   ================================================================ */
.onboarding-overlay{position:fixed;inset:0;background:var(--bg);z-index:1800;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.onboarding-logo{width:64px;height:64px;background:linear-gradient(145deg,var(--primary),var(--primary-dark));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 4px 20px rgba(180,104,125,.35)}
.onboarding-title{font-size:1.5rem;font-weight:900;text-align:center;letter-spacing:-.03em;margin-bottom:6px}
.onboarding-sub{font-size:.88rem;color:var(--text-secondary);text-align:center;margin-bottom:32px;max-width:320px;line-height:1.6}
.onboarding-steps{display:flex;flex-direction:column;gap:12px;width:100%;max-width:380px;margin-bottom:28px}
.onboarding-step{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all var(--transition-fast)}
.onboarding-step:hover{border-color:var(--primary-light);transform:translateY(-1px)}
.onboarding-step.done{border-color:var(--success);background:var(--success-soft)}
.onboarding-step-num{width:32px;height:32px;border-radius:50%;background:var(--primary-soft);color:var(--primary);font-weight:900;font-size:.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--transition-fast)}
.onboarding-step.done .onboarding-step-num{background:var(--success);color:#FFF}
.onboarding-step-body strong{display:block;font-weight:700;font-size:.88rem;margin-bottom:2px}
.onboarding-step-body span{font-size:.75rem;color:var(--text-secondary)}
.onboarding-skip{font-size:.78rem;color:var(--text-muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px}

/* ================================================================
   GALERIE PHOTOS — Plein écran avec navigation
   ================================================================ */
.photo-gallery-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:3000;display:none;flex-direction:column}
.photo-gallery-overlay.open{display:flex}
.photo-gallery-header{display:flex;align-items:center;padding:12px 16px;flex-shrink:0;gap:12px}
.photo-gallery-header h3{flex:1;color:#FFF;font-size:.9rem;font-weight:700}
.photo-gallery-counter{color:rgba(255,255,255,.6);font-size:.8rem;font-variant-numeric:tabular-nums}
.photo-gallery-body{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.photo-gallery-img{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .15s}
.photo-gallery-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#FFF;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;z-index:1;-webkit-tap-highlight-color:transparent}
.photo-gallery-btn:hover{background:rgba(255,255,255,.3)}
.photo-gallery-prev{left:12px}
.photo-gallery-next{right:12px}
.photo-gallery-footer{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;justify-content:center}
.photo-gallery-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;cursor:pointer;border:2px solid transparent;opacity:.6;transition:all .2s;flex-shrink:0}
.photo-gallery-thumb.active{border-color:#FFF;opacity:1}
.photo-gallery-label-badge{display:inline-block;padding:2px 10px;background:rgba(255,255,255,.2);color:#FFF;font-size:.66rem;font-weight:800;border-radius:var(--radius-full);text-transform:uppercase;letter-spacing:.04em;margin-left:8px}
@media(max-width:768px){.photo-gallery-btn{width:36px;height:36px}.photo-gallery-footer{padding-bottom:max(12px,env(safe-area-inset-bottom))}}

/* ================================================================
   CARTE — Marqueurs actifs / dormants
   ================================================================ */
.map-legend-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text-secondary)}
.map-dot{width:10px;height:10px;border-radius:50%;display:inline-block;border:2px solid rgba(255,255,255,.8)}

/* ================================================================
   STATISTIQUES — Répartition par ville
   ================================================================ */
.stats-ville-bar{height:8px;border-radius:4px;background:var(--primary-soft);overflow:hidden;flex:1}
.stats-ville-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* ================================================================
   PAGINATION FICHES
   ================================================================ */
.fiches-pagination{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 0 8px}
.fiches-pagination-info{font-size:.78rem;color:var(--text-muted)}
.fiches-load-more{display:flex;align-items:center;justify-content:center;padding:10px 20px;border:1.5px dashed var(--border);border-radius:var(--radius-lg);cursor:pointer;color:var(--text-secondary);font-size:.82rem;font-weight:600;gap:8px;transition:all var(--transition-fast);background:var(--surface-2)}
.fiches-load-more:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}


/* ================================================================
   RDV → FICHE RAPIDE
   ================================================================ */
.rdv-fiche-rapide{background:var(--primary-soft);border:1.5px solid var(--primary-muted);border-radius:var(--radius-lg);padding:14px 16px;margin-top:14px}
.rdv-fiche-rapide-toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.rdv-fiche-rapide-toggle input[type="checkbox"]{accent-color:var(--primary);width:16px;height:16px;cursor:pointer}
.rdv-fiche-rapide-toggle label{font-size:.85rem;font-weight:700;cursor:pointer;color:var(--primary-dark)}
.rdv-fiche-rapide-body{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.rdv-fiche-rapide-body.hidden{display:none}

/* ================================================================
   CARTE — Fix scroll : route-summary sort du map-wrap
   ================================================================ */
#map-wrap{display:flex;flex-direction:column;gap:0}
#map-container{height:300px;border-radius:var(--radius-lg);overflow:hidden}
#route-summary-wrap{width:100%}
@media(min-width:768px){#map-container{height:460px}}

/* ================================================================
   CARTE — Stop pause, adresse départ
   ================================================================ */
.route-stop.pause .route-stop-num{background:var(--border);color:var(--text-muted)}
.route-depart-bar{padding:8px 14px;background:var(--surface-2);border-radius:var(--radius-sm);margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text-secondary)}
.route-depart-bar strong{color:var(--text);font-weight:700}

/* ================================================================
   IMPRESSION PLANNING
   ================================================================ */
@media print{
    body{background:#FFF;color:#000}
    .sidebar,.mobile-nav,.topbar-actions,.pwa-banner,.modal-container,#chart-tt,.rdv-actions,.today-planning,.backup-banner{display:none !important}
    .main-content{padding:0 !important;margin-left:0 !important}
    #view{padding:0 !important}
    .rdv-card,.agenda-day{page-break-inside:avoid;border:1px solid #000 !important;background:#FFF !important;box-shadow:none !important;margin-bottom:6px}
    .agenda-day h3{border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:8px}
    .rdv-time,.rdv-time-end{color:#000 !important}
    .status-badge{border:1px solid #000;color:#000 !important;background:#FFF !important}
    .rdv-buffer-tag{display:none}
}

/* ================================================================
   TIMELINE — Gestion des chevauchements (overlap columns)
   ================================================================ */
.timeline-event{position:absolute;border-radius:var(--radius-sm);padding:3px 7px;font-size:.7rem;overflow:hidden;cursor:pointer;border-left:3px solid transparent;box-shadow:var(--shadow-1);transition:all var(--transition-fast);z-index:5;box-sizing:border-box}
.timeline-event:hover{filter:brightness(1.08);box-shadow:var(--shadow-2);z-index:10}
/* Overlap : width et left calculés en JS selon la colonne */
.timeline-event.planifie{background:var(--primary-soft);border-left-color:var(--primary);color:var(--primary-dark)}
.timeline-event.termine{background:var(--success-soft);border-left-color:var(--success);color:var(--success)}
.timeline-event.annule{background:var(--bg-secondary);border-left-color:var(--border);color:var(--text-muted);opacity:.6}
[data-theme="dark"] .timeline-event.planifie{background:rgba(192,122,142,.18)}
[data-theme="dark"] .timeline-event.termine{background:rgba(61,191,126,.15)}

/* ================================================================
   FORMULAIRE RDV — Créneaux occupés sticky
   ================================================================ */
.rdv-busy-slots{background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px;max-height:120px;overflow-y:auto}
.rdv-busy-slots-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.rdv-busy-slot{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:.76rem;border-bottom:1px solid var(--border-light)}
.rdv-busy-slot:last-child{border-bottom:none}
.rdv-overlap-warning{padding:8px 12px;background:var(--danger-soft);border:1.5px solid rgba(201,70,70,.2);border-radius:var(--radius-sm);font-size:.76rem;color:var(--danger);font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:8px}

/* ================================================================
   GRAPHIQUES CANVAS — Tooltip unifié
   ================================================================ */
#chart-tt{position:fixed;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;font-size:.75rem;font-weight:600;pointer-events:none;box-shadow:var(--shadow-2);z-index:1000;transform:translate(-50%,-120%);white-space:nowrap;transition:opacity .1s}
#chart-tt.hidden{display:none}

/* ================================================================
   PRESTATIONS PERSONNALISABLES — Paramètres
   ================================================================ */
.presta-settings-list{display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto;margin-bottom:10px}
.presta-settings-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:var(--radius-sm);font-size:.82rem}
.presta-settings-item button{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:2px 4px;border-radius:var(--radius-xs);transition:all var(--transition-fast);line-height:1}
.presta-settings-item button:hover{background:var(--danger-soft);color:var(--danger)}
.presta-settings-item span{flex:1}

/* ================================================================
   SYNC QR CODE — Modale
   ================================================================ */
.sync-qr-wrap{text-align:center;padding:12px 0}
.sync-qr-wrap canvas{border-radius:var(--radius);margin:0 auto;display:block;box-shadow:var(--shadow-1)}
.sync-instructions{font-size:.78rem;color:var(--text-secondary);line-height:1.7;margin-top:12px}
.sync-step{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;text-align:left}
.sync-step-num{width:20px;height:20px;border-radius:50%;background:var(--primary);color:#FFF;font-size:.65rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* ================================================================
   STEPPER — Scroll au changement d'étape
   ================================================================ */
.fiche-step-panel.active{display:block;animation:viewIn .18s ease}

/* AMÉLIORATIONS VISUELLES GLOBALES
   ================================================================ */
/* Scrollbar design */
#view::-webkit-scrollbar,.search-results::-webkit-scrollbar,.modal-body::-webkit-scrollbar{width:5px}
#view::-webkit-scrollbar-track,.search-results::-webkit-scrollbar-track,.modal-body::-webkit-scrollbar-track{background:transparent}
#view::-webkit-scrollbar-thumb,.search-results::-webkit-scrollbar-thumb,.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
#view::-webkit-scrollbar-thumb:hover,.search-results::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* Fiche technique cards */
.fiche-card{border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:17px 19px;margin-bottom:10px;background:var(--surface);transition:all var(--transition-fast)}
.fiche-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-2);transform:translateY(-1px)}
.fiche-date{font-weight:800;font-size:0.88rem;color:var(--primary);letter-spacing:-0.01em}
.fiche-tarif{font-weight:800;font-size:1rem;color:var(--accent);font-variant-numeric:tabular-nums}

/* Tags redessinés */
.tag{padding:3px 9px;border-radius:var(--radius-full);font-size:0.68rem;font-weight:700;letter-spacing:0.02em}
.tag-rose{background:var(--primary-soft);color:var(--primary)}
.tag-accent{background:var(--accent-soft);color:var(--accent)}
.tag-success{background:var(--success-soft);color:var(--success)}

/* IK settings panel */
.ik-settings-panel{background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:18px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}

/* Frais table polish */
.frais-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.frais-table thead th{background:var(--surface-2);padding:10px 14px;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);font-weight:800;text-align:left;border-bottom:1.5px solid var(--border)}
.frais-table tbody td{padding:10px 14px;font-size:0.82rem;border-bottom:1px solid var(--border-light);vertical-align:middle}

/* Gradient line pour les sections de formulaire */
.form-section-title{background:linear-gradient(90deg,var(--primary-soft) 0%,transparent 100%);padding:6px 10px;border-radius:var(--radius-sm);border-bottom:none;margin:20px 0 10px}

/* Planning du jour redessiné */
.today-planning{margin-bottom:22px}
.today-empty{padding:18px;text-align:center;background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--radius-lg);color:var(--text-muted);font-size:0.84rem;display:flex;align-items:center;justify-content:center;gap:8px}
.today-stop:first-child{border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.today-stop:last-child{border-radius:0 0 var(--radius-lg) var(--radius-lg);margin-bottom:0}
.today-stop:only-child{border-radius:var(--radius-lg)}

/* Recherche globale */
.search-cat{padding:8px 14px 4px;font-size:0.64rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);font-weight:800}
.search-result{border-radius:var(--radius-sm)}

/* Photos grid */
.photo-thumb{width:58px;height:58px;border-radius:var(--radius-sm);object-fit:cover;cursor:pointer;border:1.5px solid var(--border);transition:all var(--transition-fast)}
.photo-thumb:hover{transform:scale(1.1);border-color:var(--primary-light);box-shadow:var(--shadow-2)}

/* Overlap et booked slots */
.overlap-warning{padding:9px 12px;background:var(--danger-soft);border:1px solid rgba(201,70,70,0.2);border-radius:var(--radius-sm);font-size:.76rem;color:var(--danger);font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.booked-slot{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:var(--radius-sm);font-size:.72rem;margin-bottom:3px}

/* ================================================================
   LAYOUT
   ================================================================ */
#app{display:flex;height:100vh;transition:background var(--transition),color var(--transition)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{padding:0 24px;display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);height:var(--topbar-h);flex-shrink:0;gap:10px;box-shadow:0 1px 0 var(--border)}
#topbar h2{font-size:1.05rem;font-weight:700;letter-spacing:-0.025em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
#view{flex:1;overflow-y:auto;padding:26px 28px;scroll-behavior:smooth;background:var(--bg)}

/* ================================================================
   SIDEBAR (Desktop)
   ================================================================ */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);display:flex;flex-direction:column;color:var(--sidebar-text);z-index:100;transition:width var(--transition),min-width var(--transition);border-right:1px solid rgba(255,255,255,0.04)}
#sidebar.collapsed{width:var(--sidebar-w-collapsed);min-width:var(--sidebar-w-collapsed)}
.sidebar-brand{padding:18px 16px 15px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:11px;min-height:60px}
.sidebar-logo{width:32px;height:32px;border-radius:var(--radius-sm);background:linear-gradient(145deg,var(--primary) 0%,var(--accent) 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(180,104,125,0.4)}
.sidebar-logo svg{color:#FFF}
.sidebar-brand-text{overflow:hidden;white-space:nowrap;transition:opacity var(--transition),width var(--transition)}
.sidebar-brand-text h1{font-size:0.95rem;font-weight:700;color:#FFF;letter-spacing:-0.02em}
.sidebar-brand-text small{font-size:0.58rem;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.12em;display:block;margin-top:1px}
#sidebar.collapsed .sidebar-brand-text{opacity:0;width:0}
.sidebar-nav{flex:1;padding:8px 7px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;overflow-x:hidden}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--radius-sm);color:var(--sidebar-text);font-size:0.84rem;font-weight:500;transition:all var(--transition-fast);background:none;width:100%;text-align:left;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:var(--sidebar-hover);color:rgba(255,255,255,0.85)}
.nav-item.active{background:var(--sidebar-active);color:var(--primary-dark);font-weight:600}
[data-theme="dark"] .nav-item.active{color:#E8A0B2}
.nav-item.active .nav-icon svg{filter:drop-shadow(0 0 6px rgba(192,122,142,0.4))}
.nav-item .nav-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:0.7;transition:opacity var(--transition-fast)}
.nav-item:hover .nav-icon,.nav-item.active .nav-icon{opacity:1}
.nav-item .nav-label{transition:opacity var(--transition),width var(--transition)}
#sidebar.collapsed .nav-label,#sidebar.collapsed .nav-badge{opacity:0;width:0;overflow:hidden}
.nav-badge{margin-left:auto;background:var(--primary);color:#FFF;padding:1px 7px;border-radius:var(--radius-full);font-size:0.64rem;font-weight:700;flex-shrink:0;min-width:18px;text-align:center}
.nav-separator{height:1px;background:rgba(255,255,255,0.05);margin:5px 10px}
.sidebar-footer{padding:8px 7px;border-top:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;gap:1px}
.sidebar-btn{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:var(--radius-sm);font-size:0.78rem;color:var(--sidebar-text);background:none;transition:all var(--transition-fast);width:100%;text-align:left;overflow:hidden;white-space:nowrap}
.sidebar-btn:hover{background:var(--sidebar-hover);color:rgba(255,255,255,0.8)}
.sidebar-btn .nav-icon{opacity:0.6;transition:opacity var(--transition-fast)}
.sidebar-btn:hover .nav-icon{opacity:1}
#sidebar.collapsed .sidebar-btn .btn-label{opacity:0;width:0}
.sidebar-collapse-btn{width:100%;display:flex;align-items:center;justify-content:center;padding:8px;color:rgba(255,255,255,0.25);background:none;border-radius:var(--radius-sm);transition:all var(--transition-fast);margin-top:3px}
.sidebar-collapse-btn:hover{background:var(--sidebar-hover);color:rgba(255,255,255,0.6)}
.sidebar-collapse-btn svg{transition:transform var(--transition)}
#sidebar.collapsed .sidebar-collapse-btn svg{transform:rotate(180deg)}

/* ================================================================
   MOBILE NAV
   ================================================================ */
#mobile-nav{display:none;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:rgba(var(--surface-rgb,255,255,255),0.88)}
[data-theme="dark"] #mobile-nav{background:rgba(26,25,38,0.92)}
.mob-tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px 5px;border:none;background:none;cursor:pointer;color:var(--text-muted);font-size:0.58rem;font-weight:700;letter-spacing:0.02em;text-transform:uppercase;min-width:52px;border-radius:var(--radius);-webkit-tap-highlight-color:transparent;transition:color var(--transition-fast)}
.mob-tab .mob-tab-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);transition:all var(--transition-spring)}
.mob-tab.active{color:var(--primary)}
.mob-tab.active .mob-tab-icon{background:var(--primary-soft);transform:scale(1.05)}
.mob-tab:active .mob-tab-icon{transform:scale(0.88)}
.mob-menu-popup{display:none;position:fixed;bottom:calc(var(--mobile-nav-h) + 10px);right:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-3);padding:5px;z-index:200;min-width:195px}
.mob-menu-popup.open{display:block;animation:modalIn .2s ease}
.mob-menu-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:var(--radius-sm);font-size:0.85rem;color:var(--text);background:none;border:none;cursor:pointer;width:100%;text-align:left;-webkit-tap-highlight-color:transparent;font-weight:500}
.mob-menu-item:active{background:var(--bg-secondary)}
.mob-menu-item svg{color:var(--text-muted);flex-shrink:0}
#importInput{display:none}

/* ================================================================
   BUTTONS
   ================================================================ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--radius-sm);font-size:0.82rem;font-weight:600;transition:all var(--transition-fast);white-space:nowrap;border:none;letter-spacing:-0.01em}
.btn:active{transform:scale(0.96)}
.btn svg{flex-shrink:0}
.btn-primary{background:var(--primary);color:#FFF;box-shadow:0 1px 3px rgba(180,104,125,0.35),0 1px 1px rgba(0,0,0,0.08)}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 3px 10px rgba(180,104,125,0.4)}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface-hover);border-color:var(--primary-light)}
.btn-accent{background:var(--accent);color:#FFF;box-shadow:0 1px 3px rgba(201,151,93,0.3)}
.btn-accent:hover{filter:brightness(1.08)}
.btn-danger{background:var(--danger-soft);color:var(--danger)}
.btn-danger:hover{background:rgba(201,70,70,0.18)}
.btn-ghost{background:transparent;color:var(--text-secondary);padding:6px 8px}
.btn-ghost:hover{background:var(--bg-secondary);color:var(--text)}
.btn-sm{padding:5px 11px;font-size:0.76rem}
.btn-icon{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm)}

/* ================================================================
   CARDS & KPI
   ================================================================ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:all var(--transition-fast)}
.card-hover:hover{box-shadow:var(--shadow-2);border-color:var(--primary-light);transform:translateY(-1px);cursor:pointer}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;display:flex;flex-direction:column;gap:5px;transition:all var(--transition-fast);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,rgba(255,255,255,0.03));pointer-events:none}
[data-theme="dark"] .kpi-card::before{background:linear-gradient(135deg,transparent 50%,rgba(255,255,255,0.02))}
.kpi-card:hover{box-shadow:var(--shadow-2);transform:translateY(-1px)}
.kpi-icon{width:38px;height:38px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.kpi-label{font-size:0.69rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;font-weight:700}
.kpi-value{font-size:1.75rem;font-weight:800;letter-spacing:-0.035em;font-variant-numeric:tabular-nums;line-height:1.05}
.kpi-sub{font-size:0.73rem;color:var(--text-secondary);display:flex;align-items:center;gap:3px}
.kpi-card[data-color="rose"] .kpi-icon{background:var(--primary-soft);color:var(--primary)}
.kpi-card[data-color="rose"] .kpi-value{color:var(--primary)}
.kpi-card[data-color="accent"] .kpi-icon{background:var(--accent-soft);color:var(--accent)}
.kpi-card[data-color="accent"] .kpi-value{color:var(--accent)}
.kpi-card[data-color="success"] .kpi-icon{background:var(--success-soft);color:var(--success)}
.kpi-card[data-color="success"] .kpi-value{color:var(--success)}
.kpi-card[data-color="muted"] .kpi-icon{background:var(--bg-secondary);color:var(--text-muted)}

/* ================================================================
   SEARCH & FILTERS
   ================================================================ */
.search-bar{display:flex;gap:10px;margin-bottom:18px;align-items:center}
.search-input-wrap{flex:1;position:relative}
.search-input-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.search-input{width:100%;padding:9px 14px 9px 38px;border:1px solid var(--border);border-radius:var(--radius);font-size:0.88rem;background:var(--surface);color:var(--text);outline:none;transition:all var(--transition-fast)}
.search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.filter-select{padding:9px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:0.85rem;background:var(--surface);color:var(--text);outline:none;min-width:150px}
.filter-select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}

/* ================================================================
   CLIENTS
   ================================================================ */
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px}
.client-card{display:flex;gap:14px;align-items:flex-start}
.client-avatar{width:42px;height:42px;border-radius:var(--radius-full);background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:#FFF;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.78rem;flex-shrink:0;box-shadow:0 2px 8px rgba(180,104,125,0.25)}
.client-info{flex:1;min-width:0}
.client-name{font-weight:700;font-size:0.90rem;letter-spacing:-0.01em}
.client-meta{font-size:0.73rem;color:var(--text-muted);display:flex;flex-wrap:wrap;gap:3px 10px;margin-top:3px}
.client-meta span{display:inline-flex;align-items:center;gap:3px}
.client-meta svg{flex-shrink:0;opacity:0.7}
.client-stats-mini{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.stat-chip{background:var(--bg-secondary);padding:2px 8px;border-radius:var(--radius-full);color:var(--text-secondary);font-size:0.70rem;font-weight:600;font-variant-numeric:tabular-nums;border:1px solid var(--border-light)}

/* ================================================================
   CLIENT DETAIL
   ================================================================ */
.detail-header{display:flex;gap:18px;align-items:flex-start;margin-bottom:24px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)}
.detail-avatar{width:54px;height:54px;border-radius:var(--radius-full);background:linear-gradient(145deg,var(--primary),var(--primary-dark));color:#FFF;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.15rem;flex-shrink:0;box-shadow:0 3px 12px rgba(180,104,125,0.35)}
.detail-info{flex:1}
.detail-info h3{font-size:1.25rem;font-weight:800;letter-spacing:-0.025em;margin-bottom:3px}
.detail-contact{font-size:0.80rem;color:var(--text-secondary);display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:5px}
.detail-contact span{display:inline-flex;align-items:center;gap:4px}
.detail-actions{display:flex;gap:6px;flex-shrink:0}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:22px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;text-align:center;transition:all var(--transition-fast)}
.stat-box:hover{box-shadow:var(--shadow-1)}
.stat-box .stat-val{font-size:1.4rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--primary);letter-spacing:-0.02em}
.stat-box .stat-label{font-size:0.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:3px}

/* ================================================================
   FICHES TECHNIQUES
   ================================================================ */
.fiche-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;background:var(--surface);transition:all var(--transition-fast)}
.fiche-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-1)}
.fiche-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.fiche-date{font-weight:700;font-size:0.88rem;color:var(--primary-dark)}
.fiche-tarif{font-weight:700;font-size:1rem;color:var(--accent);font-variant-numeric:tabular-nums}
.fiche-tags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.tag{padding:2px 9px;border-radius:var(--radius-full);font-size:0.7rem;font-weight:600}
.tag-rose{background:var(--primary-soft);color:var(--primary-dark)}
.tag-accent{background:var(--accent-soft);color:var(--accent)}
.tag-success{background:var(--success-soft);color:var(--success)}
.fiche-details-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:0.78rem;color:var(--text-secondary);margin-top:6px}
.fiche-detail-item{display:flex;flex-direction:column}
.fiche-detail-label{font-size:0.66rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:1px}
.formule-row{display:grid;grid-template-columns:auto 1fr 1fr 1fr 80px;gap:6px;padding:7px 10px;background:var(--bg-secondary);border-radius:var(--radius-sm);margin-bottom:3px;font-size:0.78rem;align-items:center}
.formule-zone-badge{padding:2px 8px;border-radius:var(--radius-full);font-size:0.68rem;font-weight:700;background:var(--primary-soft);color:var(--primary-dark);white-space:nowrap}

/* ================================================================
   FORMS
   ================================================================ */
.form-group{margin-bottom:15px}
.form-label{display:block;font-size:0.72rem;font-weight:700;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:0.88rem;outline:none;transition:all var(--transition-fast);background:var(--surface-2);color:var(--text);-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);box-shadow:var(--shadow-glow);background:var(--surface)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text-muted);opacity:0.7}
.form-textarea{resize:vertical;min-height:72px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-section-title{font-size:0.78rem;font-weight:700;color:var(--primary);margin:20px 0 10px;padding-bottom:6px;border-bottom:1.5px solid var(--border-light);display:flex;align-items:center;gap:8px;letter-spacing:0.02em}
.checkbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:3px}
.checkbox-item{display:flex;align-items:center;gap:7px;font-size:0.81rem;cursor:pointer;padding:6px 9px;border-radius:var(--radius-sm);transition:background var(--transition-fast);color:var(--text-secondary)}
.checkbox-item:hover{background:var(--bg-secondary);color:var(--text)}
.checkbox-item input[type="checkbox"]{accent-color:var(--primary);width:15px;height:15px;flex-shrink:0}
.formules-container{display:flex;flex-direction:column;gap:8px}
.formule-entry{border:1.5px solid var(--border-light);border-radius:var(--radius);padding:13px;background:var(--surface-2);position:relative}
.formule-entry .form-row{grid-template-columns:1fr 1fr 1fr}
.formule-remove{position:absolute;top:9px;right:9px;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;border-radius:var(--radius-sm);transition:all var(--transition-fast);opacity:0.6}
.formule-remove:hover{background:var(--danger-soft);color:var(--danger);opacity:1}

/* ================================================================
   AGENDA
   ================================================================ */
.week-nav,.month-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.week-nav-label,.month-nav-label{font-size:0.92rem;font-weight:700;min-width:240px;text-align:center;letter-spacing:-0.01em}
.day-section{margin-bottom:22px}
.day-header{font-size:0.73rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;padding:8px 0 7px;border-bottom:2px solid var(--border-light);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.day-header.today{color:var(--primary);border-color:var(--primary)}
.day-header .day-date{font-size:1.05rem;font-weight:900;color:var(--text);letter-spacing:-0.02em}
.day-header.today .day-date{background:var(--primary);color:#FFF;width:32px;height:32px;border-radius:var(--radius-full);display:inline-flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(180,104,125,0.4)}
.rdv-card{display:flex;gap:14px;padding:13px 15px;border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:6px;background:var(--surface) !important;transition:all var(--transition-fast);align-items:flex-start;border-left:4px solid var(--primary)}
.rdv-card:hover{box-shadow:var(--shadow-2);transform:translateY(-1px);border-color:var(--primary-light)}
.rdv-card.statut-termine{border-left-color:var(--success);background:var(--surface-2)}
.rdv-card.statut-annule{border-left-color:var(--danger);opacity:0.5}
.rdv-time-block{display:flex;flex-direction:column;align-items:center;min-width:62px;flex-shrink:0;border-right:1px solid var(--border-light);padding-right:12px;margin-right:2px}
.rdv-time{font-size:1rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.rdv-time-end{font-size:0.72rem;color:var(--text-muted);font-variant-numeric:tabular-nums;margin-top:1px}
.rdv-buffer-tag{font-size:0.60rem;padding:2px 6px;border-radius:var(--radius-full);background:var(--warning-soft);color:var(--warning);font-weight:700;margin-top:4px;white-space:nowrap;display:inline-flex;align-items:center;gap:2px;border:1px solid rgba(212,146,42,0.15)}
.rdv-body{flex:1;min-width:0}
.rdv-client-name{font-weight:700;font-size:0.88rem;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rdv-name{font-weight:700;font-size:0.88rem;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rdv-depart-retour{font-size:.7rem;color:var(--warning);margin-top:3px;display:flex;flex-wrap:wrap;gap:2px 10px}
.rdv-status-badge{display:inline-block;margin-top:3px}
.rdv-prestations{font-size:0.74rem;color:var(--text-secondary)}
.rdv-address{font-size:0.70rem;color:var(--text-muted);display:flex;align-items:center;gap:3px;margin-top:3px}
.rdv-actions{display:flex;gap:2px;flex-shrink:0;align-self:center}
.status-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--radius-full);font-size:0.63rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em}
.status-planifie{background:var(--primary-soft);color:var(--primary)}
.status-termine{background:var(--success-soft);color:var(--success)}
.status-annule{background:var(--danger-soft);color:var(--danger)}
.day-empty{padding:12px 14px;font-size:0.8rem;color:var(--text-muted);font-style:italic}

/* ================================================================
   FRAIS
   ================================================================ */
.frais-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.frais-table thead th{background:var(--bg-secondary);padding:9px 14px;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);font-weight:700;text-align:left;border-bottom:1px solid var(--border)}
.frais-table tbody td{padding:9px 14px;font-size:0.82rem;border-bottom:1px solid var(--border-light);vertical-align:middle}
.frais-table tbody tr:last-child td{border-bottom:none}
.frais-table tbody tr:hover{background:var(--surface-hover)}
.frais-type-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:var(--radius-full);font-size:0.7rem;font-weight:700}
.frais-type-deplacement{background:var(--warning-soft);color:var(--warning)}
.frais-type-produit{background:var(--primary-soft);color:var(--primary-dark)}
.frais-type-materiel{background:var(--accent-soft);color:var(--accent)}
.frais-type-autre{background:var(--bg-secondary);color:var(--text-secondary)}
.ik-settings-panel{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:18px;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
.ik-settings-panel .form-group{margin-bottom:0;flex:1;min-width:130px}
.frais-totals-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}

/* ================================================================
   SECTION TITLES & LISTS
   ================================================================ */
.section-title{font-size:0.80rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-secondary)}
.section-title svg{color:var(--text-muted);opacity:0.7}
.recent-list{display:flex;flex-direction:column;gap:5px}
.recent-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all var(--transition-fast)}
.recent-item:hover{border-color:var(--primary-light);box-shadow:var(--shadow-2);transform:translateY(-1px)}
.recent-avatar{width:34px;height:34px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.68rem;flex-shrink:0}

/* ================================================================
   MODALS
   ================================================================ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,14,23,0.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:1000;justify-content:center;align-items:flex-start;padding:40px 20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-xl);width:100%;max-width:620px;box-shadow:var(--shadow-3),0 0 0 1px var(--border);animation:modalIn .28s cubic-bezier(.4,0,.2,1)}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.modal-header{padding:20px 22px 0;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.modal-close{width:30px;height:30px;border-radius:var(--radius-full);background:var(--surface-2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition-fast);color:var(--text-muted)}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-body{padding:18px 22px}
.modal-footer{padding:0 22px 20px;display:flex;justify-content:flex-end;gap:8px}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(30,29,43,0.5);z-index:1500;justify-content:center;align-items:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--surface);border-radius:var(--radius-lg);padding:28px;max-width:380px;text-align:center;box-shadow:var(--shadow-3)}
.confirm-box p{margin-bottom:18px;font-size:0.88rem;color:var(--text-secondary)}
.confirm-actions{display:flex;gap:10px;justify-content:center}

/* ================================================================
   EMPTY STATE & TOASTS
   ================================================================ */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted)}
.empty-icon{margin-bottom:12px;color:var(--text-muted);opacity:0.25}
.empty-state p{font-size:0.88rem;margin-bottom:14px}
