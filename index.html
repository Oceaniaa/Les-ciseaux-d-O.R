.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:var(--radius-lg);color:#FFF;font-size:0.82rem;font-weight:600;z-index:2000;animation:toastIn .3s cubic-bezier(.34,1.56,.64,1),toastOut .3s ease 2.7s forwards;box-shadow:var(--shadow-3);display:flex;align-items:center;gap:8px;max-width:320px;letter-spacing:-0.01em}
.toast-success{background:var(--success)}
.toast-danger{background:var(--danger)}
.toast-info{background:var(--primary)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}

/* ================================================================
   BACKUP BANNER
   ================================================================ */
.backup-banner{display:flex;gap:10px;margin-bottom:18px;align-items:center;padding:11px 16px;border-radius:var(--radius-sm);font-size:0.77rem;flex-wrap:wrap;border:1.5px solid transparent}
.backup-banner svg{flex-shrink:0}

/* ================================================================
   UTILITIES
   ================================================================ */
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mb-4{margin-bottom:16px}
.hidden{display:none !important}

/* ================================================================
   PAGE TRANSITIONS
   ================================================================ */
.view-enter{animation:viewIn .22s ease}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ================================================================
   RESPONSIVE MOBILE (≤ 768px)
   ================================================================ */
@media(max-width:768px){
    /* ── Navigation ── */
    #sidebar{display:none !important}
    #mobile-nav{display:flex !important;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding:4px 0;padding-bottom:max(4px,env(safe-area-inset-bottom));justify-content:space-around}
    #main{padding-bottom:calc(var(--mobile-nav-h) + 4px)}
    #view{padding:12px 10px}
    #topbar{padding:0 12px;height:50px}
    #topbar h2{font-size:1.02rem}
    .topbar-actions .btn{font-size:0.78rem;padding:7px 10px;min-height:36px;border-radius:var(--radius-sm)}

    /* ── Touch targets : 44px min ── */
    .btn{padding:11px 16px;font-size:0.88rem;min-height:44px}
    .btn-sm{padding:9px 14px;min-height:40px;font-size:0.82rem}
    .btn-ghost{min-height:40px;padding:8px}
    .mob-tab{min-height:52px}

    /* ── Inputs : 16px évite le zoom iOS ── */
    .form-input,.form-select,.form-textarea{font-size:16px;padding:12px 14px;border-radius:var(--radius)}
    .form-row,.form-row-3{grid-template-columns:1fr}
    .form-label{font-size:.82rem}

    /* ── Modales : bottom sheet ── */
    .modal-overlay{align-items:flex-end;padding:0}
    .modal{max-width:100%;border-radius:var(--radius-xl) var(--radius-xl) 0 0;max-height:95vh;display:flex;flex-direction:column}
    .modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px}
    .modal-header{padding:14px 14px 0;flex-shrink:0}
    .modal-footer{padding:10px 14px;padding-bottom:max(14px,env(safe-area-inset-bottom));flex-shrink:0;border-top:1px solid var(--border-light);display:flex;gap:8px}
    .modal-footer .btn{flex:1}

    /* ═══════════════════════════════════════════════
       CARTE RDV — REFONTE COMPLÈTE MOBILE
       La carte est maintenant en colonne unique :
       heure en haut à gauche, infos en dessous
    ═══════════════════════════════════════════════ */
    .rdv-card{
        display:grid;
        grid-template-columns:auto 1fr auto;
        grid-template-rows:auto auto;
        gap:0 10px;
        padding:12px 12px;
        align-items:start;
    }
    .rdv-time-block{
        grid-column:1;
        grid-row:1 / 3;
        display:flex;
        flex-direction:column;
        align-items:center;
        min-width:52px;
        border-right:2px solid var(--primary-muted);
        padding-right:10px;
        padding-top:2px;
        gap:2px;
    }
    .rdv-time{font-size:1.05rem;font-weight:900;line-height:1.1}
    .rdv-time-end{font-size:0.72rem;color:var(--text-muted);white-space:nowrap}
    .rdv-buffer-tag{font-size:0.6rem;padding:2px 5px;white-space:nowrap}
    .rdv-body{
        grid-column:2;
        grid-row:1;
        min-width:0;
        overflow:hidden;
    }
    .rdv-body .rdv-name{
        font-size:.92rem;
        font-weight:700;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        line-height:1.3;
    }
    .rdv-prestations{
        font-size:0.76rem;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        color:var(--text-secondary);
        margin-top:2px;
    }
    .rdv-address{
        font-size:0.7rem;
        color:var(--text-muted);
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        margin-top:2px;
    }
    .rdv-depart-retour{
        grid-column:2;
        grid-row:2;
        font-size:0.7rem;
        margin-top:4px;
        display:flex;
        flex-wrap:wrap;
        gap:4px 10px;
    }
    .rdv-actions{
        grid-column:3;
        grid-row:1 / 3;
        display:flex;
        flex-direction:column;
        gap:4px;
        align-self:center;
    }
    .rdv-actions .btn-ghost{min-height:36px;padding:6px;width:36px;display:flex;align-items:center;justify-content:center}
    .rdv-status-badge{margin-top:3px;font-size:0.66rem;padding:2px 7px}

    /* ── KPI dashboard ── */
    .kpi-grid{grid-template-columns:1fr 1fr;gap:8px}
    .kpi-card{padding:12px 11px}
    .kpi-value{font-size:1.2rem}
    .kpi-icon{display:none}
    .client-kpi-row{grid-template-columns:1fr 1fr;gap:8px}
    .client-kpi-value{font-size:1.1rem}

    /* ── Clientes ── */
    .clients-grid{grid-template-columns:1fr;gap:8px}
    .search-bar{flex-direction:column;gap:8px}
    .search-input{font-size:16px}
    .filter-select{min-width:100%;font-size:16px}
    .detail-header{flex-direction:column;gap:10px}
    .detail-actions{width:100%;display:flex;flex-wrap:wrap;gap:6px}
    .detail-actions .btn{flex:1;min-width:calc(50% - 3px)}
    .client-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;padding-bottom:2px}
    .client-tab{padding:9px 14px;font-size:.8rem}

    /* ── Fiches techniques ── */
    .fiche-card{padding:12px}
    .fiche-header{flex-direction:column;gap:6px}
    .fiche-header > div:last-child{display:flex;justify-content:flex-end;gap:6px}
    .fiche-details-grid{grid-template-columns:1fr 1fr;gap:4px}
    .fiche-detail-item{font-size:.78rem}
    .formule-row{grid-template-columns:1fr;gap:4px}
    .formule-row>*{font-size:.78rem}
    .formule-zone-badge{display:inline-block;margin-bottom:4px}
    .formule-entry .form-row{grid-template-columns:1fr !important}
    .fiche-step-header{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
    .fiche-step{min-width:70px;padding:8px 6px;font-size:.7rem}
    .fiche-step-icon{display:none}

    /* ── Statistiques ── */
    .stats-row,.stats-grid{grid-template-columns:1fr 1fr}
    .stat-insight{padding:12px}
    .stat-insight-val{font-size:1.4rem}

    /* ── Agenda ── */
    .week-nav,.month-nav{gap:4px}
    .week-nav-label,.month-nav-label{font-size:.82rem;min-width:auto;text-align:center}
    .agenda-day h3{font-size:.82rem}
    .checkbox-grid{grid-template-columns:1fr 1fr}

    /* ── Carte (map) ── */
    #map-container{height:260px;min-height:260px;border-radius:var(--radius)}
    #map-toolbar{gap:6px;flex-direction:column;align-items:stretch}
    #map-toolbar .map-legend{font-size:.68rem;gap:8px}
    #map-toolbar .filter-select{width:100%}
    .route-summary-header{flex-direction:column;gap:8px;align-items:flex-start}
    .route-kpis{gap:8px;flex-wrap:wrap}
    .route-kpi-val{font-size:1.2rem}
    .route-stop{padding:10px 0;gap:8px}
    .route-stop-num{width:24px;height:24px;font-size:.68rem}
    .route-stop-name{font-size:.82rem}
    .route-stop-addr{font-size:.68rem}
    .map-popup-actions a{font-size:.7rem;padding:5px 8px}

    /* ── Focus RDV ── */
    .focus-timer-display{font-size:2.8rem}
    .focus-body{padding:12px}
    .focus-footer{padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom))}
    .focus-preset-btn{padding:6px 10px;font-size:.74rem}

    /* ── Frais ── */
    .ik-settings-panel{flex-direction:column}
    .ik-settings-panel .form-input,.ik-settings-panel .form-select{max-width:100% !important}
    .frais-totals-row{grid-template-columns:1fr 1fr}
    .frais-table{border:none;background:transparent}
    .frais-table thead{display:none}
    .frais-table tbody{display:flex;flex-direction:column;gap:8px}
    .frais-table tbody tr{display:flex;flex-wrap:wrap;gap:6px 10px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);align-items:center}
    .frais-table tbody td{border:none;padding:0;font-size:.82rem}
    .frais-table tbody td:nth-child(3){flex-basis:100%;order:10}
    .frais-table tbody td:nth-child(5){margin-left:auto}
    .frais-table tbody td:last-child{order:20;flex-basis:100%;text-align:right}

    /* ── Bilan ── */
    .projection-card{flex-direction:column;gap:8px}
    .proj-val{font-size:1.4rem}

    /* ── Prestations ── */
    .presta-settings-item{padding:8px 10px}
    .presta-settings-list{max-height:200px}

    /* ── Divers ── */
    #view>div[style*="grid-template-columns"]{display:flex !important;flex-direction:column !important;gap:16px !important}
    .confirm-box{margin:0 10px}
    .empty-state{padding:24px 12px}
    .backup-banner{flex-direction:column;text-align:center}
    .section-title{font-size:.78rem}
    .today-planning{border-radius:var(--radius-lg)}
    .today-stop{padding:11px 12px;gap:10px}
    .today-name{font-size:.9rem}
    .today-presta{font-size:.72rem}
    .today-time{font-size:.88rem;min-width:42px}
    .onboarding-overlay{padding:16px}
    .onboarding-step{padding:11px 12px}
    .route-depart-bar{flex-wrap:wrap;gap:6px}
    .route-depart-bar .btn{width:100%;margin-left:0 !important}
}
/* ================================================================
   MAP (Leaflet)
   ================================================================ */
#map-wrap{height:100%;display:flex;flex-direction:column}
#map-toolbar{display:flex;gap:10px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
#map-container{flex:1;min-height:340px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);position:relative}
.map-fallback{display:flex;align-items:center;justify-content:center;height:100%;background:var(--bg-secondary);color:var(--text-muted);flex-direction:column;gap:10px;padding:20px;text-align:center}
.map-legend{display:flex;gap:12px;font-size:.72rem;color:var(--text-secondary);align-items:center;flex-wrap:wrap}
.map-legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:3px}
.leaflet-popup-content-wrapper{border-radius:var(--radius)!important;box-shadow:var(--shadow-2)!important}
.leaflet-popup-content{margin:10px 14px!important;font-family:var(--font)!important;font-size:.82rem!important;line-height:1.5!important}
.leaflet-popup-content strong{font-weight:700;color:var(--primary-dark)}
.map-geocoding-bar{padding:6px 12px;background:var(--warning-soft);border-radius:var(--radius);font-size:.76rem;color:var(--warning);display:flex;align-items:center;gap:6px}
@media(max-width:768px){#map-container{min-height:280px;border-radius:var(--radius)}#map-toolbar{gap:6px}}

/* ================================================================
   CANVAS CHARTS
   ================================================================ */
.sparkline-wrap{margin-top:6px}
.sparkline-wrap canvas{display:block;width:100%;height:28px}
.chart-container{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-top:18px;box-shadow:var(--shadow-1)}
.chart-container h4{font-size:.85rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chart-container canvas{display:block;max-width:100%}

/* Bilan Tabs */
.bilan-tabs{display:flex;gap:3px;margin-bottom:20px;background:var(--bg-secondary);padding:3px;border-radius:var(--radius-sm);border:1.5px solid var(--border)}
.bilan-tab{flex:1;padding:9px 16px;border-radius:calc(var(--radius) - 2px);text-align:center;font-size:.82rem;font-weight:600;cursor:pointer;background:none;color:var(--text-muted);transition:all var(--transition-fast);border:none}
.bilan-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-2);border:1px solid var(--border)}
.bilan-tab:hover:not(.active){color:var(--text-secondary)}
.bilan-panel{display:none}
.bilan-panel.active{display:block}

/* Route Summary */
.route-summary{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-top:14px;overflow:hidden;box-shadow:var(--shadow-1)}
.route-summary-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--bg-secondary);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.route-summary-header h4{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:6px;margin:0}
.route-kpis{display:flex;gap:14px}
.route-kpi{display:flex;flex-direction:column;align-items:center}
.route-kpi-val{font-size:1.05rem;font-weight:700;font-variant-numeric:tabular-nums}
.route-kpi-label{font-size:.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}
.route-stops{padding:8px 12px}
.route-stop{display:flex;gap:10px;align-items:flex-start;padding:8px 0;position:relative}
.route-stop:not(:last-child){border-bottom:1px solid var(--border-light)}
.route-stop-num{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0}
.route-stop-info{flex:1;min-width:0}
.route-stop-name{font-weight:700;font-size:.84rem}
.route-stop-addr{font-size:.72rem;color:var(--text-muted);display:flex;align-items:center;gap:3px}
.route-stop-meta{font-size:.72rem;color:var(--text-secondary);display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.route-leg{display:flex;align-items:center;gap:6px;padding:4px 0 4px 12px;font-size:.7rem;color:var(--accent);font-weight:600}
.route-leg::before{content:'';width:2px;height:16px;background:var(--border);display:block;margin-left:12px}
@media(max-width:768px){.route-summary-header{flex-direction:column;align-items:flex-start}.route-kpis{gap:10px}}

/* Global Search */
.search-overlay{display:none;position:fixed;inset:0;background:rgba(30,29,43,0.5);backdrop-filter:blur(4px);z-index:1100;justify-content:center;align-items:flex-start;padding:60px 20px}
.search-overlay.open{display:flex}
.search-modal{background:var(--surface);border-radius:var(--radius-xl);width:100%;max-width:560px;box-shadow:var(--shadow-3),0 0 0 1px var(--border);overflow:hidden;animation:modalIn .22s cubic-bezier(.4,0,.2,1);max-height:70vh;display:flex;flex-direction:column}
.search-modal-input-wrap{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center}
.search-modal-input-wrap svg{color:var(--text-muted);flex-shrink:0}
.search-modal-input{flex:1;border:none;outline:none;font-size:1rem;background:transparent;color:var(--text);font-family:var(--font);letter-spacing:-0.01em}
.search-results{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px}
.search-results:empty::after{content:'Tapez pour rechercher…';display:block;padding:24px;text-align:center;color:var(--text-muted);font-size:.85rem}
.search-cat{padding:6px 14px 3px;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:700}
.search-result{display:flex;gap:10px;align-items:center;padding:9px 14px;border-radius:var(--radius);cursor:pointer;transition:background var(--transition-fast)}
.search-result:hover,.search-result:focus{background:var(--bg-secondary)}
.search-result-icon{width:32px;height:32px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.search-result-body{flex:1;min-width:0}
.search-result-title{font-size:.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-sub{font-size:.7rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-empty{padding:28px;text-align:center;color:var(--text-muted);font-size:.85rem}
.search-shortcut{font-size:.62rem;padding:2px 6px;background:var(--bg-secondary);border-radius:3px;color:var(--text-muted);font-family:var(--font-mono)}
@media(max-width:768px){.search-overlay{padding:0;align-items:flex-end}.search-modal{max-width:100%;border-radius:var(--radius-xl) var(--radius-xl) 0 0;max-height:85vh}.search-modal-input{font-size:16px}}

/* Auto buffer indicator */
.buffer-auto-row{display:flex;gap:8px;align-items:center;margin-top:-6px;margin-bottom:10px}
.buffer-auto-hint{font-size:.7rem;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:4px;padding:3px 8px;background:var(--accent-soft);border-radius:var(--radius-full)}

/* Planning du jour */
.today-planning{margin-bottom:20px}
.today-timeline{display:flex;flex-direction:column;gap:0}
.today-stop{display:flex;gap:12px;align-items:flex-start;padding:11px 15px;background:var(--surface);border:1.5px solid var(--border);border-left:4px solid var(--primary);margin-bottom:-1px;position:relative}
.today-stop:first-child{border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.today-stop:last-child{border-radius:0 0 var(--radius-lg) var(--radius-lg);margin-bottom:0}
.today-stop:only-child{border-radius:var(--radius-lg)}
.today-stop.termine{border-left-color:var(--success);opacity:.6}
.today-time{font-size:.92rem;font-weight:700;font-variant-numeric:tabular-nums;min-width:50px;color:var(--primary-dark)}
.today-stop.termine .today-time{color:var(--success)}
.today-detail{flex:1;min-width:0}
.today-name{font-weight:700;font-size:.86rem}
.today-presta{font-size:.72rem;color:var(--text-secondary)}
.today-empty{padding:18px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);color:var(--text-muted);font-size:.85rem}

/* CA Gauge */
.ca-gauge-wrap{display:flex;align-items:center;gap:18px;padding:18px 20px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:22px;box-shadow:var(--shadow-1)}
.ca-gauge-canvas{flex-shrink:0}
.ca-gauge-info{flex:1}
.ca-gauge-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);font-weight:600}
.ca-gauge-val{font-size:1.3rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--primary)}
.ca-gauge-sub{font-size:.76rem;color:var(--text-secondary)}
.ca-gauge-edit{font-size:.7rem;color:var(--accent);cursor:pointer;text-decoration:underline;margin-top:2px;display:inline-block}

/* Photos gallery */
.photos-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.photo-thumb{width:60px;height:60px;border-radius:var(--radius-sm);object-fit:cover;cursor:pointer;border:1px solid var(--border);transition:transform var(--transition-fast)}
.photo-thumb:hover{transform:scale(1.08)}
.photo-upload-area{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.photo-preview{display:flex;gap:6px;flex-wrap:wrap}
.photo-preview-item{position:relative}
.photo-preview-item img{width:56px;height:56px;border-radius:var(--radius-sm);object-fit:cover;border:1px solid var(--border)}
.photo-preview-item .photo-remove{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;border:none;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.photo-modal-img{max-width:100%;max-height:70vh;border-radius:var(--radius);display:block;margin:0 auto}

/* Créneaux occupés */
.booked-slots{margin-bottom:10px}
.booked-slot{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:.74rem;margin-bottom:3px}
.booked-slot-time{font-weight:700;font-variant-numeric:tabular-nums;color:var(--danger);min-width:85px}
.booked-slot-name{color:var(--text-secondary)}
.overlap-warning{padding:8px 12px;background:var(--danger-soft);border-radius:var(--radius);font-size:.78rem;color:var(--danger);font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:8px}

/* Duplicate warning */
.duplicate-warning{padding:11px 14px;background:var(--warning-soft);border:1.5px solid rgba(212,146,42,.2);border-radius:var(--radius-sm);margin-bottom:14px;font-size:.79rem;color:var(--warning)}
.duplicate-warning strong{display:block;margin-bottom:3px}
</style>
</head>

<script>
// ================================================================
// LEAFLET + MARKERCLUSTER EMBARQUÉS (fonctionne en file:// sans réseau)

/** Génère un SVG inline à partir du nom de l'icône */
function icon(name, size) {
    size = size || 20;
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICON_PATHS[name]||'')+'</svg>';
}

/** Injecte les icônes SVG dans les emplacements du DOM au chargement */
function injectNavIcons() {
    const map = {
        'si-home': 'home', 'si-users': 'users', 'si-cal': 'calendar', 'si-car': 'car', 'si-map': 'map', 'si-receipt': 'receipt', 'si-stats': 'bar-chart', 'si-settings': 'settings', 'si-qr': 'qr',
        'si-theme': 'moon', 'si-save': 'save', 'si-upload': 'upload',
        'mi-home': 'home', 'mi-users': 'users', 'mi-cal': 'calendar', 'mi-car': 'car', 'mi-more': 'more-vertical'
    };
    for (const [id, name] of Object.entries(map)) {
        const el = document.getElementById(id);
        if (el) el.innerHTML = icon(name, id.startsWith('mi') ? 22 : 18);
    }
    // Modal close button
    const mc = document.getElementById('modal-close');
    if (mc) mc.innerHTML = icon('x', 18);
    // Mobile menu items — inject icons
    document.querySelectorAll('.mob-menu-item').forEach(el => {
        const text = el.textContent.trim();
        let ic = 'file-text';
        if (text.includes('Bilan')) ic = 'bar-chart';
        else if (text.includes('Carte')) ic = 'map';
        else if (text.includes('sombre') || text.includes('clair')) ic = 'moon';
        else if (text.includes('Sauvegarder')) ic = 'save';
        else if (text.includes('Restaurer')) ic = 'upload';
        el.innerHTML = icon(ic, 18) + ' ' + text;
    });
}

/* ================================================================
   UTILITAIRES
   ================================================================ */
function uuid(){return 'xxxx-xxxx-xxxx'.replace(/x/g,()=>Math.floor(Math.random()*16).toString(16))}
/** Date locale au format YYYY-MM-DD (PAS d'UTC — évite le décalage de fuseau) */
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function formatDate(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}
function formatDateShort(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})}
function formatEuros(n){if(n==null||isNaN(n))return '0,00 €';return Number(n).toLocaleString('fr-FR',{style:'currency',currency:'EUR'})}
function initials(nom,prenom){return ((prenom||'')[0]||'').toUpperCase()+((nom||'')[0]||'').toUpperCase()}
function esc(str){if(!str)return '';const el=document.createElement('span');el.textContent=str;return el.innerHTML}
// Prestations : CONFIG par défaut ou liste personnalisée en localStorage
function getPrestations(){try{const raw=localStorage.getItem(CONFIG.LS_KEY_PRESTATIONS);return raw?JSON.parse(raw):CONFIG.PRESTATIONS}catch(e){return CONFIG.PRESTATIONS}}
// Durées prestations : localStorage ou defaults CONFIG
function getPrestationsDurees(){try{const raw=localStorage.getItem(CONFIG.LS_KEY_PRESTATIONS_DUREES);return raw?JSON.parse(raw):{...CONFIG.PRESTATIONS_DUREES_DEFAULT}}catch(e){return {...CONFIG.PRESTATIONS_DUREES_DEFAULT}}}
// Somme des durées d'une liste de prestations (fallback 45min si inconnu)
function sumPrestationsDurees(prestations){
    const durees=getPrestationsDurees();
    return prestations.reduce((total,p)=>total+(durees[p]||45),0);
}
// Lire une variable CSS de l'app
function getCSSVar(v){return getComputedStyle(document.getElementById('app')||document.documentElement).getPropertyValue(v).trim()}
function toast(message,type){type=type||'success';const ex=document.querySelector('.toast');if(ex)ex.remove();const el=document.createElement('div');el.className='toast toast-'+type;el.innerHTML=icon(type==='success'?'shield':type==='danger'?'x':'zap',16)+' '+esc(message);document.body.appendChild(el);setTimeout(()=>el.remove(),3200)}


/* ================================================================
   BASE DE DONNÉES — IndexedDB + Auto-sync localStorage
   ================================================================ */
class Database {
    constructor(){this.db=null;this._syncTimer=null}

    open(){
        return new Promise((resolve,reject)=>{
            const req=indexedDB.open(CONFIG.DB_NAME,CONFIG.DB_VERSION);
            req.onupgradeneeded=(e)=>{
                const db=e.target.result;
                const tx=e.target.transaction;// transaction versionchange pour modifier les stores existants
                // Store CLIENTS
                if(!db.objectStoreNames.contains(CONFIG.STORES.CLIENTS)){
                    const s=db.createObjectStore(CONFIG.STORES.CLIENTS,{keyPath:'id'});
                    s.createIndex('nom','nom',{unique:false});
                    s.createIndex('ville','adresse.ville',{unique:false});
                    s.createIndex('telephone','telephone',{unique:false});
                }
                // Store FICHES
                if(!db.objectStoreNames.contains(CONFIG.STORES.FICHES)){
                    const s=db.createObjectStore(CONFIG.STORES.FICHES,{keyPath:'id'});
                    s.createIndex('clientId','clientId',{unique:false});
                    s.createIndex('date','date',{unique:false});
                }
                // Store RDV
                if(!db.objectStoreNames.contains(CONFIG.STORES.RDV)){
                    const s=db.createObjectStore(CONFIG.STORES.RDV,{keyPath:'id'});
                    s.createIndex('clientId','clientId',{unique:false});
                    s.createIndex('date','date',{unique:false});
                }
                // Store FRAIS
                if(!db.objectStoreNames.contains(CONFIG.STORES.FRAIS)){
                    const s=db.createObjectStore(CONFIG.STORES.FRAIS,{keyPath:'id'});
                    s.createIndex('date','date',{unique:false});
                    s.createIndex('type','type',{unique:false});
                }
                // Store FACTURES
                if(!db.objectStoreNames.contains(CONFIG.STORES.FACTURES)){
                    const s=db.createObjectStore(CONFIG.STORES.FACTURES,{keyPath:'id'});
                    s.createIndex('clientId','clientId',{unique:false});
                    s.createIndex('date','date',{unique:false});
                    s.createIndex('statut','statut',{unique:false});
                }
                // v3 : ajout d'index secondaires manquants sur stores existants (migration idempotente)
                // Fonction utilitaire : ajouter un index si absent
                const addIdxIfMissing=(storeName,idxName,keyPath,options)=>{
                    if(!db.objectStoreNames.contains(storeName))return;
                    try{
                        const s=tx.objectStore(storeName);
                        if(!s.indexNames.contains(idxName)){s.createIndex(idxName,keyPath,options||{unique:false})}
                    }catch(err){console.warn('Migration index '+idxName+' échouée:',err.message)}
                };
                // v3 upgrade : indexer les factures par statut (utile pour badge attente rapide)
                if(e.oldVersion<3){
                    addIdxIfMissing(CONFIG.STORES.FACTURES,'statut','statut');
                    addIdxIfMissing(CONFIG.STORES.CLIENTS,'creeLe','creeLe');
                    console.log('[DB] Migration v'+e.oldVersion+' → v'+CONFIG.DB_VERSION+' effectuée');
                }
            };
            req.onsuccess=(e)=>{this.db=e.target.result;resolve(this.db)};
            req.onerror=(e)=>reject(e.target.error);
        });
    }

    getAll(store){return new Promise((res,rej)=>{const tx=this.db.transaction(store,'readonly');const s=tx.objectStore(store);const r=s.getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
    get(store,id){return new Promise((res,rej)=>{const tx=this.db.transaction(store,'readonly');const s=tx.objectStore(store);const r=s.get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
    getAllByIndex(store,idx,val){return new Promise((res,rej)=>{const tx=this.db.transaction(store,'readonly');const s=tx.objectStore(store);const i=s.index(idx);const r=i.getAll(val);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
    put(store,data){return new Promise((res,rej)=>{const tx=this.db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.put(data);r.onsuccess=()=>{this.scheduleSync();res(r.result)};r.onerror=(e)=>{const err=e.target.error;// Quota dépassé : erreur connue sur iOS (22=QuotaExceededError)
            if(err&&(err.name==='QuotaExceededError'||err.code===22)){toast('Espace disque insuffisant. Exportez vos données puis supprimez les anciennes photos.','danger')}rej(err)}})}
    delete(store,id){return new Promise((res,rej)=>{const tx=this.db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.delete(id);r.onsuccess=()=>{this.scheduleSync();res()};r.onerror=()=>rej(r.error)})}
    clear(store){return new Promise((res,rej)=>{const tx=this.db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}

    scheduleSync(){clearTimeout(this._syncTimer);this._syncTimer=setTimeout(()=>this.syncToLocalStorage(),2000)}
    async syncToLocalStorage(){
        try{
            const d=await this.exportAll();
            // Exclure les photos du miroir localStorage (quota ~5 Mo) — IndexedDB reste la source complète, l'export manuel conserve les photos
            if(d[CONFIG.STORES.FICHES])d[CONFIG.STORES.FICHES]=d[CONFIG.STORES.FICHES].map(f=>{if(f.photos&&f.photos.length>0){const c={...f};c.photos=[];c._photosStripped=f.photos.length;return c}return f});
            localStorage.setItem(CONFIG.LS_KEY_AUTOBACKUP,JSON.stringify(d));
            localStorage.setItem(CONFIG.LS_KEY_AUTOBACKUP_DATE,new Date().toISOString());
        }catch(e){console.warn('Auto-sync échoué:',e.message)}
    }
    async checkRecovery(){try{const c=await this.getAll(CONFIG.STORES.CLIENTS);if(c.length>0)return null;const raw=localStorage.getItem(CONFIG.LS_KEY_AUTOBACKUP);if(!raw)return null;const b=JSON.parse(raw);const t=Object.values(CONFIG.STORES).reduce((s,n)=>s+((b[n]&&b[n].length)||0),0);return t>0?b:null}catch(e){return null}}
    getLastAutoBackupDate(){return localStorage.getItem(CONFIG.LS_KEY_AUTOBACKUP_DATE)||null}
    getLastManualExportDate(){return localStorage.getItem(CONFIG.LS_KEY_LAST_EXPORT)||null}
    setLastManualExportDate(){localStorage.setItem(CONFIG.LS_KEY_LAST_EXPORT,new Date().toISOString())}
    async exportAll(){const d={};for(const n of Object.values(CONFIG.STORES)){d[n]=await this.getAll(n)};d._exportDate=new Date().toISOString();d._appVersion='2.0.0';return d}
    async importAll(data){for(const n of Object.values(CONFIG.STORES)){if(data[n]&&Array.isArray(data[n])){await this.clear(n);for(const r of data[n])await this.put(n,r)}}}
    // getAllLite : charge les fiches sans les données photo (base64 volumineuses)
    // Utilisé par les modules qui n'ont pas besoin des photos (stats, bilan, dashboard)
    async getAllLite(storeName){
        const all=await this.getAll(storeName);
        if(storeName!==CONFIG.STORES.FICHES)return all;
        return all.map(f=>{if(!f.photos||f.photos.length===0)return f;const c={...f};c.photos=[];c._photosStripped=f.photos.length;return c});
    }
    // aggregate : parcours par cursor pour éviter de charger tout en mémoire.
    // Utile quand le volume dépasse ~500 fiches × plusieurs photos base64.
    // reducer(acc, record) → nouveau acc. Ne charge PAS les photos si stripPhotos=true.
    aggregate(store,reducer,initialValue,stripPhotos){
        return new Promise((res,rej)=>{
            const tx=this.db.transaction(store,'readonly');
            const s=tx.objectStore(store);
            const req=s.openCursor();
            let acc=initialValue;
            req.onsuccess=(e)=>{
                const cursor=e.target.result;
                if(cursor){
                    let rec=cursor.value;
                    if(stripPhotos&&rec.photos&&rec.photos.length>0){rec={...rec,photos:[],_photosStripped:rec.photos.length}}
                    try{acc=reducer(acc,rec)}catch(err){return rej(err)}
                    cursor.continue();
                }else{res(acc)}
            };
            req.onerror=(e)=>rej(e.target.error);
        });
    }
    async mergeAll(data){
        // Fusionne en préservant les enregistrements existants : l'import ne remplace que si l'ID n'existe pas encore
        for(const n of Object.values(CONFIG.STORES)){
            if(!data[n]||!Array.isArray(data[n]))continue;
            const existing=await this.getAll(n);
            const existingIds=new Set(existing.map(r=>r.id));
            let added=0;
            for(const r of data[n]){if(!existingIds.has(r.id)){await this.put(n,r);added++}}
            if(added>0)console.log(`[merge] ${n}: +${added} enregistrements`);
        }
    }
}

function drawSparkline(canvas, values, color) {
    if (!canvas || !values || values.length < 2) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth; const h = canvas.clientHeight;
    canvas.width = w * dpr; canvas.height = h * dpr;
    ctx.scale(dpr, dpr);
    const min = Math.min(...values); const max = Math.max(...values);
    const range = max - min || 1;
    const pad = 2; const pw = w - pad * 2; const ph = h - pad * 2;
    // Points calculés pour le tooltip
    const pts = values.map((v, i) => ({
        x: pad + (i / (values.length - 1)) * pw,
        y: pad + ph - ((v - min) / range) * ph,
        v
    }));
    ctx.beginPath();
    pts.forEach((p, i) => { i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
    ctx.strokeStyle = color || '#B4687D'; ctx.lineWidth = 1.8; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();
    // Gradient sous la ligne
    ctx.lineTo(pts[pts.length-1].x, h); ctx.lineTo(pad, h); ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, (color || '#B4687D') + '30'); grad.addColorStop(1, (color || '#B4687D') + '05');
    ctx.fillStyle = grad; ctx.fill();
    // Tooltip on hover
    const getOrCreateTT = () => { let el=document.getElementById('chart-tt'); if(!el){el=document.createElement('div');el.id='chart-tt';el.className='chart-tooltip hidden';document.body.appendChild(el)} return el };
    canvas.onmousemove = (e) => {
        const rect = canvas.getBoundingClientRect(); const mx = e.clientX - rect.left;
        const closest = pts.reduce((a,b) => Math.abs(b.x-mx)<Math.abs(a.x-mx)?b:a);
        const tt = getOrCreateTT(); tt.className='chart-tooltip';
        tt.textContent = new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(closest.v);
        tt.style.left=e.clientX+'px'; tt.style.top=e.clientY+'px';
    };
    canvas.onmouseleave = () => { const tt=document.getElementById('chart-tt'); if(tt)tt.className='chart-tooltip hidden'; };
}

function drawDonut(canvas, segments, centerText) {
    if (!canvas || !segments || segments.length === 0) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const size = Math.min(canvas.clientWidth, canvas.clientHeight);
    canvas.width = size * dpr; canvas.height = size * dpr;
    ctx.scale(dpr, dpr);
    const cx = size / 2; const cy = size / 2; const r = size / 2 - 6; const inner = r * 0.58;
    const total = segments.reduce((s, seg) => s + seg.value, 0);
    if (total === 0) return;
    let angle = -Math.PI / 2;
    const segMeta = [];
    segments.forEach(seg => {
        const sweep = (seg.value / total) * Math.PI * 2;
        ctx.beginPath(); ctx.moveTo(cx + inner * Math.cos(angle), cy + inner * Math.sin(angle));
        ctx.arc(cx, cy, r, angle, angle + sweep);
        ctx.arc(cx, cy, inner, angle + sweep, angle, true);
        ctx.closePath(); ctx.fillStyle = seg.color; ctx.fill();
        segMeta.push({ startAngle: angle, endAngle: angle + sweep, label: seg.label, value: seg.value });
        angle += sweep;
    });
    if (centerText) {
        ctx.fillStyle = getCSSVar('--text') || '#1E1D2B';
        ctx.font = 'bold ' + (size * 0.15) + 'px Inter,system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(centerText, cx, cy);
    }
    // Tooltip hover
    const getOrCreateTT = () => { let el=document.getElementById('chart-tt'); if(!el){el=document.createElement('div');el.id='chart-tt';el.className='chart-tooltip hidden';document.body.appendChild(el)} return el };
    canvas.onmousemove = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left - cx; const my = e.clientY - rect.top - cy;
        const dist = Math.sqrt(mx*mx+my*my);
        if (dist < inner || dist > r) { const tt=getOrCreateTT(); tt.className='chart-tooltip hidden'; return; }
        let a = Math.atan2(my, mx);
        if (a < -Math.PI/2) a += Math.PI*2;
        const seg = segMeta.find(s => {
            let na = a;
            // Normaliser : atan2 retourne [-π, π], les segments vont de [-π/2, 3π/2]
            if(na < segMeta[0].startAngle) na += Math.PI*2;
            return na >= s.startAngle && na < s.endAngle;
        });
        if (seg) {
            const tt = getOrCreateTT(); tt.className = 'chart-tooltip';
            const pct = Math.round(seg.value / total * 100);
            tt.textContent = (seg.label||'') + ' · ' + seg.value + ' (' + pct + '%)';
            tt.style.left = e.clientX + 'px'; tt.style.top = e.clientY + 'px';
        }
    };
    canvas.onmouseleave = () => { const tt=document.getElementById('chart-tt'); if(tt)tt.className='chart-tooltip hidden'; };
}

function drawGauge(canvas, pct, color) {
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const size = Math.min(canvas.clientWidth, canvas.clientHeight);
    canvas.width = size * dpr; canvas.height = size * dpr;
    ctx.scale(dpr, dpr);
    const cx = size / 2, cy = size / 2, r = size / 2 - 5, lw = 8;
    const startAngle = 0.75 * Math.PI, endAngle = 2.25 * Math.PI;
    const sweep = endAngle - startAngle;
    // Background arc
    ctx.beginPath(); ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.strokeStyle = getCSSVar('--border') || '#E4E1DC';
    ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
    // Progress arc
    const p = Math.min(Math.max(pct, 0), 1);
    if (p > 0) {
        ctx.beginPath(); ctx.arc(cx, cy, r, startAngle, startAngle + sweep * p);
        ctx.strokeStyle = color || '#B4687D'; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
    }
    // Center text
    ctx.fillStyle = getCSSVar('--text') || '#1E1D2B';
    ctx.font = 'bold ' + (size * 0.22) + 'px Inter,system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(Math.round(p * 100) + '%', cx, cy);
}

function resizePhoto(file, maxW, quality) {
    maxW = maxW || 800; quality = quality || 0.65;
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                // Réduire proportionnellement si > maxW ou > maxH
                const maxH = 1200;
                if (w > maxW || h > maxH) {
                    const ratio = Math.min(maxW / w, maxH / h);
                    w = Math.round(w * ratio); h = Math.round(h * ratio);
                }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                // Essayer WebP (iOS 14+, Chrome, Firefox), sinon JPEG
                const webp = canvas.toDataURL('image/webp', quality);
                if (webp.startsWith('data:image/webp')) {
                    resolve(webp);
                } else {
                    resolve(canvas.toDataURL('image/jpeg', quality));
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

function drawBarChart(canvas, labels, values, color) {
    if (!canvas || !values || values.length === 0) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth; const h = canvas.clientHeight;
    canvas.width = w * dpr; canvas.height = h * dpr;
    ctx.scale(dpr, dpr);
    const appEl = document.getElementById('app') || document.documentElement;
    const getVar = v => getComputedStyle(appEl).getPropertyValue(v).trim();
    const max = Math.max(...values) || 1;
    const padL = 52; const padR = 10; const padT = 12; const padB = 26;
    const cw = w - padL - padR; const ch = h - padT - padB;
    const bw = Math.min(cw / values.length * 0.6, 38);
    const gap = cw / values.length;
    ctx.strokeStyle = getVar('--border'); ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
        const y = padT + (ch / 4) * i;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
        const val = Math.round(max - (max / 4) * i);
        ctx.fillStyle = getVar('--text-muted');
        ctx.font = '10px Inter,system-ui'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillText(val >= 1000 ? (val/1000).toFixed(1)+'k\u20AC' : val+'\u20AC', padL - 5, y);
    }
    const barMeta = [];
    values.forEach((v, i) => {
        const bh = (v / max) * ch; const x = padL + i * gap + (gap - bw) / 2; const y = padT + ch - bh;
        const grad = ctx.createLinearGradient(x, y, x, y + bh);
        grad.addColorStop(0, color || '#B4687D'); grad.addColorStop(1, (color || '#B4687D') + '66');
        ctx.fillStyle = grad;
        const rr = Math.min(bw / 3, 5);
        ctx.beginPath(); ctx.moveTo(x, y + bh); ctx.lineTo(x, y + rr);
        ctx.quadraticCurveTo(x, y, x + rr, y); ctx.lineTo(x + bw - rr, y);
        ctx.quadraticCurveTo(x + bw, y, x + bw, y + rr); ctx.lineTo(x + bw, y + bh); ctx.closePath(); ctx.fill();
        if (bh > 18) {
            ctx.fillStyle = '#FFF'; ctx.font = 'bold 9px Inter,system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            ctx.fillText(v >= 1000 ? (v/1000).toFixed(1)+'k' : Math.round(v)+'', x + bw / 2, y + 3);
        }
        ctx.fillStyle = getVar('--text-secondary');
        ctx.font = '10px Inter,system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(labels && labels[i] ? labels[i] : '', x + bw / 2, padT + ch + 7);
        barMeta.push({ x: x - (gap - bw) / 2, width: gap, value: v, label: labels?.[i] || '' });
    });
    const getOrCreateTooltip = () => {
        let el = document.getElementById('chart-tt'); if (!el) { el = document.createElement('div'); el.id = 'chart-tt'; el.className = 'chart-tooltip hidden'; document.body.appendChild(el); } return el;
    };
    const showTT = (e) => {
        const rect = canvas.getBoundingClientRect(); const cx = (e.touches?.[0]?.clientX || e.clientX) - rect.left;
        const bar = barMeta.find(b => cx >= b.x && cx < b.x + b.width); const tt = getOrCreateTooltip();
        if (bar && bar.value > 0) { tt.className = 'chart-tooltip'; tt.textContent = (bar.label ? bar.label + ' : ' : '') + new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(bar.value); tt.style.left = (e.touches?.[0]?.clientX || e.clientX) + 'px'; tt.style.top = (e.touches?.[0]?.clientY || e.clientY) + 'px'; }
        else { tt.className = 'chart-tooltip hidden'; }
    };
    canvas.onmousemove = showTT; canvas.ontouchmove = showTT;
    canvas.onmouseleave = () => { const tt = document.getElementById('chart-tt'); if (tt) tt.className = 'chart-tooltip hidden'; };
}



/* ================================================================
   APPLICATION PRINCIPALE — Classe App
   ================================================================ */
class App {
    constructor(){
        this.db=new Database();
        this.currentView='dashboard';
        this.currentClientId=null;
        this.currentWeekOffset=0;
        this.currentMonthOffset=0;
        this.confirmCallback=null;
        this.mapInstance=null;
        this.mapLoaded=false;
        this._factureAttenteCnt=null;
        this._rdvFormPreset=null;
        this._importMode=null;
        this._focusCleanup=null;
    }

    async init(){
        await this.db.open();
        const recovery=await this.db.checkRecovery();
        if(recovery){
            const d=this.db.getLastAutoBackupDate();
            const total=Object.values(CONFIG.STORES).reduce((s,n)=>s+((recovery[n]&&recovery[n].length)||0),0);
            this.confirm('Des données sauvegardées ('+total+' enregistrements du '+(d?formatDate(d):'?')+') ont été trouvées. Restaurer ?',async()=>{await this.db.importAll(recovery);toast('Données restaurées');this.navigate('dashboard')});
        }
        this.bindNavigation();
        this.bindExportImport();
        this.bindModal();
        this.bindConfirm();
        this.bindGlobalSearch();
        this.initTheme();
        this.initSidebarCollapse();
        injectNavIcons();
        this.db.syncToLocalStorage();
        this.initPWA();
        // Redraw charts on resize/rotation (debounced)
        let rzT=null;
        window.addEventListener('resize',()=>{clearTimeout(rzT);rzT=setTimeout(()=>{if(this.currentView==='dashboard')this.navigate('dashboard');else if(this.currentView==='bilan')this.navigate('bilan',{monthOffset:this.currentMonthOffset||0});else if(this.currentView==='carte'&&this.mapInstance){try{this.mapInstance.invalidateSize()}catch(e){}}},350)});
        this.navigate('dashboard');
        // Vérifier si l'onboarding est nécessaire (base vide + jamais vu)
        if(!localStorage.getItem(CONFIG.LS_KEY_ONBOARDING)){
            const clients=await this.db.getAll(CONFIG.STORES.CLIENTS);
            const rdvs=await this.db.getAll(CONFIG.STORES.RDV);
            if(clients.length===0&&rdvs.length===0)this.showOnboarding();
        }
        // Nettoyer les clés de timer focus orphelines (RDV complétés ou supprimés)
        this._cleanFocusTimerKeys();
    }

    /* --- Thème sombre --- */
    initTheme(){
        const saved=localStorage.getItem(CONFIG.LS_KEY_THEME)||'light';
        document.getElementById('app').dataset.theme=saved;
        this.updateThemeUI(saved);
        document.getElementById('btn-dark-toggle').addEventListener('click',()=>this.toggleTheme());
        document.getElementById('mob-dark-toggle')?.addEventListener('click',()=>{document.getElementById('mob-menu-popup').classList.remove('open');this.toggleTheme()});
    }
    toggleTheme(){
        const app=document.getElementById('app');
        const next=app.dataset.theme==='light'?'dark':'light';
        app.dataset.theme=next;
        localStorage.setItem(CONFIG.LS_KEY_THEME,next);
        this.updateThemeUI(next);
    }
    updateThemeUI(theme){
        const si=document.getElementById('si-theme');
        if(si)si.innerHTML=icon(theme==='dark'?'sun':'moon',18);
        const label=document.getElementById('theme-label');
        if(label)label.textContent=theme==='dark'?'Mode clair':'Mode sombre';
        const mob=document.getElementById('mob-dark-toggle');
        if(mob)mob.innerHTML=icon(theme==='dark'?'sun':'moon',18)+' '+(theme==='dark'?'Mode clair':'Mode sombre');
    }

    /* --- Sidebar collapse --- */
    initSidebarCollapse(){
        const btn=document.getElementById('btn-collapse');
        const sidebar=document.getElementById('sidebar');
        const saved=localStorage.getItem('monsalon_sidebar');
        if(saved==='collapsed')sidebar.classList.add('collapsed');
        btn?.addEventListener('click',()=>{
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('monsalon_sidebar',sidebar.classList.contains('collapsed')?'collapsed':'expanded');
        });
    }

    /* --- Navigation --- */
    bindNavigation(){
        document.querySelectorAll('.nav-item[data-view]').forEach(b=>b.addEventListener('click',()=>{if(!b.classList.contains('disabled'))this.navigate(b.dataset.view)}));
        document.querySelectorAll('.mob-tab[data-view]').forEach(b=>b.addEventListener('click',()=>this.navigate(b.dataset.view)));
        const mt=document.getElementById('mob-menu-toggle');
        const mp=document.getElementById('mob-menu-popup');
        if(mt&&mp){
            mt.addEventListener('click',e=>{e.stopPropagation();mp.classList.toggle('open')});
            document.addEventListener('click',()=>mp.classList.remove('open'));
            mp.addEventListener('click',e=>e.stopPropagation());
            document.getElementById('mob-bilan')?.addEventListener('click',()=>{mp.classList.remove('open');this.navigate('bilan')});
            document.getElementById('mob-carte')?.addEventListener('click',()=>{mp.classList.remove('open');this.navigate('carte')});
            document.getElementById('mob-factures')?.addEventListener('click',()=>{mp.classList.remove('open');this.navigate('factures')});
            document.getElementById('mob-stats')?.addEventListener('click',()=>{mp.classList.remove('open');this.navigate('stats')});
            document.getElementById('mob-export')?.addEventListener('click',()=>{mp.classList.remove('open');document.getElementById('btn-export').click()});
            document.getElementById('mob-import')?.addEventListener('click',()=>{mp.classList.remove('open');document.getElementById('importInput').click()});
        }
    }

    async navigate(view,params){
        params=params||{};
        this.currentView=view;
        this.currentClientId=params.clientId||null;
        document.querySelectorAll('.nav-item,.mob-tab[data-view]').forEach(el=>el.classList.remove('active'));
        document.querySelectorAll('.nav-item[data-view="'+view+'"],.mob-tab[data-view="'+view+'"]').forEach(el=>el.classList.add('active'));
        const viewEl=document.getElementById('view');
        if(viewEl){viewEl.scrollTop=0;viewEl.classList.remove('view-enter');void viewEl.offsetWidth;viewEl.classList.add('view-enter')}
        if(this.mapInstance&&view!=='carte'){try{this.mapInstance.remove()}catch(e){}this.mapInstance=null}
        // Nettoyer le tooltip des graphiques à chaque changement de page
        const tt=document.getElementById('chart-tt');if(tt)tt.className='chart-tooltip hidden';
        // Fermer le focus overlay si ouvert (évite body.overflow:hidden bloqué)
        const fo=document.getElementById('focus-overlay');
        if(fo&&fo.classList.contains('open')){fo.classList.remove('open');document.body.style.overflow='';if(this._focusCleanup){try{this._focusCleanup()}catch(e){}this._focusCleanup=null;}}
        // Fermer la galerie photos si ouverte
        const pg=document.getElementById('photo-gallery');
        if(pg&&pg.classList.contains('open'))this.closeGallery();
        try{
        const clients=await this.db.getAll(CONFIG.STORES.CLIENTS);
        document.getElementById('client-count-badge').textContent=clients.length;
        const rdvs=await this.db.getAll(CONFIG.STORES.RDV);
        const rf=rdvs.filter(r=>r.statut==='planifie'&&r.date>=ymd(new Date()));
        const br=document.getElementById('rdv-count-badge');if(br)br.textContent=rf.length;
        // Badge factures en attente (cache mémoire invalidé après write)
        try{
            if(this._factureAttenteCnt===null){
                const facts=await this.db.getAll(CONFIG.STORES.FACTURES);
                this._factureAttenteCnt=facts.filter(f=>f.statut==='attente').length;
            }
            const fb=document.getElementById('facture-count-badge');
            if(fb){fb.textContent=this._factureAttenteCnt;fb.style.display=this._factureAttenteCnt>0?'':'none'}
        }catch(e){}
        switch(view){
            case'dashboard':await this.renderDashboard();break;
            case'clients':await this.renderClientsList();break;
            case'client-detail':await this.renderClientDetail(params.clientId);break;
            case'agenda':await this.renderAgenda(params.weekOffset||0);break;
            case'frais':await this.renderFrais(params.monthOffset||0);break;
            case'bilan':await this.renderBilan(params.monthOffset||0);break;
            case'carte':await this.renderMap();break;
            case'factures':await this.renderFactures();break;
            case'stats':await this.renderStats();break;
        }
        }catch(err){console.error('Erreur rendu '+view+':',err);const v=document.getElementById('view');if(v)v.innerHTML='<div class="empty-state"><div class="empty-icon">'+icon('zap',48)+'</div><p>Erreur de chargement.<br>'+esc(err.message)+'</p><button class="btn btn-primary" onclick="app.navigate(\'dashboard\')">'+icon('home',16)+' Accueil</button></div>'}
    }

    /* --- Modale --- */
    bindModal(){document.getElementById('modal-close').addEventListener('click',()=>this.closeModal());document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)this.closeModal()})}
    openModal(title,body,footer){document.getElementById('modal-title').innerHTML=title;document.getElementById('modal-body').innerHTML=body;document.getElementById('modal-footer').innerHTML=footer;document.getElementById('modal-overlay').classList.add('open')}
    closeModal(){document.getElementById('modal-overlay').classList.remove('open');if(this._clientSearchOutside){document.removeEventListener('click',this._clientSearchOutside);this._clientSearchOutside=null}}

    /* --- Confirmation --- */
    bindConfirm(){document.getElementById('confirm-cancel').addEventListener('click',()=>{document.getElementById('confirm-overlay').classList.remove('open');this.confirmCallback=null});document.getElementById('confirm-ok').addEventListener('click',()=>{document.getElementById('confirm-overlay').classList.remove('open');if(this.confirmCallback)this.confirmCallback();this.confirmCallback=null})}
    confirm(msg,cb){document.getElementById('confirm-message').textContent=msg;this.confirmCallback=cb;document.getElementById('confirm-overlay').classList.add('open')}

    /* --- Recherche globale --- */
    bindGlobalSearch(){
        const overlay=document.getElementById('search-overlay');
        const input=document.getElementById('global-search-input');
        const results=document.getElementById('search-results');
        document.getElementById('btn-global-search').addEventListener('click',()=>this.openSearch());
        document.getElementById('search-close-btn').addEventListener('click',()=>this.closeSearch());
        overlay.addEventListener('click',e=>{if(e.target===overlay)this.closeSearch()});
        document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();this.openSearch()}if(e.key==='Escape'){if(overlay.classList.contains('open'))this.closeSearch();const fo=document.getElementById('focus-overlay');if(fo&&fo.classList.contains('open'))this.closeFocusMode()}});
        let debT=null;
        input.addEventListener('input',()=>{clearTimeout(debT);debT=setTimeout(()=>this.performSearch(input.value.trim()),200)});
        results.addEventListener('click',e=>{const item=e.target.closest('.search-result');if(item){const v=item.dataset.view;let p={};try{p=item.dataset.params?JSON.parse(item.dataset.params):{}}catch(err){p={}}this.closeSearch();this.navigate(v,p)}});
        // Historique des recherches (clic sur résultats de l'historique)
        results.addEventListener('click',e=>{const h=e.target.closest('[data-history]');if(h){input.value=h.dataset.history;input.dispatchEvent(new Event('input'))}});
    }
    _getSearchHistory(){try{return JSON.parse(localStorage.getItem('monsalon_search_history')||'[]')}catch(e){return[]}}
    _pushSearchHistory(q){if(!q||q.length<2)return;try{const h=this._getSearchHistory().filter(x=>x!==q).slice(0,4);h.unshift(q);localStorage.setItem('monsalon_search_history',JSON.stringify(h))}catch(e){}}
    openSearch(){
        document.getElementById('search-overlay').classList.add('open');
        const i=document.getElementById('global-search-input');i.value='';i.focus();
        // Afficher l'historique des recherches récentes
        const hist=this._getSearchHistory();
        const res=document.getElementById('search-results');
        if(hist.length>0){
            res.innerHTML='<div class="search-cat">Recherches récentes</div>'
                +hist.map(q=>'<div class="search-result" data-history="'+esc(q)+'"><div class="search-result-icon" style="background:var(--surface-2);color:var(--text-muted)">'+icon('clock',16)+'</div><div class="search-result-body"><div class="search-result-title">'+esc(q)+'</div></div></div>').join('');
        }else{res.innerHTML=''}
    }
    closeSearch(){document.getElementById('search-overlay').classList.remove('open')}

    async performSearch(q){
        const res=document.getElementById('search-results');
        if(!q||q.length<2){res.innerHTML='';return}
        const ql=q.toLowerCase();
        const clients=await this.db.getAll(CONFIG.STORES.CLIENTS);
        const rdvs=await this.db.getAll(CONFIG.STORES.RDV);
        const fiches=await this.db.getAll(CONFIG.STORES.FICHES);
        const factures=await this.db.getAll(CONFIG.STORES.FACTURES);
        const cMap={};clients.forEach(c=>{cMap[c.id]=c});
        // Score : correspondance dans le nom → score 2, ailleurs → score 1
        const score=(str,q)=>{const s=str.toLowerCase();if(s.startsWith(q))return 3;if((' '+s).includes(' '+q))return 2;if(s.includes(q))return 1;return 0};
        let html='';
        // Clientes — triées par score puis par dernière visite
        const cRes=clients.map(c=>({c,s:score(c.prenom+' '+c.nom+(c.telephone||'')+(c.adresse&&c.adresse.ville||''),ql)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s||(b.c.modifieLe||'').localeCompare(a.c.modifieLe||'')).slice(0,6);
        if(cRes.length>0){
            html+='<div class="search-cat">Clientes</div>';
            cRes.forEach(({c})=>{html+='<div class="search-result" tabindex="0" role="button" aria-label="Cliente '+esc(c.prenom)+' '+esc(c.nom)+'" data-view="client-detail" data-params=\'{"clientId":"'+c.id+'"}\'><div class="search-result-icon" style="background:var(--primary-soft);color:var(--primary)">'+icon('users',16)+'</div><div class="search-result-body"><div class="search-result-title">'+esc(c.prenom)+' '+esc(c.nom)+'</div><div class="search-result-sub">'+(c.adresse&&c.adresse.ville?icon('map-pin',10)+' '+esc(c.adresse.ville)+' · ':'')+(c.telephone||'')+'</div></div></div>'});
        }
        // RDV — incluant notes, triés par date décroissante
        const rRes=rdvs.filter(r=>{const cl=cMap[r.clientId];const name=cl?(cl.prenom+' '+cl.nom):'';return (name+' '+r.date+' '+(r.prestationsPrevues||[]).join(' ')+' '+(r.adresse||'')+' '+(r.notes||'')).toLowerCase().includes(ql)}).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,4);
        if(rRes.length>0){
            html+='<div class="search-cat">Rendez-vous</div>';
            rRes.forEach(r=>{const cl=cMap[r.clientId];const nom=cl?cl.prenom+' '+cl.nom:'?';html+='<div class="search-result" tabindex="0" role="button" aria-label="RDV '+esc(nom)+'" data-view="agenda" data-params=\'{}\'><div class="search-result-icon" style="background:var(--success-soft);color:var(--success)">'+icon('calendar',16)+'</div><div class="search-result-body"><div class="search-result-title">'+esc(nom)+' — '+formatDateShort(r.date)+'</div><div class="search-result-sub">'+icon('clock',10)+' '+(r.heureDebut||'?')+' · '+(r.prestationsPrevues||[]).slice(0,2).join(', ')+(r.notes?'<em> · '+esc(r.notes.slice(0,30))+'…</em>':'')+'</div></div></div>'});
        }
        // Fiches — triées par date
        const fRes=fiches.filter(f=>{const cl=cMap[f.clientId];const name=cl?(cl.prenom+' '+cl.nom):'';return (name+' '+(f.diagnostic||'')+' '+(f.produits||'')+' '+(f.resultat||'')+' '+(f.prestations||[]).join(' ')+' '+(f.notes||'')+' '+(f.formules||[]).map(fm=>fm.marque+' '+fm.teinte).join(' ')).toLowerCase().includes(ql)}).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,4);
        if(fRes.length>0){
            html+='<div class="search-cat">Fiches techniques</div>';
            fRes.forEach(f=>{const cl=cMap[f.clientId];const nom=cl?cl.prenom+' '+cl.nom:'?';html+='<div class="search-result" tabindex="0" role="button" aria-label="Fiche '+esc(nom)+'" data-view="client-detail" data-params=\'{"clientId":"'+f.clientId+'"}\'><div class="search-result-icon" style="background:var(--accent-soft);color:var(--accent)">'+icon('file-text',16)+'</div><div class="search-result-body"><div class="search-result-title">'+esc(nom)+' — '+formatDateShort(f.date)+'</div><div class="search-result-sub">'+(f.prestations||[]).slice(0,3).join(', ')+(f.tarif?' · '+formatEuros(f.tarif):'')+'</div></div></div>'});
        }
        // Factures
        const facRes=factures.filter(f=>{const cl=cMap[f.clientId];const name=cl?(cl.prenom+' '+cl.nom):'';return (name+' '+(f.numero||'')+' '+(f.notes||'')+' '+(f.lignes||[]).map(l=>l.designation).join(' ')).toLowerCase().includes(ql)}).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,3);
        if(facRes.length>0){
            html+='<div class="search-cat">Factures</div>';
            facRes.forEach(f=>{const cl=cMap[f.clientId];const nom=cl?cl.prenom+' '+cl.nom:'?';html+='<div class="search-result" tabindex="0" role="button" aria-label="Facture '+esc(f.numero)+'" data-view="factures" data-params=\'{}\'><div class="search-result-icon" style="background:var(--warning-soft);color:var(--warning)">'+icon('receipt',16)+'</div><div class="search-result-body"><div class="search-result-title">'+esc(f.numero||'—')+' — '+esc(nom)+'</div><div class="search-result-sub">'+formatEuros(f.total)+' · '+formatDateShort(f.date)+'</div></div><span class="search-recency">'+{payee:'✓ Payée',attente:'En attente',annulee:'✗'}[f.statut]+'</span></div>'});
        }
        if(!html)html='<div class="search-empty">'+icon('search',24)+'<br>Aucun résultat pour « '+esc(q)+' »</div>';
        res.innerHTML=html;
        // Sauvegarder dans l'historique si on a eu des résultats
        if(html&&!html.includes('search-empty'))this._pushSearchHistory(q);
    }

    /* --- Export / Import --- */
    bindExportImport(){
        document.getElementById('btn-export').addEventListener('click',()=>this.openExportModal());
        document.getElementById('btn-import').addEventListener('click',()=>this.openImportModal());
        document.getElementById('btn-presta-settings')?.addEventListener('click',()=>this.openPrestaSettings());
        document.getElementById('btn-sync-qr')?.addEventListener('click',()=>this.openSyncQR());
        document.getElementById('importInput').addEventListener('change',async e=>{
            const f=e.target.files[0];if(!f)return;
            const mode=this._importMode||'replace';this._importMode=null;
            try{const t=await f.text();const d=JSON.parse(t);
                if(mode==='merge'){await this.db.mergeAll(d);toast('Données fusionnées')}
                else{await this.db.importAll(d);toast('Données restaurées')}
                this.navigate(this.currentView);
            }catch(e){toast('Fichier invalide: '+e.message,'danger')}
            e.target.value='';
        });
    }

    openExportModal(){
        const body='<div class="export-options">'
            +'<div class="export-option" id="exp-complet"><div class="export-option-icon" style="background:var(--primary-soft);color:var(--primary)">'+icon('save',22)+'</div><div class="export-option-body"><strong>Export complet</strong><span>Inclut toutes les données et les photos. Fichier plus volumineux.</span></div></div>'
            +'<div class="export-option" id="exp-leger"><div class="export-option-icon" style="background:var(--accent-soft);color:var(--accent)">'+icon('file-text',22)+'</div><div class="export-option-body"><strong>Export léger (sans photos)</strong><span>Données texte uniquement. Idéal pour sauvegardes fréquentes.</span></div></div>'
            +'<div class="export-option" id="exp-csv"><div class="export-option-icon" style="background:var(--success-soft);color:var(--success)">'+icon('csv',22)+'</div><div class="export-option-body"><strong>Export CSV — Comptabilité</strong><span>Recettes par prestation, compatible Excel / Google Sheets.</span></div></div>'
            +'</div>';
        this.openModal(icon('save',20)+' Sauvegarder les données',body,'<button class="btn btn-secondary" onclick="app.closeModal()">Annuler</button>');
        document.getElementById('exp-complet')?.addEventListener('click',()=>this._doExport(false));
        document.getElementById('exp-leger')?.addEventListener('click',()=>this._doExport(true));
        document.getElementById('exp-csv')?.addEventListener('click',()=>this._doExportCSV());
    }

    async _doExport(stripPhotos){
        try{
            const d=await this.db.exportAll();
            if(stripPhotos&&d[CONFIG.STORES.FICHES])d[CONFIG.STORES.FICHES]=d[CONFIG.STORES.FICHES].map(f=>{const c={...f};c.photos=[];return c});
            const j=JSON.stringify(d,null,2);const b=new Blob([j],{type:'application/json'});const u=URL.createObjectURL(b);
            const a=document.createElement('a');a.href=u;a.download='mon-salon-'+(stripPhotos?'leger-':'complet-')+ymd(new Date())+'.json';a.click();URL.revokeObjectURL(u);
            toast('Sauvegarde exportée');this.db.setLastManualExportDate();this.closeModal();
        }catch(e){toast('Erreur: '+e.message,'danger')}
    }

    async _doExportCSV(){
        try{
            const fiches=await this.db.getAll(CONFIG.STORES.FICHES);
            const clients=await this.db.getAll(CONFIG.STORES.CLIENTS);
            const cMap={};clients.forEach(c=>{cMap[c.id]=c});
            const rows=[['Date','Prénom','Nom','Prestations','Tarif (€)','Formule coloration']];
            fiches.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(f=>{
                const cl=cMap[f.clientId]||{prenom:'',nom:''};
                const formule=(f.formules||[]).map(fm=>[fm.marque,fm.teinte,fm.zone].filter(Boolean).join(' ')).join(' / ');
                rows.push([ymd(new Date(f.date||Date.now())),cl.prenom,cl.nom,(f.prestations||[]).join(' + '),(f.tarif||0).toFixed(2),formule]);
            });
            const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';')).join('\r\n');
            const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
            const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='mon-salon-recettes-'+ymd(new Date())+'.csv';a.click();URL.revokeObjectURL(u);
            toast('CSV exporté ('+fiches.length+' fiches)');this.closeModal();
        }catch(e){toast('Erreur CSV: '+e.message,'danger')}
    }

    openImportModal(){
        const body='<p style="font-size:.84rem;color:var(--text-secondary);margin-bottom:14px">Choisissez comment importer votre fichier de sauvegarde :</p>'
            +'<div class="import-options">'
            +'<label class="import-option"><input type="radio" name="import-mode" value="merge" checked> '+icon('zap',18)+' <div><strong>Fusionner</strong> — Ajoute les données importées sans supprimer l\'existant. Les ID en double sont ignorés.</div></label>'
            +'<label class="import-option"><input type="radio" name="import-mode" value="replace"> '+icon('trash',18)+' <div><strong>Remplacer</strong> — Efface toutes les données actuelles et les remplace. Irréversible.</div></label>'
            +'</div>';
        this.openModal(icon('upload',20)+' Restaurer une sauvegarde',body,
            '<button class="btn btn-secondary" onclick="app.closeModal()">Annuler</button>'
            +'<button class="btn btn-primary" id="btn-import-go">'+icon('upload',14)+' Choisir le fichier</button>');
        document.getElementById('btn-import-go')?.addEventListener('click',()=>{
            const sel=document.querySelector('input[name="import-mode"]:checked');
            this._importMode=sel?sel.value:'merge';
            this.closeModal();
            document.getElementById('importInput').click();
        });
    }

    /* ================================================================
       DASHBOARD
       ================================================================ */
    async renderDashboard(){
        document.getElementById('page-title').textContent='Tableau de bord';
        document.getElementById('topbar-actions').innerHTML='<button class="btn btn-ghost btn-sm" onclick="app.navigate(\'stats\')">'+icon('bar-chart',16)+' Stats</button><button class="btn btn-secondary btn-sm" onclick="app.navigate(\'bilan\')">'+icon('trending-up',16)+' Bilan</button>';
        const clients=await this.db.getAll(CONFIG.STORES.CLIENTS);
        const fiches=await this.db.getAllLite(CONFIG.STORES.FICHES);
        const totalClients=clients.length;
        const totalFiches=fiches.length;
        const caTotal=fiches.reduce((s,f)=>s+(f.tarif||0),0);
        const panierMoyen=totalFiches>0?caTotal/totalFiches:0;
        const now=new Date();
        // Sparkline data — CA des 6 derniers mois
        const sparkCA=[];const sparkPr=[];
        for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const dE=new Date(d.getFullYear(),d.getMonth()+1,1);const dS=ymd(d);const dEI=ymd(dE);const mf=fiches.filter(f=>{const fd=(f.date||"").slice(0,10);return fd>=dS&&fd<dEI});sparkCA.push(mf.reduce((s,f)=>s+(f.tarif||0),0));sparkPr.push(mf.length)}
        const debutMois=ymd(new Date(now.getFullYear(),now.getMonth(),1));
        const fichesMois=fiches.filter(f=>(f.date||'').slice(0,10)>=debutMois).length;
        const dernClients=[...clients].sort((a,b)=>(b.creeLe||'').localeCompare(a.creeLe||'')).slice(0,5);
        const dernFiches=[...fiches].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5);
        const villesMap={};clients.forEach(c=>{const v=(c.adresse&&c.adresse.ville)||'Non renseignée';villesMap[v]=(villesMap[v]||0)+1});
        const topVilles=Object.entries(villesMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
        const lastAuto=this.db.getLastAutoBackupDate();
        const lastExport=this.db.getLastManualExportDate();
        const daysSince=lastExport?Math.floor((Date.now()-new Date(lastExport).getTime())/86400000):null;
        const warn=daysSince===null||daysSince>=7;
        // Planning du jour
        const todayKey=ymd(now);
        const allRdv=await this.db.getAll(CONFIG.STORES.RDV);
        const todayRdvs=allRdv.filter(r=>r.date===todayKey).sort((a,b)=>(a.heureDebut||'').localeCompare(b.heureDebut||''));
        const cMap2={};clients.forEach(c=>{cMap2[c.id]=c});
        // CA du jour : fiches créées aujourd'hui
        const fichesMap={};fiches.forEach(f=>{fichesMap[f.clientId]=fichesMap[f.clientId]||[];fichesMap[f.clientId].push(f)});
        const caJour=fiches.filter(f=>(f.date||'').slice(0,10)===todayKey).reduce((s,f)=>s+(f.tarif||0),0);
        const rdvTerminesJour=todayRdvs.filter(r=>r.statut==='termine').length;
        let planHTML='<div class="today-planning"><div class="section-title">'+icon('clock',18)+' Aujourd\'hui — '+now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})
            +(todayRdvs.length>0?'<span class="stat-chip" style="margin-left:auto">'+todayRdvs.length+' RDV</span>':'')
            +(caJour>0?'<span class="stat-chip" style="background:var(--success-soft);color:var(--success)">'+formatEuros(caJour)+'</span>':'')
            +'</div>';
        if(todayRdvs.length===0)planHTML+='<div class="today-empty">'+icon('calendar',20)+' Aucun rendez-vous aujourd\'hui</div>';
        else{planHTML+='<div class="today-timeline">';todayRdvs.forEach(r=>{const cl=cMap2[r.clientId];const nom=cl?cl.prenom+' '+cl.nom:'?';planHTML+='<div class="today-stop '+(r.statut==='termine'?'termine':'')+'"><div class="today-time">'+(r.heureDebut||'?')+'</div><div class="today-detail"><div class="today-name">'+esc(nom)+'</div><div class="today-presta">'+(r.prestationsPrevues||[]).join(', ')+(r.bufferAvant?' · '+icon('car',10)+' '+r.bufferAvant+'min':'')+'</div></div>'+(r.statut==='planifie'?'<div style="display:flex;gap:4px"><button class="btn btn-ghost btn-sm" style="color:var(--primary)" onclick="app.openFocusMode(\''+r.id+'\')" aria-label="Mode focus" title="Mode focus">'+icon('eye',14)+'</button><button class="btn btn-ghost btn-sm" style="color:var(--success)" onclick="app.quickCompleteRdv(\''+r.id+'\')" aria-label="Marquer terminé">'+icon('check',15)+'</button></div>':'<span class="status-badge status-termine">OK</span>')+'</div>'});planHTML+='</div>';
        if(rdvTerminesJour>0&&caJour===0)planHTML+='<p style="font-size:.72rem;color:var(--text-muted);padding:6px 14px;font-style:italic">Pensez à créer les fiches techniques pour enregistrer le CA du jour.</p>';}
        planHTML+='</div>';
        // CA Objectif
        const caObj=parseFloat(localStorage.getItem(CONFIG.LS_KEY_CA_OBJECTIF))||0;
        const caMois=fiches.filter(f=>(f.date||'').slice(0,10)>=debutMois).reduce((s,f)=>s+(f.tarif||0),0);
        const caPct=caObj>0?caMois/caObj:0;
        let gaugeHTML='';
        if(caObj>0){gaugeHTML='<div class="ca-gauge-wrap"><canvas class="ca-gauge-canvas" id="ca-gauge" style="width:80px;height:80px"></canvas><div class="ca-gauge-info"><div class="ca-gauge-label">Objectif du mois</div><div class="ca-gauge-val">'+formatEuros(caMois)+' <span style="font-size:.78rem;font-weight:500;color:var(--text-secondary)">/ '+formatEuros(caObj)+'</span></div><div class="ca-gauge-sub">'+(caPct>=1?'Objectif atteint !':'Reste '+formatEuros(caObj-caMois))+'</div><span class="ca-gauge-edit" onclick="app.setCaObjectif()">Modifier l\'objectif</span></div></div>'}
        else{gaugeHTML='<div style="text-align:right;margin-bottom:8px"><button class="btn btn-ghost btn-sm" onclick="app.setCaObjectif()">'+icon('zap',14)+' Définir un objectif CA</button></div>'}

                ${icon(warn?'zap':'shield',18)}
